<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu Mẫu Đăng Nhập Cao Cấp - Lab 22</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        /* Định hình lại hộp đăng nhập to hơn, sang trọng hơn */
        .login-wrapper {
            width: 100%;
            max-width: 480px; /* Tăng độ rộng của form */
            margin: auto;
        }

        .login-card {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px; /* Bo góc mềm mại hơn */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        /* Làm các ô nhập liệu to rõ và nổi bật */
        .form-label {
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #6c757d;
            border-radius: 12px 0 0 12px;
            padding-left: 20px;
            padding-right: 15px;
        }

        .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 14px 20px; /* Tăng padding giúp ô input to, dễ bấm */
            font-size: 1.05rem;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            background-color: #fff;
            border-color: #764ba2;
            box-shadow: none;
        }
        
        .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text {
            border-color: #764ba2;
            background-color: #fff;
        }

        /* Nút bấm Gradient thời thượng */
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 12px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-gradient:hover {
            color: white;
            opacity: 0.95;
            transform: scale(1.01);
        }

        .btn-gradient:active {
            transform: scale(0.99);
        }

        /* Tùy chỉnh checkbox to hơn một chút */
        .form-check-input {
            width: 1.2em;
            height: 1.2em;
            cursor: pointer;
        }
        .form-check-input:checked {
            background-color: #764ba2;
            border-color: #764ba2;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3 p-md-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 d-flex justify-content-center">
                
                <div class="login-wrapper">
                    <div class="card login-card p-4 p-sm-5">
                        
                        <div class="text-center mb-5">
                            <div class="mb-3 d-inline-block p-3 bg-primary-subtle text-primary rounded-circle shadow-sm" style="background: rgba(118, 75, 162, 0.1) !important; color: #764ba2 !important;">
                                <i class="fa-solid fa-lock fa-2x"></i>
                            </div>
                            <h2 class="fw-bold text-dark mb-2 fs-2">Chào Mừng Trở Lại</h2>
                            <p class="text-muted">Vui lòng đăng nhập để tiếp tục trải nghiệm</p>
                        </div>

                        <form action="#" method="POST">
                            
                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold text-dark mb-2">Địa chỉ Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-dark mb-2">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-5">
                                <div class="form-check d-flex align-items-center gap-2">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label text-secondary small fw-medium user-select-none" for="rememberMe">
                                        Ghi nhớ đăng nhập
                                    </label>
                                </div>
                                <a href="#" class="text-decoration-none small fw-bold" style="color: #764ba2;">Quên mật khẩu?</a>
                            </div>

                            <button type="submit" class="btn btn-gradient w-100 fw-bold shadow-sm">
                                Đăng Nhập <i class="fa-solid fa-arrow-right ms-2 small"></i>
                            </button>
                            
                        </form>
                        
                    </div>
                </div>
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
