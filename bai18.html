<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xóa Dữ Liệu - Lab 18</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; color: #1e293b; }
        .flat-card { background: #ffffff; border: 2px solid #0f172a; border-radius: 12px; max-width: 450px; margin: auto; }
        .flat-input { border: 2px solid #0f172a; border-radius: 8px; padding: 12px; font-weight: 700; text-center: center; font-size: 1.2rem; }
        .btn-danger-flat { background: #dc2626; color: white; border: 2px solid #0f172a; border-radius: 8px; font-weight: 700; padding: 12px; }
        .btn-danger-flat:hover { background: #b91c1c; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="flat-card p-4 shadow-sm text-center">
            <h5 class="fw-bold text-uppercase mb-3">Thanh Trừng Thực Thể</h5>
            <div class="mb-4">
                <label class="small fw-bold text-danger d-block mb-2">ĐIỀN ID ĐỐI TƯỢNG CẦN GỠ BỎ</label>
                <input type="text" class="form-control flat-input font-monospace" id="targetId" placeholder="Ví dụ: 5" required autocomplete="off">
            </div>
            <button class="btn btn-danger-flat w-100" id="btnDelete">PHÁT LỆNH XÓA VĨNH VIỄN</button>
        </div>
    </div>
    <script>
        const API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        document.getElementById("btnDelete").addEventListener("click", () => {
            const id = document.getElementById("targetId").value.trim();
            if(!id) return;
            if(!confirm(`Xác nhận xóa bản ghi #${id}?`)) return;

            fetch(`${API}/${id}`, { method: "DELETE" })
                .then(res => {
                    if(!res.ok) throw new Error();
                    alert(`Đã xóa sạch thực thể #${id}.`);
                    document.getElementById("targetId").value = "";
                })
                .catch(() => alert("Mã định danh ID không tồn tại hoặc lỗi máy chủ."));
        });
    </script>
</body>
</html>
