<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu Chỉnh Cấu Trúc - Lab 14</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f0fdf4;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #0f172a;
            min-height: 100vh;
        }
        .neo-box {
            background: #ffffff;
            border: 2px solid #0f172a;
            border-radius: 16px;
            box-shadow: 6px 6px 0px #0f172a;
        }
        .neo-title {
            font-weight: 900;
            color: #0f172a;
            text-transform: uppercase;
        }
        .neo-input {
            background: #ffffff;
            border: 2px solid #0f172a;
            color: #0f172a;
            font-weight: 500;
            border-radius: 10px;
            padding: 10px 14px;
        }
        .neo-input:focus:not(:disabled) {
            background: #ffffff;
            border-color: #22c55e;
            box-shadow: 4px 4px 0px #0f172a;
            color: #0f172a;
        }
        .neo-input:disabled {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }
        .btn-neo-green {
            background: #22c55e;
            border: 2px solid #0f172a;
            color: #ffffff;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 3px 3px 0px #0f172a;
            transition: all 0.15s ease;
        }
        .btn-neo-green:hover:not(:disabled) {
            background: #16a34a;
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px #0f172a;
        }
        .btn-neo-green:disabled {
            background: #cbd5e1;
            border-color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-fetch {
            background: #0f172a;
            color: #ffffff;
            border: 2px solid #0f172a;
            font-weight: bold;
            border-radius: 10px;
        }
        .btn-fetch:hover { background: #1e293b; color: #ffffff; }
        .status-box {
            border-radius: 12px;
            background: #f8fafc;
            border: 2px dashed #22c55e;
            color: #166534;
            font-weight: 500;
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">

    <div class="container">
        <div class="row justify-content-center w-100 m-0">
            <div class="col-12 col-md-10 col-lg-6 p-0">
                
                <div class="text-center mb-4">
                    <h2 class="neo-title m-0">Ghi Đè Tham Số</h2>
                    <p class="text-muted small fw-bold mt-1">Tìm kiếm, trích xuất cấu trúc và cập nhật dữ liệu</p>
                </div>

                <div class="neo-box p-4 p-sm-5">
                    
                    <div class="row g-2 mb-4">
                        <div class="col-8">
                            <input type="text" class="form-control neo-input font-monospace fw-bold" id="searchId" placeholder="Nhập ID để nạp..." autocomplete="off">
                        </div>
                        <div class="col-4">
                            <button type="button" class="btn btn-fetch w-100 h-100" id="btnFetch">Nạp Data</button>
                        </div>
                    </div>

                    <form id="updateForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Họ và tên mới</label>
                            <input type="text" class="form-control neo-input" id="upName" required disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase">Email mới</label>
                            <input type="email" class="form-control neo-input" id="upEmail" required disabled>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Lớp mới</label>
                            <input type="text" class="form-control neo-input" id="upClass" required disabled>
                        </div>

                        <button type="submit" class="btn btn-neo-green w-100 text-uppercase" id="btnSubmitUpdate" disabled>Lưu Cấu Hình Mới</button>
                    </form>

                    <div id="statusWrapper" class="status-box p-3 text-center mt-4 small">
                        <i class="bi bi-info-circle-fill text-success me-2"></i>Vui lòng nhập ID và ấn "Nạp Data" trước khi hiệu chỉnh.
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const ENDPOINT_API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        
        const searchId = document.getElementById("searchId");
        const btnFetch = document.getElementById("btnFetch");
        const updateForm = document.getElementById("updateForm");
        const statusWrapper = document.getElementById("statusWrapper");

        const fields = [
            document.getElementById("upName"),
            document.getElementById("upEmail"),
            document.getElementById("upClass"),
            document.getElementById("btnSubmitUpdate")
        ];

        let activeId = null;

        btnFetch.addEventListener("click", function() {
            const id = searchId.value.trim();
            if (!id) return;

            statusWrapper.innerHTML = `<div class="spinner-border spinner-border-sm text-dark me-2"></div><span class="fw-bold">Đang quét cơ sở dữ liệu...</span>`;
            
            fetch(`${ENDPOINT_API}/${id}`)
                .then(res => {
                    if (!res.ok) throw new Error("Bản ghi không tồn tại hoặc lỗi luồng mạng.");
                    return res.json();
                })
                .then(data => {
                    activeId = id;
                    fields[0].value = data.fullName || "";
                    fields[1].value = data.email || "";
                    fields[2].value = data.classroom || "";
                    
                    fields.forEach(el => el.disabled = false);
                    statusWrapper.innerHTML = `<span class="text-success fw-bold"><i class="bi bi-unlock-fill me-2"></i>Cấu trúc biểu mẫu của ID #${id} đã mở khóa.</span>`;
                })
                .catch(err => {
                    fields.forEach(el => el.disabled = true);
                    updateForm.reset();
                    statusWrapper.innerHTML = `<span class="text-danger fw-bold"><i class="bi bi-shield-slash-fill me-2"></i>Lỗi: ${err.message}</span>`;
                });
        });

        updateForm.addEventListener("submit", function(e) {
            e.preventDefault();
            if (!activeId) return;

            statusWrapper.innerHTML = `<div class="spinner-border spinner-border-sm text-dark me-2"></div><span class="fw-bold">Đang đẩy cấu trúc mới lên cloud...</span>`;

            const payload = {
                fullName: fields[0].value.trim(),
                email: fields[1].value.trim(),
                classroom: fields[2].value.trim()
            };

            fetch(`${ENDPOINT_API}/${activeId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) throw new Error("Máy chủ khước từ bản cập nhật này.");
                return res.json();
            })
            .then(data => {
                statusWrapper.innerHTML = `
                    <div class="text-success fw-bold mb-1"><i class="bi bi-patch-check-fill me-2"></i>Nâng cấp dữ liệu hoàn tất!</div>
                    <span class="text-secondary small fw-bold">ID #${activeId} đã nhận cấu hình mới thành công.</span>
                `;
                fields.forEach(el => el.disabled = true);
                updateForm.reset();
                searchId.value = "";
                activeId = null;
            })
            .catch(err => {
                statusWrapper.innerHTML = `<span class="text-danger fw-bold"><i class="bi bi-exclamation-octagon-fill me-2"></i>Lỗi cập nhật: ${err.message}</span>`;
            });
        });
    </script>
</body>
</html>
