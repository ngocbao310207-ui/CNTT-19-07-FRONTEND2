<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Sản Phẩm</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f2f2f2;
      }

      .product-card {
        transition: 0.3s;
      }

      .product-card:hover {
        transform: translateY(-5px);
      }

      .product-img {
        height: 220px;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <!-- Tiêu đề -->
      <h1 class="text-center mb-5">DANH SÁCH SẢN PHẨM</h1>

      <!-- Bộ lọc -->
      <div class="d-flex justify-content-end mb-4">
        <select class="form-select w-auto">
          <option>Tất cả danh mục</option>
          <option>Điện thoại</option>
          <option>Laptop</option>
          <option>Phụ kiện</option>
        </select>
      </div>

      <!-- Grid sản phẩm -->
      <div class="row g-4">
        <!-- Product 1 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow rounded-4 h-100 product-card">
            <span class="badge bg-danger position-absolute m-3"> -20% </span>

            <img
              src="https://picsum.photos/400/300?1"
              class="card-img-top product-img"
              alt="product"
            />

            <div class="card-body">
              <h5 class="card-title">iPhone 15 Pro</h5>

              <p class="text-danger fw-bold">28.990.000đ</p>

              <button
                class="btn btn-primary w-100"
                data-bs-toggle="modal"
                data-bs-target="#productModal"
              >
                Xem nhanh
              </button>
            </div>
          </div>
        </div>

        <!-- Product 2 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow rounded-4 h-100 product-card">
            <img
              src="https://picsum.photos/400/300?2"
              class="card-img-top product-img"
              alt="product"
            />

            <div class="card-body">
              <h5 class="card-title">Samsung Galaxy S24</h5>

              <p class="text-danger fw-bold">22.500.000đ</p>

              <button class="btn btn-success w-100">Mua ngay</button>
            </div>
          </div>
        </div>

        <!-- Product 3 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow rounded-4 h-100 product-card">
            <span class="badge bg-warning text-dark position-absolute m-3">
              Mới
            </span>

            <img
              src="https://picsum.photos/400/300?3"
              class="card-img-top product-img"
              alt="product"
            />

            <div class="card-body">
              <h5 class="card-title">MacBook Air M3</h5>

              <p class="text-danger fw-bold">31.990.000đ</p>

              <button class="btn btn-primary w-100">Xem chi tiết</button>
            </div>
          </div>
        </div>

        <!-- Product 4 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow rounded-4 h-100 product-card">
            <img
              src="https://picsum.photos/400/300?4"
              class="card-img-top product-img"
              alt="product"
            />

            <div class="card-body">
              <h5 class="card-title">Tai nghe Bluetooth</h5>

              <p class="text-danger fw-bold">990.000đ</p>

              <button class="btn btn-success w-100">Thêm giỏ hàng</button>
            </div>
          </div>
        </div>

        <!-- Product 5 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow rounded-4 h-100 product-card">
            <span class="badge bg-success position-absolute m-3"> Hot </span>

            <img
              src="https://picsum.photos/400/300?5"
              class="card-img-top product-img"
              alt="product"
            />

            <div class="card-body">
              <h5 class="card-title">Smart Watch</h5>

              <p class="text-danger fw-bold">2.590.000đ</p>

              <button class="btn btn-primary w-100">Mua ngay</button>
            </div>
          </div>
        </div>

        <!-- Product 6 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card shadow rounded-4 h-100 product-card">
            <img
              src="https://picsum.photos/400/300?6"
              class="card-img-top product-img"
              alt="product"
            />

            <div class="card-body">
              <h5 class="card-title">Laptop Gaming</h5>

              <p class="text-danger fw-bold">35.990.000đ</p>

              <button class="btn btn-dark w-100">Xem chi tiết</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Thông tin sản phẩm</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <p>Đây là chức năng xem nhanh sản phẩm bằng Bootstrap Modal.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
