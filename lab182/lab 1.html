<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tính BMI</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        width: 350px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      button:hover {
        background: #0056b3;
      }

      #result {
        margin-top: 20px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
      }

      .gay {
        color: orange;
      }

      .binhthuong {
        color: green;
      }

      .thuacan {
        color: darkorange;
      }

      .beophi {
        color: red;
      }

      .error {
        color: crimson;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>TÍNH CHỈ SỐ BMI</h2>

      <input type="number" id="height" placeholder="Nhập chiều cao (m)" />
      <input type="number" id="weight" placeholder="Nhập cân nặng (kg)" />

      <button onclick="tinhBMI()">Tính BMI</button>

      <div id="result"></div>
    </div>

    <script>
      function tinhBMI() {
        let height = Number(document.getElementById("height").value);
        let weight = Number(document.getElementById("weight").value);

        let result = document.getElementById("result");

        // Kiểm tra dữ liệu
        if (height <= 0 || weight <= 0 || isNaN(height) || isNaN(weight)) {
          result.innerHTML = "Vui lòng nhập dữ liệu hợp lệ!";
          result.className = "error";
          return;
        }

        // Tính BMI
        let bmi = weight / (height * height);

        bmi = bmi.toFixed(2);

        let ketLuan = "";
        let cssClass = "";

        // Phân loại BMI
        if (bmi < 18.5) {
          ketLuan = "Gầy";
          cssClass = "gay";
        } else if (bmi < 25) {
          ketLuan = "Bình thường";
          cssClass = "binhthuong";
        } else if (bmi < 30) {
          ketLuan = "Thừa cân";
          cssClass = "thuacan";
        } else {
          ketLuan = "Béo phì";
          cssClass = "beophi";
        }

        // Hiển thị kết quả
        result.innerHTML = `
                BMI của bạn là: ${bmi} <br>
                Phân loại: ${ketLuan}
            `;

        result.className = cssClass;
      }
    </script>
  </body>
</html>
