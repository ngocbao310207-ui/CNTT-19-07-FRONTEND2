<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Đăng Ký jQuery</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 450px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 5px;
        font-size: 15px;
        box-sizing: border-box;
      }

      .success-input {
        border-color: green;
      }

      .error-input {
        border-color: red;
      }

      .error {
        color: red;
        font-size: 14px;
        margin-top: 5px;
      }

      .success-message {
        color: green;
        text-align: center;
        font-weight: bold;
        margin-top: 15px;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 5px;
        background: #007bff;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>FORM ĐĂNG KÝ</h1>

      <form id="registerForm">
        <!-- Họ tên -->
        <div class="form-group">
          <label>Họ tên</label>

          <input type="text" id="fullName" placeholder="Nhập họ tên" />

          <div class="error" id="nameError"></div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>Email</label>

          <input type="text" id="email" placeholder="Nhập email" />

          <div class="error" id="emailError"></div>
        </div>

        <!-- Số điện thoại -->
        <div class="form-group">
          <label>Số điện thoại</label>

          <input type="text" id="phone" placeholder="Nhập số điện thoại" />

          <div class="error" id="phoneError"></div>
        </div>

        <!-- Mật khẩu -->
        <div class="form-group">
          <label>Mật khẩu</label>

          <input type="password" id="password" placeholder="Nhập mật khẩu" />

          <div class="error" id="passwordError"></div>
        </div>

        <!-- Xác nhận mật khẩu -->
        <div class="form-group">
          <label>Xác nhận mật khẩu</label>

          <input
            type="password"
            id="confirmPassword"
            placeholder="Nhập lại mật khẩu"
          />

          <div class="error" id="confirmError"></div>
        </div>

        <button type="submit">Đăng ký</button>
      </form>

      <div id="successMessage"></div>
    </div>

    <script>
      // Hàm hiển thị lỗi
      function showError(input, errorId, message) {
        input.addClass("error-input");

        input.removeClass("success-input");

        $(errorId).text(message);
      }

      // Hàm hiển thị hợp lệ
      function showSuccess(input, errorId) {
        input.addClass("success-input");

        input.removeClass("error-input");

        $(errorId).text("");
      }

      // Submit form
      $("#registerForm").submit(function (event) {
        // Chặn submit mặc định
        event.preventDefault();

        // Xóa thông báo thành công cũ
        $("#successMessage").html("");

        // Lấy dữ liệu
        const fullName = $("#fullName").val().trim();

        const email = $("#email").val().trim();

        const phone = $("#phone").val().trim();

        const password = $("#password").val().trim();

        const confirmPassword = $("#confirmPassword").val().trim();

        // Regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        const phoneRegex = /^[0-9]{10}$/;

        let isValid = true;

        // Kiểm tra họ tên
        if (fullName === "") {
          showError($("#fullName"), "#nameError", "Vui lòng nhập họ tên");

          isValid = false;
        } else {
          showSuccess($("#fullName"), "#nameError");
        }

        // Kiểm tra email
        if (email === "") {
          showError($("#email"), "#emailError", "Vui lòng nhập email");

          isValid = false;
        } else if (!emailRegex.test(email)) {
          showError($("#email"), "#emailError", "Email không hợp lệ");

          isValid = false;
        } else {
          showSuccess($("#email"), "#emailError");
        }

        // Kiểm tra số điện thoại
        if (phone === "") {
          showError($("#phone"), "#phoneError", "Vui lòng nhập số điện thoại");

          isValid = false;
        } else if (!phoneRegex.test(phone)) {
          showError($("#phone"), "#phoneError", "Số điện thoại phải gồm 10 số");

          isValid = false;
        } else {
          showSuccess($("#phone"), "#phoneError");
        }

        // Kiểm tra mật khẩu
        if (password === "") {
          showError($("#password"), "#passwordError", "Vui lòng nhập mật khẩu");

          isValid = false;
        } else if (password.length < 6) {
          showError(
            $("#password"),
            "#passwordError",
            "Mật khẩu tối thiểu 6 ký tự"
          );

          isValid = false;
        } else {
          showSuccess($("#password"), "#passwordError");
        }

        // Kiểm tra xác nhận mật khẩu
        if (confirmPassword === "") {
          showError(
            $("#confirmPassword"),
            "#confirmError",
            "Vui lòng xác nhận mật khẩu"
          );

          isValid = false;
        } else if (confirmPassword !== password) {
          showError(
            $("#confirmPassword"),
            "#confirmError",
            "Mật khẩu không khớp"
          );

          isValid = false;
        } else {
          showSuccess($("#confirmPassword"), "#confirmError");
        }

        // Thành công
        if (isValid) {
          $("#successMessage").html(
            "<div class='success-message'>Đăng ký thành công!</div>"
          );

          $("#registerForm")[0].reset();

          $("input").removeClass("success-input");
        }
      });
    </script>
  </body>
</html>
