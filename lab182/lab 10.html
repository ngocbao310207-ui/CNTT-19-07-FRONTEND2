<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiển Thị Dữ Liệu API</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      #loading {
        text-align: center;
        font-size: 18px;
        color: #007bff;
        margin-bottom: 15px;
      }

      .user-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
      }

      .card {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 8px;
        border-left: 5px solid #007bff;
      }

      .card h3 {
        margin: 0 0 10px;
      }

      .error {
        color: red;
        text-align: center;
        font-weight: bold;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        background: #007bff;
        color: white;
        cursor: pointer;
        margin-bottom: 20px;
      }

      button:hover {
        background: #0056b3;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>DANH SÁCH NGƯỜI DÙNG</h1>

      <button onclick="loadUsers()">Tải dữ liệu</button>

      <div id="loading"></div>

      <div id="userList" class="user-list"></div>
    </div>

    <script>
      // API mẫu mockapi.io
      // Thay URL này bằng API của bạn
      const API_URL = "https://664f2c62fafad45dfae0b6c2.mockapi.io/users";

      // Hàm fetch dữ liệu
      async function loadUsers() {
        const loading = document.getElementById("loading");

        const userList = document.getElementById("userList");

        // Hiển thị loading
        loading.innerHTML = "Đang tải dữ liệu...";

        userList.innerHTML = "";

        try {
          // Gọi API
          const response = await fetch(API_URL);

          // Chuyển JSON
          const users = await response.json();

          // Xóa loading
          loading.innerHTML = "";

          // Render dữ liệu
          renderUsers(users);
        } catch (error) {
          loading.innerHTML = "<div class='error'>Không thể tải dữ liệu!</div>";

          console.log(error);
        }
      }

      // Hàm render
      function renderUsers(users) {
        const userList = document.getElementById("userList");

        users.forEach((user) => {
          const card = document.createElement("div");

          card.classList.add("card");

          card.innerHTML = `
                    <h3>${user.name}</h3>

                    <p>
                        <strong>Email:</strong>
                        ${user.email}
                    </p>

                    <p>
                        <strong>Tuổi:</strong>
                        ${user.age}
                    </p>

                    <p>
                        <strong>ID:</strong>
                        ${user.id}
                    </p>
                `;

          userList.appendChild(card);
        });
      }

      // Tự động tải khi mở trang
      loadUsers();
    </script>
  </body>
</html>
