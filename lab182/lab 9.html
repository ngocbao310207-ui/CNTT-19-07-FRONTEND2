<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Công Việc</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        padding-top: 50px;
      }

      .container {
        width: 500px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      .input-group {
        display: flex;
        gap: 10px;
      }

      input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        color: white;
      }

      #addBtn {
        background: #28a745;
      }

      .complete-btn {
        background: #007bff;
      }

      .delete-btn {
        background: #dc3545;
      }

      button:hover {
        opacity: 0.8;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f9f9f9;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
      }

      .completed {
        text-decoration: line-through;
        color: gray;
        background: #e0e0e0;
      }

      .actions {
        display: flex;
        gap: 5px;
      }

      .filter-group {
        margin-top: 15px;
        text-align: center;
      }

      .filter-group button {
        background: #6c757d;
        margin: 0 5px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>QUẢN LÝ CÔNG VIỆC</h1>

      <div class="input-group">
        <input type="text" id="taskInput" placeholder="Nhập công việc..." />

        <button id="addBtn">Thêm</button>
      </div>

      <div class="filter-group">
        <button onclick="locCongViec('all')">Tất cả</button>

        <button onclick="locCongViec('completed')">Hoàn thành</button>

        <button onclick="locCongViec('pending')">Chưa hoàn thành</button>
      </div>

      <ul id="taskList"></ul>
    </div>

    <script>
      // Lấy dữ liệu từ localStorage
      let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

      // DOM
      const taskInput = document.getElementById("taskInput");

      const addBtn = document.getElementById("addBtn");

      const taskList = document.getElementById("taskList");

      // Render danh sách
      function renderTasks(data = tasks) {
        taskList.innerHTML = "";

        data.forEach((task, index) => {
          // Tạo thẻ li
          const li = document.createElement("li");

          // Nếu hoàn thành
          if (task.completed) {
            li.classList.add("completed");
          }

          // Nội dung công việc
          li.innerHTML = `
                    <span>${task.name}</span>

                    <div class="actions">

                        <button
                            class="complete-btn"
                            onclick="toggleComplete(${index})"
                        >
                            ✔
                        </button>

                        <button
                            class="delete-btn"
                            onclick="deleteTask(${index})"
                        >
                            ✖
                        </button>

                    </div>
                `;

          taskList.appendChild(li);
        });

        // Lưu localStorage
        localStorage.setItem("tasks", JSON.stringify(tasks));
      }

      // Thêm công việc
      function addTask() {
        const taskName = taskInput.value.trim();

        if (taskName === "") {
          alert("Vui lòng nhập công việc!");

          return;
        }

        // Thêm vào mảng
        tasks.push({
          name: taskName,
          completed: false,
        });

        taskInput.value = "";

        renderTasks();
      }

      // Đánh dấu hoàn thành
      function toggleComplete(index) {
        tasks[index].completed = !tasks[index].completed;

        renderTasks();
      }

      // Xóa công việc
      function deleteTask(index) {
        tasks.splice(index, 1);

        renderTasks();
      }

      // Lọc công việc
      function locCongViec(type) {
        if (type === "completed") {
          const completedTasks = tasks.filter((task) => task.completed);

          renderTasks(completedTasks);
        } else if (type === "pending") {
          const pendingTasks = tasks.filter((task) => !task.completed);

          renderTasks(pendingTasks);
        } else {
          renderTasks(tasks);
        }
      }

      // Event thêm công việc
      addBtn.addEventListener("click", addTask);

      // Enter để thêm
      taskInput.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
          addTask();
        }
      });

      // Hiển thị ban đầu
      renderTasks();
    </script>
  </body>
</html>
