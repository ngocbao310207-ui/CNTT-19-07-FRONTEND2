<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 14 - Hiệu ứng giao diện với jQuery</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); width: 100%; max-width: 440px; }
        h2 { font-weight: 600; margin-bottom: 20px; text-align: center; color: #111; }
        
        .alert-box { background: #fafafa; border: 1px solid #eee; padding: 25px; border-radius: 8px; text-align: center; font-size: 14px; margin-bottom: 20px; color: #444; }
        .alert-box strong { display: block; font-size: 16px; margin-bottom: 8px; color: #000; }
        
        .highlight-active { background: #f4f4f4 !important; border: 1px solid #111 !important; box-shadow: inset 0 0 8px rgba(0,0,0,0.02); }

        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        button { padding: 11px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-effect { background: #eee; color: #333; }
        .btn-effect:hover { background: #ddd; }
        .btn-action { background: #111; color: #fff; grid-column: span 2; }
        .btn-action:hover { background: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>jQuery Effects & Chaining</h2>
    
    <div id="notifyBox" class="alert-box">
        <strong>Thông Báo Hệ Thống</strong>
        Tiến trình biên dịch mã nguồn hoàn tất. Giao diện được thiết lập tốc độ hiệu ứng chuẩn 400ms giúp trải nghiệm chuyển động mượt mà.
    </div>

    <div class="btn-grid">
        <button class="btn-effect" id="btnFade">Fade In / Out</button>
        <button class="btn-effect" id="btnSlide">Slide Up / Down</button>
        <button class="btn-action" id="btnChainHighlight">Chaining (Hiệu Ứng Liên Tiếp + Highlight)</button>
    </div>
</div>

<script>
$(document).ready(function() {
    const duration = 400;

    $('#btnFade').click(function() {
        $('#notifyBox').fadeToggle(duration);
    });

    $('#btnSlide').click(function() {
        $('#notifyBox').slideToggle(duration);
    });

    $('#btnChainHighlight').click(function() {
        $('#notifyBox')
            .slideUp(duration)
            .queue(function(next) {
                $(this).toggleClass('highlight-active');
                next();
            })
            .slideDown(duration);
    });
});
</script>
</body>
</html>
