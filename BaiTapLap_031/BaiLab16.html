<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 16 - Bộ đếm tương tác jQuery</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .card { background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px; text-align: center; }
        h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; color: #888; letter-spacing: 1px; margin-bottom: 15px; }
        
        .counter-value { font-size: 64px; font-weight: 700; color: #222; margin: 10px 0; transition: color 0.2s; }
        .counter-value.positive { color: #15803d; }
        .counter-value.negative { color: #b91c1c; }
        
        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        button { padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-action { background: #111; color: #fff; }
        .btn-action:hover { background: #333; }
        .btn-reset { grid-column: span 2; background: #eee; color: #333; }
        .btn-reset:hover { background: #ddd; }
    </style>
</head>
<body>

<div class="card">
    <h2>Interaction Counter</h2>
    <div id="lblCounter" class="counter-value">0</div>
    
    <div class="btn-grid">
        <button class="btn-action" id="btnDecrement">- 1</button>
        <button class="btn-action" id="btnIncrement">+ 1</button>
        <button class="btn-action" id="btnFastIncrement" style="grid-column: span 2; background: #555;">+ 10 (Tăng Nhanh)</button>
        <button class="btn-reset" id="btnReset">Đặt lại (Reset)</button>
    </div>
</div>

<script>
$(document).ready(function() {
    let count = 0;

    function updateUI() {
        $('#lblCounter').text(count);

        $('#lblCounter').removeClass('positive negative');
        if (count > 0) {
            $('#lblCounter').addClass('positive');
        } else if (count < 0) {
            $('#lblCounter').addClass('negative');
        }
    }

    $('#btnIncrement').click(function() {
        count += 1;
        updateUI();
    });

    $('#btnDecrement').click(function() {
        count -= 1;
        updateUI();
    });

    $('#btnFastIncrement').click(function() {
        count += 10;
        updateUI();
    });

    $('#btnReset').click(function() {
        count = 0;
        updateUI();
    });
});
</script>
</body>
</html>
