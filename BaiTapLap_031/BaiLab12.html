<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 12 - Quản lý sinh viên với API</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; color: #333; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        
        .panel-form { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); height: fit-content; }
        h3 { font-weight: 600; margin-bottom: 15px; color: #111; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; font-weight: 500; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fafafa; }
        input[type="text"]:focus { border-color: #222; background: #fff; outline: none; }
        button { width: 100%; padding: 11px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-submit { background: #111; color: #fff; margin-top: 10px; }
        .btn-submit:hover { background: #333; }
        
        .panel-data { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); }
        .search-bar { margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f5; font-weight: 600; color: #555; }
        tr:hover { background-color: #fafafa; }
        
        .btn-delete { background: none; color: #b91c1c; font-size: 12px; font-weight: 600; width: auto; padding: 4px 8px; border-radius: 4px; }
        .btn-delete:hover { background: #fdf2f2; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel-form">
        <h3 id="formTitle">Thêm Sinh Viên</h3>
        <div class="form-group">
            <label for="txtCode">Mã sinh viên (MSSV):</label>
            <input type="text" id="txtCode" placeholder="Ví dụ: DNU2601">
        </div>
        <div class="form-group">
            <label for="txtName">Họ và tên:</label>
            <input type="text" id="txtName" placeholder="Ví dụ: Nguyễn Văn A">
        </div>
        <div class="form-group">
            <label for="txtClass">Lớp học danh nghĩa:</label>
            <input type="text" id="txtClass" placeholder="Ví dụ: CNTT12-01">
        </div>
        <button class="btn-submit" onclick="saveStudent()">Lưu thông tin</button>
    </div>

    <div class="panel-data">
        <h3>Danh Sách Sinh Viên</h3>
        
        <div class="search-bar">
            <input type="text" id="txtSearchName" placeholder="🔍 Nhập từ khóa tìm kiếm sinh viên theo tên..." oninput="fetchStudents()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>MSSV</th>
                    <th>Họ và Tên</th>
                    <th>Lớp</th>
                    <th style="text-align: center;">Thao tác</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                <tr><td colspan="4" style="text-align:center; color:#999;">Đang tải danh sách sinh viên...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>

const STUDENT_API = "https://6654be941c6afcebc6af5403.mockapi.io/api/v1/students";

async function fetchStudents() {
    const tbody = document.getElementById('studentTableBody');
    const searchKey = document.getElementById('txtSearchName').value.trim();
    
    try {
        let url = STUDENT_API;
        if(searchKey) {
            url += `?name=${encodeURIComponent(searchKey)}`;
        }

        const response = await fetch(url);
        if(!response.ok) throw new Error("Không thể kết nối danh sách dữ liệu học viên.");
        
        const students = await response.json();
        
        tbody.innerHTML = '';

        if(students.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">Không có sinh viên nào khớp với từ khóa tìm kiếm.</td></tr>`;
            return;
        }

        students.forEach(st => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b>${st.studentCode}</b></td>
                <td>${st.name}</td>
                <td><span style="color:#666;">${st.className}</span></td>
                <td style="text-align: center;">
                    <button class="btn-delete" onclick="deleteStudent('${st.id}')">Xóa</button>
                </td>
            `;
            tbody.appendChild(row);
        });

    } catch (error) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#c62828;">❌ Lỗi: ${error.message}</td></tr>`;
    }
}

async function saveStudent() {
    const studentCode = document.getElementById('txtCode').value.trim();
    const name = document.getElementById('txtName').value.trim();
    const className = document.getElementById('txtClass').value.trim();

    if(!studentCode || !name || !className) {
        alert("Vui lòng điền đầy đủ tất cả các trường dữ liệu yêu cầu!");
        return;
    }

    const studentPayload = {
        studentCode: studentCode,
        name: name,
        className: className
    };

    try {
        const response = await fetch(STUDENT_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(studentPayload)
        });

        if(!response.ok) throw new Error("Gửi lệnh thêm mới học viên thất bại.");

        document.getElementById('txtCode').value = '';
        document.getElementById('txtName').value = '';
        document.getElementById('txtClass').value = '';

        alert("🎉 Thêm mới sinh viên thành công!");
        fetchStudents();

    } catch (error) {
        alert(`⚠️ Đã xảy ra lỗi: ${error.message}`);
    }
}

async function deleteStudent(id) {
    if(!confirm("Bạn có chắc chắn muốn xóa sinh viên này khỏi hệ thống cơ sở dữ liệu không?")) {
        return;
    }

    try {
        const deleteUrl = `${STUDENT_API}/${id}`;
        const response = await fetch(deleteUrl, { method: 'DELETE' });

        if(!response.ok) throw new Error("Máy chủ từ chối thực hiện lệnh xóa bản ghi.");

        alert("Đã xóa thông tin sinh viên thành công!");
        fetchStudents();

    } catch (error) {
        alert(`⚠️ Lỗi xóa dữ liệu: ${error.message}`);
    }
}

window.onload = fetchStudents;
</script>
</body>
</html>
