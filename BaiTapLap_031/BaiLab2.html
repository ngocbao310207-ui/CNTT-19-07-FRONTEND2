<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 02 - Tính Toán Khuyến Mãi</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        h2 { font-weight: 600; margin-bottom: 20px; text-align: center; color: #111; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #666; font-weight: 500; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; background: #fafafa; }
        input:focus, select:focus { border-color: #222; background: #fff; outline: none; }
        button { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background: #333; }
        .invoice { margin-top: 25px; border-top: 1px dashed #ddd; padding-top: 20px; display: none; }
        .invoice-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .invoice-row.total { font-size: 18px; font-weight: 700; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; color: #000; }
        .badge { font-size: 12px; color: #15803d; background: #dfced7; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: #e8f5e9;}
    </style>
</head>
<body>

<div class="card">
    <h2>Hóa Đơn Thanh Toán</h2>
    <div class="form-group">
        <label for="orderValue">Giá trị đơn hàng (VNĐ):</label>
        <input type="number" id="orderValue" placeholder="Nhập tổng số tiền tiền">
    </div>
    <div class="form-group">
        <label for="memberClass">Hạng thành viên:</label>
        <select id="memberClass">
            <option value="Standard">Standard (Thường)</option>
            <option value="Silver">Silver (Bạc)</option>
            <option value="Gold">Gold (Vàng)</option>
        </select>
    </div>
    <button onclick="processPayment()">Tính Tổng Tiền</button>

    <div class="invoice" id="invoiceBox">
        <div class="invoice-row"><span>Tiền gốc:</span><span id="lblOriginal">0đ</span></div>
        <div class="invoice-row"><span>Tỷ lệ giảm:</span><span id="lblRate">0%</span></div>
        <div class="invoice-row"><span>Số tiền giảm:</span><span id="lblDiscount">0đ</span></div>
        <div class="invoice-row" id="shippingRow"><span>Phí vận chuyển:</span><span id="lblShipping">0đ</span></div>
        <div class="invoice-row total"><span>Tổng thanh toán:</span><span id="lblTotal">0đ</span></div>
    </div>
</div>

<script>
function formatCurrency(amount) {
    return amount.toLocaleString('vi-VN', { style: 'currency', currency: 'VND' });
}

function processPayment() {
    const orderInput = document.getElementById('orderValue').value;
    if(!orderInput || Number(orderInput) < 0) {
        alert("Vui lòng nhập giá trị đơn hàng hợp lệ lớn hơn hoặc bằng 0!");
        return;
    }

    const originalValue = Number(orderInput);
    const memberClass = document.getElementById('memberClass').value;

    const discountRate = getDiscountRate(originalValue, memberClass);
    const discountAmount = originalValue * discountRate;
    
    let shippingFee = 30000;
    let isFreeShip = false;
    if(originalValue >= 500000) {
        shippingFee = 0;
        isFreeShip = true;
    }

    const finalTotal = originalValue - discountAmount + shippingFee;

    document.getElementById('lblOriginal').innerText = formatCurrency(originalValue);
    document.getElementById('lblRate').innerText = (discountRate * 100) + "%";
    document.getElementById('lblDiscount').innerText = "-" + formatCurrency(discountAmount);
    
    if(isFreeShip) {
        document.getElementById('lblShipping').innerHTML = `<span class="badge">Freeship</span> ${formatCurrency(0)}`;
    } else {
        document.getElementById('lblShipping').innerText = formatCurrency(shippingFee);
    }
    
    document.getElementById('lblTotal').innerText = formatCurrency(finalTotal);
    document.getElementById('invoiceBox').style.display = 'block';
}

function getDiscountRate(amount, member) {
    if (amount >= 1000000) {
        if (member === "Gold") return 0.15;
        if (member === "Silver") return 0.12; 
        return 0.10;
    } else if (amount >= 500000) { 
        if (member === "Gold") return 0.10;
        if (member === "Silver") return 0.07;
        return 0.05;
    } else if (amount >= 200000) { 
        if (member === "Gold") return 0.05;
        return 0.02;
    }
    return 0;
}
</script>
</body>
</html>
