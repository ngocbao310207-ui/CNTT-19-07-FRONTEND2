<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 03 - Trò Chơi Đoán Số</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 420px; text-align: center; }
        h2 { font-weight: 600; margin-bottom: 10px; color: #111; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; text-align: center; background: #fafafa; }
        input:focus { border-color: #222; background: #fff; outline: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button.btn-main { background: #111; color: #fff; }
        button.btn-main:hover { background: #333; }
        button.btn-reset { background: #eee; color: #333; }
        button.btn-reset:hover { background: #ddd; }
        .message { margin-top: 20px; padding: 12px; border-radius: 6px; font-size: 14px; font-weight: 500; min-height: 45px; line-height: 22px; }
        .status-neutral { background: #f1f3f5; color: #495057; }
        .status-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .status-fail { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .history { margin-top: 20px; text-align: left; border-top: 1px dashed #ddd; padding-top: 15px; }
        .history h4 { font-size: 13px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        .history-list { max-height: 100px; overflow-y: auto; font-size: 13px; color: #555; padding-left: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Đoán Số Bí Mật</h2>
    <p class="subtitle">Hệ thống đã chọn ngẫu nhiên một số từ <b>1 đến 100</b>.<br>Bạn có tối đa <b>7 lượt</b> thử!</p>
    
    <div class="form-group">
        <input type="number" id="guessInput" min="1" max="100" placeholder="Nhập số bạn đoán...">
    </div>

    <div class="btn-group">
        <button class="btn-main" id="btnCheck" onclick="checkGuess()">Kiểm tra</button>
        <button class="btn-reset" onclick="initGame()">Chơi lại</button>
    </div>

    <div id="msgBox" class="message status-neutral">Hãy bắt đầu lượt đoán đầu tiên!</div>

    <div class="history">
        <h4>Lịch sử dự đoán:</h4>
        <ul id="historyList" class="history-list"></ul>
    </div>
</div>

<script>
let secretHeading;
let attemptsCount;
const maxAttempts = 7;

function initGame() {
    secretNumber = Math.floor(Math.random() * 100) + 1; 
    attemptsCount = 0;
    
    document.getElementById('guessInput').value = '';
    document.getElementById('guessInput').disabled = false;
    document.getElementById('btnCheck').disabled = false;
    
    const msgBox = document.getElementById('msgBox');
    msgBox.className = "message status-neutral";
    msgBox.innerHTML = "Trò chơi mới bắt đầu. Hãy nhập một số!";
    
    document.getElementById('historyList').innerHTML = '';
}

function checkGuess() {
    const inputElement = document.getElementById('guessInput');
    const userGuessInput = inputElement.value;
    const msgBox = document.getElementById('msgBox');
    const historyList = document.getElementById('historyList');

    if(!userGuessInput) {
        alert("Vui lòng không để trống ô dự đoán!");
        return;
    }

    const userGuess = Number(userGuessInput);
    if(userGuess < 1 || userGuess > 100) {
        alert("Vui lòng nhập số nằm trong phạm vi từ 1 đến 100!");
        return;
    }

    attemptsCount++;
    let li = document.createElement('li');

    if (userGuess === secretNumber) {
        msgBox.className = "message status-success";
        msgBox.innerHTML = `🎉 Chính xác! Số bí mật là <b>${secretNumber}</b>.<br>Bạn đã chiến thắng sau <b>${attemptsCount}</b> lượt thử!`;
        endGame();
        li.innerHTML = `Lượt ${attemptsCount}: Đoán <b>${userGuess}</b> - Chính xác!`;
    } else {
        let hint = userGuess > secretNumber ? "LỚN HƠN" : "NHỎ HƠN";
        li.innerHTML = `Lượt ${attemptsCount}: Đoán <b>${userGuess}</b> - (${hint} số bí mật)`;
        
        if (attemptsCount >= maxAttempts) {
            msgBox.className = "message status-fail";
            msgBox.innerHTML = `💥 Bạn đã hết lượt! Trò chơi kết thúc.<br>Số bí mật là: <b>${secretNumber}</b>.`;
            endGame();
        } else {
            msgBox.className = "message status-neutral";
            msgBox.innerHTML = `Số bạn đoán đang <b>${hint}</b> số bí mật.<br>Bạn còn <b>${maxAttempts - attemptsCount}</b> lượt thử.`;
        }
    }
    
    historyList.appendChild(li);
    inputElement.value = '';
    inputElement.focus();
}

function endGame() {
    document.getElementById('guessInput').disabled = true;
    document.getElementById('btnCheck').disabled = true;
}

window.onload = initGame;
</script>
</body>
</html>
