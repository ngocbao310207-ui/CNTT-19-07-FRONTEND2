<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 22 - Biểu mẫu đăng nhập Responsive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .login-card { background: #ffffff; border: none; border-radius: 12px; box-shadow: 0 4px 25px rgba(0, 0, 0, 0.04); }
        .form-control:focus { border-color: #111; box-shadow: none; background-color: #fff; }
        .btn-dark { background-color: #111; border: none; font-weight: 600; padding: 11px; }
        .btn-dark:hover { background-color: #333; }
        .link-muted { color: #666; text-decoration: none; font-size: 14px; font-weight: 500; }
        .link-muted:hover { color: #111; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="card login-card p-4 p-sm-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark tracking-tight mb-1">Đăng Nhập</h2>
                <p class="text-muted small">Chào mừng bạn quay trở lại với hệ thống</p>
            </div>
            
            <form id="loginForm" onsubmit="event.preventDefault(); alert('Đăng nhập thành công!');">
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary small fw-medium">Địa chỉ Email</label>
                    <input type="email" class="form-control p-2.5 bg-light border-light-subtle" id="email" placeholder="name@domain.com" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label text-secondary small fw-medium">Mật khẩu</label>
                    <input type="password" class="form-control p-2.5 bg-light border-light-subtle" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-secondary small user-select-none" for="rememberMe">Ghi nhớ tôi</label>
                    </div>
                    <a href="#" class="link-muted small">Quên mật khẩu?</a>
                </div>
                
                <button type="submit" class="btn btn-dark w-100 rounded-2 text-uppercase fs-7 letter-spacing shadow-sm">Đăng Nhập</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
