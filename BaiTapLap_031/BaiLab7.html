<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 07 - Thao tác DOM cơ bản</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .card { background: #fff; padding: 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); width: 100%; max-width: 440px; text-align: center; transition: all 0.4s ease; }
        
        .card.dark-theme { background: #111; color: #eee; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card.dark-theme h2 { color: #fff; }
        .card.dark-theme p { color: #aaa; }
        .card.dark-theme .btn-secondary { background: #222; color: #fff; border-color: #333; }
        
        h2 { font-weight: 600; margin-bottom: 12px; color: #111; transition: color 0.3s; }
        p { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.6; transition: color 0.3s; }
        
        .img-container { width: 100%; height: 200px; border-radius: 8px; overflow: hidden; background: #f1f3f5; margin-bottom: 25px; border: 1px solid #eee; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #111; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-secondary { background: #fff; color: #333; border: 1px solid #ddd; }
        .btn-secondary:hover { background: #f8f9fa; border-color: #111; }
    </style>
</head>
<body>

<div class="card" id="domCard">
    <h2 id="mainTitle">Chế Độ Ban Ngày</h2>
    <p id="description">Đây là giao diện mặc định sử dụng tone màu sáng, giúp tối ưu hóa khả năng đọc và tập trung vào nội dung văn bản.</p>
    
    <div class="img-container">
        <img id="featureImage" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500" alt="Landscape">
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="changeContent()">Đổi Trạng Thái</button>
        <button class="btn-secondary" onclick="resetContent()">Khôi Phục</button>
    </div>
</div>

<script>
const originalData = {
    title: "Chế Độ Ban Ngày",
    desc: "Đây là giao diện mặc định sử dụng tone màu sáng, giúp tối ưu hóa khả năng đọc và tập trung vào nội dung văn bản.",
    imgSrc: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500"
};

function changeContent() {
    const title = document.getElementById('mainTitle');
    const desc = document.getElementById('description');
    const img = document.getElementById('featureImage');
    const card = document.getElementById('domCard');

    title.innerText = "Chế Độ Ban Đêm";
    desc.innerText = "Giao diện đã chuyển sang chế độ Dark Mode tối giản, giảm thiểu ánh sáng xanh bảo vệ mắt khi làm việc ban đêm.";

    img.src = "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500";

    card.classList.add('dark-theme');
}

function resetContent() {
    const title = document.getElementById('mainTitle');
    const desc = document.getElementById('description');
    const img = document.getElementById('featureImage');
    const card = document.getElementById('domCard');

    title.innerText = originalData.title;
    desc.innerText = originalData.desc;
    img.src = originalData.imgSrc;
    
    card.classList.remove('dark-theme');
}
</script>
</body>
</html>
