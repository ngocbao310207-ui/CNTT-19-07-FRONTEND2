<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 01 - Tính Chỉ Số BMI</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        .card { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); width: 100%; max-width: 400px; }
        h2 { font-weight: 600; margin-bottom: 20px; text-align: center; color: #111; letter-spacing: -0.5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #666; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; transition: all 0.3s; background: #fafafa; }
        input:focus { border-color: #222; background: #fff; outline: none; }
        button { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #333; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-size: 15px; display: none; border: 1px solid transparent; }
        .error { background-color: #fdf2f2; color: #ec5959; border-color: #fbe3e3; }
        .gay { background-color: #fef7ea; color: #f0a01f; border-color: #fdf0d5; }
        .binhthuong { background-color: #f0fdf4; color: #15803d; border-color: #dcfce7; }
        .thuacan { background-color: #fff7ed; color: #c2410c; border-color: #ffedd5; }
        .beophi { background-color: #fdf2f2; color: #b91c1c; border-color: #fee2e2; }
    </style>
</head>
<body>

<div class="card">
    <h2>Tính Chỉ Số BMI</h2>
    <div class="form-group">
        <label for="height">Chiều cao (m):</label>
        <input type="number" id="height" step="0.01" placeholder="Ví dụ: 1.72">
    </div>
    <div class="form-group">
        <label for="weight">Cân nặng (kg):</label>
        <input type="number" id="weight" step="0.1" placeholder="Ví dụ: 65">
    </div>
    <button onclick="calculateBMI()">Tính toán</button>
    <div id="result" class="result-box"></div>
</div>

<script>
function calculateBMI() {
    const heightInput = document.getElementById('height').value;
    const weightInput = document.getElementById('weight').value;
    const resultDiv = document.getElementById('result');
    
    resultDiv.className = "result-box";
    resultDiv.style.display = "none";

    if (!heightInput || !weightInput) {
        resultDiv.innerHTML = "Vui lòng nhập đầy đủ chiều cao và cân nặng!";
        resultDiv.classList.add('error');
        resultDiv.style.display = "block";
        return;
    }

    const height = Number(heightInput);
    const weight = Number(weightInput);

    if (height <= 0 || weight <= 0) {
        resultDiv.innerHTML = "Giá trị nhập vào phải lớn hơn 0!";
        resultDiv.classList.add('error');
        resultDiv.style.display = "block";
        return;
    }

    const bmi = (weight / (height * height)).toFixed(2);
    let category = "";
    let colorClass = "";

    if (bmi < 18.5) {
        category = "Gầy";
        colorClass = "gay";
    } else if (bmi >= 18.5 && bmi < 24.9) {
        category = "Bình thường";
        colorClass = "binhthuong";
    } else if (bmi >= 25 && bmi < 29.9) {
        category = "Thừa cân";
        colorClass = "thuacan";
    } else {
        category = "Béo phì";
        colorClass = "beophi";
    }

    resultDiv.innerHTML = `Chỉ số BMI của bạn: <strong>${bmi}</strong><br>Thể trạng: <strong>${category}</strong>`;
    resultDiv.classList.add(colorClass);
    resultDiv.style.display = "block";
}
</script>
</body>
</html>
