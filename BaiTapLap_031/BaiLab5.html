<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 05 - Quản lý sản phẩm</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; padding: 20px; }
        .card { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 650px; }
        h2 { font-weight: 600; margin-bottom: 20px; text-align: center; color: #111; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .toolbar input, .toolbar select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fafafa; }
        .search-input { flex: 2; min-width: 150px; }
        .filter-select { flex: 1; min-width: 120px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #faffa0; font-weight: 600; color: #555; background: #f1f3f5; }
        tr:hover { background-color: #fafafa; }
        .summary-box { background: #f8f9fa; padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; font-weight: 600; font-size: 15px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>Quản Lý Danh Sách Sản Phẩm</h2>
    
    <div class="toolbar">
        <input type="text" id="txtSearch" class="search-input" placeholder="Tìm kiếm theo tên sản phẩm..." oninput="handleFilterData()">
        <select id="selPriceFilter" class="filter-select" onchange="handleFilterData()">
            <option value="all">Tất cả mức giá</option>
            <option value="under5">Dưới 5 triệu</option>
            <option value="above5">Từ 5 triệu trở lên</option>
        </select>
        <select id="selSort" class="filter-select" onchange="handleFilterData()">
            <option value="none">Sắp xếp: Không</option>
            <option value="asc">Giá: Tăng dần</option>
            <option value="desc">Giá: Giảm dần</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>Tên sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
    </table>

    <div class="summary-box">
        <span>Tổng giá trị tồn kho toàn hệ thống:</span>
        <span id="lblTotalStock" style="color: #000;">0đ</span>
    </div>
</div>

<script>
const originalProducts = [
    { id: 1, name: "iPhone 13 Mini", price: 14500000, quantity: 5 },
    { id: 2, name: "Samsung Galaxy A54", price: 7800000, quantity: 12 },
    { id: 3, name: "Xiaomi Redmi Note 12", price: 4200000, quantity: 20 },
    { id: 4, name: "Oppo A78", price: 5900000, quantity: 8 },
    { id: 5, name: "Realme C55", price: 3500000, quantity: 15 }
];

function formatVND(amount) {
    return amount.toLocaleString('vi-VN', { style: 'currency', currency: 'VND' });
}

function renderTable(productsList) {
    const tbody = document.getElementById('productTableBody');
    tbody.innerHTML = '';

    if(productsList.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">Không tìm thấy sản phẩm phù hợp!</td></tr>`;
        return;
    }

    productsList.forEach(prod => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><strong>${prod.name}</strong></td>
            <td>${formatVND(prod.price)}</td>
            <td>${prod.quantity}</td>
            <td>${formatVND(prod.price * prod.quantity)}</td>
        `;
        tbody.appendChild(row);
    });
}

function calculateTotalInventory() {
    const total = originalProducts.reduce((sum, prod) => sum + (prod.price * prod.quantity), 0);
    document.getElementById('lblTotalStock').innerText = formatVND(total);
}

function handleFilterData() {
    const searchKey = document.getElementById('txtSearch').value.trim().toLowerCase();
    const priceFilter = document.getElementById('selPriceFilter').value;
    const sortOrder = document.getElementById('selSort').value;

    let result = originalProducts.filter(prod => prod.name.toLowerCase().includes(searchKey));

    if (priceFilter === "under5") {
        result = result.filter(prod => prod.price < 5000000);
    } else if (priceFilter === "above5") {
        result = result.filter(prod => prod.price >= 5000000);
    }

    if (sortOrder === "asc") {
        result.sort((a, b) => a.price - b.price);
    } else if (sortOrder === "desc") {
        result.sort((a, b) => b.price - a.price);
    }

    renderTable(result);
}

window.onload = function() {
    renderTable(originalProducts);
    calculateTotalInventory();
}
</script>
</body>
</html>
