    <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 08 - METRICAL STATE COUNTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-cyber: #0a0502;
            --panel-bg: rgba(24, 11, 4, 0.85);
            --neon-orange: #ff6c00;
            --neon-green: #39ff14;
            --neon-red: #ff1453;
            --text-main: #ecdcd3;
            --border-glow: rgba(255, 108, 0, 0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-cyber); color: var(--text-main);
            font-family: 'Share Tech Mono', monospace; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 999; background-size: 100% 4px; pointer-events: none;
        }
        .grid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-glow) 1px, transparent 1px), linear-gradient(90deg, var(--border-glow) 1px, transparent 1px);
            background-size: 35px 35px; z-index: -1;
        }
        nav {
            background: rgba(10, 5, 2, 0.95); border-bottom: 2px solid var(--border-glow);
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-brand { display: flex; align-items: center; gap: 1rem; }
        .dnu-logo { height: 60px; filter: drop-shadow(0 0 8px var(--neon-orange)); }
        .brand-text .title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 900; color: #fff; }
        .brand-text .subtitle { font-size: 0.8rem; color: var(--neon-orange); }
        .container { max-width: 600px; width: 100%; margin: 3rem auto; padding: 0 1.5rem; }
        .counter-panel {
            background: var(--panel-bg); border: 1px solid var(--border-glow); padding: 2.5rem 2rem; text-align: center;
            clip-path: polygon(0 0, calc(100% - 25px) 0, 100% 25px, 100% 100%, 25px 100%, 0 calc(100% - 25px));
            box-shadow: inset 0 0 20px rgba(255, 108, 0, 0.03), 0 0 25px rgba(0,0,0,0.6);
        }
        .panel-heading {
            font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #fff; margin-bottom: 2rem;
            display: flex; justify-content: center; align-items: center; gap: 0.5rem;
            border-bottom: 1px dashed rgba(255,255,255,0.08); padding-bottom: 1rem;
        }
        .counter-screen {
            font-family: 'Orbitron', sans-serif; font-size: 5.5rem; font-weight: 900;
            background: #030100; border: 1px solid rgba(255,255,255,0.02);
            margin-bottom: 2rem; padding: 1rem; position: relative; transition: color 0.3s;
        }
        .counter-screen::before { content: "STATE_VALUE //"; position: absolute; top: 0.5rem; left: 0.75rem; font-size: 0.75rem; color: #57453b; font-family: 'Share Tech Mono', monospace; font-weight: normal; }
        .val-zero { color: var(--neon-orange); text-shadow: 0 0 20px rgba(255, 108, 0, 0.4); }
        .val-pos { color: var(--neon-green) !important; text-shadow: 0 0 20px rgba(57, 255, 20, 0.4) !important; }
        .val-neg { color: var(--neon-red) !important; text-shadow: 0 0 20px rgba(255, 20, 83, 0.4) !important; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
        .btn-core {
            background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 0.85rem;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.9rem; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }
        .btn-inc { border-color: var(--neon-green); color: var(--neon-green); }
        .btn-inc:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 12px rgba(57,255,20,0.3); }
        .btn-dec { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-dec:hover { background: var(--neon-red); color: #fff; box-shadow: 0 0 12px rgba(255,20,83,0.3); }
        .btn-full { grid-column: span 2; border-color: var(--neon-orange); color: var(--neon-orange); }
        .btn-full:hover { background: var(--neon-orange); color: #000; box-shadow: 0 0 12px rgba(255,108,0,0.3); }
        footer { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: #57453b; border-top: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <nav>
        <div class="nav-brand">
            <img class="dnu-logo" src="https://inkythuatso.com/uploads/thumbnails/800/2021/12/logo-dai-hoc-dai-nam-inkythuatso-converted-01-23-09-54-10.jpg" alt="DNU Logo">
            <div class="brand-text">
                <div class="title">STATE MONITOR</div>
                <div class="subtitle">KHOA CNTT - ĐẠI HỌC ĐẠI NAM</div>
            </div>
        </div>
        <div style="font-size: 0.85rem; color: var(--neon-orange);">LAB_08 // STATE COUNTER</div>
    </nav>
    <div class="container">
        <div class="counter-panel">
            <div class="panel-heading"><i class="fa-solid fa-gauge-high"></i> BỘ ĐẾM BIẾN TRẠNG THÁI LOGIC ĐỘNG</div>
            <div class="counter-screen val-zero" id="num-display">0</div>
            <div class="btn-grid">
                <button class="btn-core btn-dec" id="btn-sub-5">-5 Lượt</button>
                <button class="btn-core btn-inc" id="btn-add-5">+5 Lượt</button>
            </div>
            <div class="btn-grid">
                <button class="btn-core btn-dec" id="btn-decrement">Giảm (-1)</button>
                <button class="btn-core btn-inc" id="btn-increment">Tăng (+1)</button>
                <button class="btn-core btn-full" id="btn-reset">Đặt lại trạng thái (0)</button>
            </div>
        </div>
    </div>
    <footer>
        SYS.MGR // ĐẠI HỌC ĐẠI NAM — KHƠI DẬY TIỀM NĂNG VƯƠN TỚI THÀNH CÔNG
    </footer>
    <script>
        let counterStateValue = 0;
        const display = document.getElementById('num-display');
        function renderCounter() {
            display.innerText = counterStateValue;
            display.className = "counter-screen";
            if (counterStateValue === 0) {
                display.classList.add('val-zero');
            } else if (counterStateValue > 0) {
                display.classList.add('val-pos');
            } else {
                display.classList.add('val-neg');
            }
        }
        document.getElementById('btn-increment').addEventListener('click', function() {
            counterStateValue += 1;
            renderCounter();
        });
        document.getElementById('btn-decrement').addEventListener('click', function() {
            counterStateValue -= 1;
            renderCounter();
        });
        document.getElementById('btn-add-5').addEventListener('click', function() {
            counterStateValue += 5;
            renderCounter();
        });
        document.getElementById('btn-sub-5').addEventListener('click', function() {
            counterStateValue -= 5;
            renderCounter();
        });
        document.getElementById('btn-reset').addEventListener('click', function() {
            counterStateValue = 0;
            renderCounter();
        });
    </script>
</body>
</html>
