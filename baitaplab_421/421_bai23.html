<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bài Lab 23 - Danh sách sản phẩm</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f4f4;
      }

      .product-card img {
        height: 180px;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <h2 class="text-center mb-4">DANH SÁCH SẢN PHẨM</h2>

      <div class="row g-4">
        <!-- SP 1 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100">
            <img src="https://picsum.photos/300/200?1" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Áo thun nam</h5>

              <span class="badge bg-danger mb-2"> -20% </span>

              <p class="text-danger fw-bold">150.000đ</p>

              <button class="btn btn-primary w-100">Mua ngay</button>
            </div>
          </div>
        </div>

        <!-- SP 2 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100">
            <img src="https://picsum.photos/300/200?2" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Giày thể thao</h5>

              <span class="badge bg-success mb-2"> Hot </span>

              <p class="text-danger fw-bold">450.000đ</p>

              <button class="btn btn-primary w-100">Mua ngay</button>
            </div>
          </div>
        </div>

        <!-- SP 3 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100">
            <img src="https://picsum.photos/300/200?3" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Túi xách</h5>

              <p class="text-danger fw-bold">320.000đ</p>

              <button class="btn btn-primary w-100">Mua ngay</button>
            </div>
          </div>
        </div>

        <!-- SP 4 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100">
            <img src="https://picsum.photos/300/200?4" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Đồng hồ</h5>

              <span class="badge bg-warning text-dark mb-2"> Sale </span>

              <p class="text-danger fw-bold">800.000đ</p>

              <button class="btn btn-primary w-100">Mua ngay</button>
            </div>
          </div>
        </div>

        <!-- SP 5 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100">
            <img src="https://picsum.photos/300/200?5" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Laptop</h5>

              <span class="badge bg-danger mb-2"> -10% </span>

              <p class="text-danger fw-bold">12.000.000đ</p>

              <button class="btn btn-primary w-100">Mua ngay</button>
            </div>
          </div>
        </div>

        <!-- SP 6 -->
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100">
            <img src="https://picsum.photos/300/200?6" class="card-img-top" />

            <div class="card-body">
              <h5 class="card-title">Tai nghe</h5>

              <p class="text-danger fw-bold">250.000đ</p>

              <button class="btn btn-primary w-100">Mua ngay</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
