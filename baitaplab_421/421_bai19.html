<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bài Lab 19 - Ajax jQuery</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 30px;
      }

      .container {
        width: 900px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      table th,
      table td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: center;
      }

      table th {
        background: #007bff;
        color: white;
      }

      tr:nth-child(even) {
        background: #f9f9f9;
      }

      .loading {
        text-align: center;
        font-size: 18px;
        color: blue;
        margin-bottom: 15px;
      }

      .error {
        text-align: center;
        color: red;
        font-weight: bold;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>DANH SÁCH SINH VIÊN</h1>

      <div class="loading" id="loading">Đang tải dữ liệu...</div>

      <div class="error" id="error"></div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Họ tên</th>
            <th>Tuổi</th>
            <th>Ngành học</th>
          </tr>
        </thead>

        <tbody id="studentList"></tbody>
      </table>
    </div>

    <script>
      // THAY LINK API CỦA BẠN
      const API_URL = "https://YOUR_PROJECT.mockapi.io/students";

      // HÀM TẢI DỮ LIỆU
      function loadStudents() {
        $.ajax({
          url: API_URL,

          method: "GET",

          success: function (data) {
            $("#loading").hide();

            renderStudents(data);
          },

          error: function () {
            $("#loading").hide();

            $("#error").text("Không thể tải dữ liệu từ server!");
          },
        });
      }

      // HÀM HIỂN THỊ DỮ LIỆU
      function renderStudents(students) {
        let html = "";

        students.forEach(function (student) {
          html += `
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.age}</td>
                        <td>${student.major}</td>
                    </tr>
                `;
        });

        $("#studentList").html(html);
      }

      // CHẠY KHI MỞ TRANG
      loadStudents();
    </script>
  </body>
</html>
