<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trò Chơi Dự Đoán Số</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        width: 400px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h2 {
        margin-bottom: 20px;
      }

      input {
        width: 90%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        background: #007bff;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }

      #thongBao {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
      }

      #lichSu {
        margin-top: 15px;
        text-align: left;
        font-size: 15px;
      }

      .dung {
        color: green;
      }

      .sai {
        color: red;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>TRÒ CHƠI DỰ ĐOÁN SỐ</h2>

      <p>Hãy đoán số từ 1 đến 100</p>

      <input type="number" id="duDoan" placeholder="Nhập số của bạn" />

      <br />

      <button onclick="kiemTra()">Đoán số</button>

      <button onclick="choiLai()">Chơi lại</button>

      <div id="thongBao"></div>

      <div id="lichSu"></div>
    </div>

    <script>
      // Sinh số bí mật
      let soBiMat = Math.floor(Math.random() * 100) + 1;

      // Đếm số lượt đoán
      let soLanDoan = 0;

      // Giới hạn số lần chơi
      let gioiHan = 10;

      // Lưu lịch sử đoán
      let lichSu = [];

      function kiemTra() {
        let duDoan = Number(document.getElementById("duDoan").value);

        let thongBao = document.getElementById("thongBao");

        let hienThiLichSu = document.getElementById("lichSu");

        // Kiểm tra dữ liệu
        if (duDoan < 1 || duDoan > 100) {
          thongBao.innerHTML = "Vui lòng nhập số từ 1 đến 100!";
          thongBao.className = "sai";
          return;
        }

        // Tăng lượt đoán
        soLanDoan++;

        // Lưu lịch sử
        lichSu.push(duDoan);

        // Hiển thị lịch sử
        hienThiLichSu.innerHTML = "<b>Lịch sử đoán:</b> " + lichSu.join(", ");

        // So sánh
        if (duDoan < soBiMat) {
          thongBao.innerHTML = "Số bạn đoán nhỏ hơn số bí mật!";
          thongBao.className = "sai";
        } else if (duDoan > soBiMat) {
          thongBao.innerHTML = "Số bạn đoán lớn hơn số bí mật!";
          thongBao.className = "sai";
        } else {
          thongBao.innerHTML =
            "Chúc mừng! Bạn đoán đúng sau " + soLanDoan + " lượt!";
          thongBao.className = "dung";
        }

        // Kiểm tra hết lượt
        if (soLanDoan >= gioiHan && duDoan != soBiMat) {
          thongBao.innerHTML =
            "Bạn đã hết lượt chơi! <br>" + "Số bí mật là: " + soBiMat;

          thongBao.className = "sai";
        }
      }

      // Hàm chơi lại
      function choiLai() {
        soBiMat = Math.floor(Math.random() * 100) + 1;

        soLanDoan = 0;

        lichSu = [];

        document.getElementById("duDoan").value = "";

        document.getElementById("thongBao").innerHTML = "";

        document.getElementById("lichSu").innerHTML = "";
      }
    </script>
  </body>
</html>
