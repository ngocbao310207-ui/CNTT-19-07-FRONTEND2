<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Search Hub - Lab 22</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f030a; font-family: 'Share Tech Mono', monospace; color: #ff0055; }
        .cyber-panel { background: #1a0512; border: 2px solid #ff0055; box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); border-radius: 4px; max-width: 650px; margin: auto; }
        .cyber-title { font-family: 'Orbitron', sans-serif; font-weight: 800; text-shadow: 0 0 10px #ff0055; color: #ffffff; text-transform: uppercase; }
        .cyber-input { background: #0a0106; border: 1px solid #ff0055; color: #ffffff; padding: 12px; font-weight: bold; border-radius: 2px; }
        .cyber-input:focus { background: #26071a; border-color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.5); color: #ffffff; }
        .grid-box { border: 1px dashed #ff0055; background: #0c0208; padding: 14px; margin-bottom: 8px; border-radius: 2px; display: flex; justify-content: space-between; align-items: center; }
        .cyber-tag { background: #ff0055; color: #ffffff; padding: 2px 8px; font-size: 0.8rem; font-weight: bold; border-radius: 2px; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="cyber-panel p-4">
            <h5 class="cyber-title mb-3">// OMNI_QUERY_MATRIX //</h5>
            <input type="text" class="form-control cyber-input mb-4" id="masterSearch" placeholder="Quét chuỗi lọc bất kỳ (ID, Tên, Email, Mã Lớp)...">
            <div id="gridArea"></div>
        </div>
    </div>
    <script>
        const API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        let memory = [];
        window.addEventListener("DOMContentLoaded", () => {
            fetch(API).then(res => res.json()).then(data => {
                memory = Array.isArray(data) ? data : [];
                draw(memory);
            });
        });
        function draw(arr) {
            const wrap = document.getElementById("gridArea");
            if(arr.length === 0) {
                wrap.innerHTML = `<div class="text-center opacity-50 py-3">[ SYSLOG: NO_DATA_MATCHES_CRITERIA ]</div>`;
                return;
            }
            wrap.innerHTML = arr.map(item => `
                <div class="grid-box">
                    <div>
                        <div class="fw-bold text-white fs-6">${item.fullName || "N/A"}</div>
                        <small class="opacity-75 text-info">#${item.id} // ${item.email || "N/A"}</small>
                    </div>
                    <span class="cyber-tag">${item.classroom || "N/A"}</span>
                </div>
            `).join('');
        }
        document.getElementById("masterSearch").addEventListener("input", (e) => {
            const key = e.target.value.trim().toLowerCase();
            const res = memory.filter(item => 
                (item.id && item.id.toString().includes(key)) ||
                (item.fullName && item.fullName.toLowerCase().includes(key)) ||
                (item.email && item.email.toLowerCase().includes(key)) ||
                (item.classroom && item.classroom.toLowerCase().includes(key))
            );
            draw(res);
        });
    </script>
</body>
</html>
