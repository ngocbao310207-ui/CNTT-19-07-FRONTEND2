<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Fetch Terminal - Lab 19</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0f1d; font-family: 'Share Tech Mono', monospace; color: #00f2fe; }
        .cyber-panel { background: #0d1527; border: 2px solid #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); border-radius: 4px; max-width: 500px; margin: auto; }
        .cyber-title { font-family: 'Orbitron', sans-serif; font-weight: 800; text-shadow: 0 0 10px #00f2fe; color: #ffffff; text-transform: uppercase; }
        .cyber-input { background: #050a14; border: 1px solid #00f2fe; color: #ffffff; font-weight: bold; border-radius: 2px; }
        .cyber-input:focus { background: #091122; border-color: #ffffff; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); color: #ffffff; }
        .cyber-input:disabled { background: #060913; border-color: #1e293b; color: #475569; }
        .btn-cyber { background: #00f2fe; color: #0a0f1d; font-family: 'Orbitron', sans-serif; font-weight: 800; border: none; border-radius: 2px; text-shadow: none; transition: all 0.3s; }
        .btn-cyber:hover { background: #ffffff; box-shadow: 0 0 15px #ffffff; color: #0a0f1d; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="cyber-panel p-4">
            <h5 class="cyber-title text-center mb-4 fs-6">// DATA_EXTRACT_PROTOCOL //</h5>
            <div class="d-flex gap-2 mb-4">
                <input type="text" class="form-control cyber-input" id="searchId" placeholder="SYS_ID...">
                <button class="btn btn-cyber px-4" id="btnLoad">CORE_LOAD</button>
            </div>
            <div class="mb-3">
                <label class="small text-uppercase opacity-75">Target_Identity</label>
                <input type="text" class="form-control cyber-input" id="resName" disabled>
            </div>
            <div class="mb-3">
                <label class="small text-uppercase opacity-75">Network_Email</label>
                <input type="text" class="form-control cyber-input" id="resEmail" disabled>
            </div>
            <div>
                <label class="small text-uppercase opacity-75">Cluster_Sector</label>
                <input type="text" class="form-control cyber-input" id="resClass" disabled>
            </div>
        </div>
    </div>
    <script>
        const API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        document.getElementById("btnLoad").addEventListener("click", () => {
            const id = document.getElementById("searchId").value.trim();
            if(!id) return;
            fetch(`${API}/${id}`)
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    document.getElementById("resName").value = data.fullName || "EMPTY";
                    document.getElementById("resEmail").value = data.email || "EMPTY";
                    document.getElementById("resClass").value = data.classroom || "EMPTY";
                })
                .catch(() => {
                    alert("PROTOCOL_ERROR: Node ID not found.");
                    document.getElementById("resName").value = "";
                    document.getElementById("resEmail").value = "";
                    document.getElementById("resClass").value = "";
                });
        });
    </script>
</body>
</html>
