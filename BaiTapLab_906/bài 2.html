<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính khuyến mãi đơn hàng</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            color: #333;
        }

        label{
            font-weight: bold;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }

        #ketQua{
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
            line-height: 1.8;
        }

        .tong{
            color: red;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>TÍNH KHUYẾN MÃI ĐƠN HÀNG</h2>

    <label>Giá trị đơn hàng (VNĐ):</label>
    <input type="number" id="donHang" placeholder="Nhập số tiền">

    <label>Hạng thành viên:</label>
    <select id="thanhVien">
        <option value="thuong">Thường</option>
        <option value="bac">Bạc</option>
        <option value="vang">Vàng</option>
    </select>

    <button onclick="tinhTien()">Tính thanh toán</button>

    <div id="ketQua"></div>
</div>

<script>

    function tinhTien() {

        // Lấy dữ liệu
        let donHang = Number(document.getElementById("donHang").value);
        let thanhVien = document.getElementById("thanhVien").value;

        let ketQua = document.getElementById("ketQua");

        // Kiểm tra dữ liệu
        if (donHang <= 0 || isNaN(donHang)) {
            ketQua.innerHTML = "Vui lòng nhập giá trị đơn hàng hợp lệ!";
            ketQua.style.color = "red";
            return;
        }

        let giamGia = 0;

        // Khuyến mãi theo giá trị đơn hàng
        if (donHang >= 1000000) {
            giamGia = 10;
        }
        else if (donHang >= 500000) {
            giamGia = 5;
        }
        else if (donHang >= 200000) {
            giamGia = 3;
        }
        else {
            giamGia = 0;
        }

        // Khuyến mãi thêm theo hạng thành viên
        if (thanhVien == "bac") {
            giamGia += 2;
        }
        else if (thanhVien == "vang") {
            giamGia += 5;
        }

        // Tính tiền giảm
        let tienGiam = donHang * giamGia / 100;

        // Miễn phí vận chuyển nếu đơn > 1 triệu
        let phiShip = 30000;

        if (donHang >= 1000000) {
            phiShip = 0;
        }

        // Tổng thanh toán
        let thanhToan = donHang - tienGiam + phiShip;

        // Hiển thị kết quả
        ketQua.innerHTML = `
            <p><strong>Tiền gốc:</strong> ${donHang.toLocaleString()} VNĐ</p>

            <p><strong>Tỷ lệ giảm:</strong> ${giamGia}%</p>

            <p><strong>Số tiền giảm:</strong> ${tienGiam.toLocaleString()} VNĐ</p>

            <p><strong>Phí vận chuyển:</strong> ${phiShip.toLocaleString()} VNĐ</p>

            <p class="tong">
                Tổng thanh toán:
                ${thanhToan.toLocaleString()} VNĐ
            </p>
        `;

        ketQua.style.color = "black";
    }

</script>

</body>
</html>
