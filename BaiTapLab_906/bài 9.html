```html id="todolab09"
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09 - To-do List</title>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container{
            width: 500px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
        }

        .input-group{
            display: flex;
            gap: 10px;
        }

        input{
            flex: 1;
            padding: 10px;
        }

        button{
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        .add{
            background: #007bff;
        }

        .done{
            background: green;
        }

        .delete{
            background: red;
        }

        ul{
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .completed{
            text-decoration: line-through;
            color: gray;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>QUẢN LÝ CÔNG VIỆC</h2>

    <div class="input-group">

        <input type="text"
               id="congViec"
               placeholder="Nhập công việc...">

        <button class="add" id="btnThem">
            Thêm
        </button>

    </div>

    <ul id="danhSach"></ul>

</div>

<script>

    // Mảng công việc
    let congViecs = [];

    // Render danh sách
    function render() {

        let danhSach =
            document.getElementById("danhSach");

        danhSach.innerHTML = "";

        congViecs.forEach((cv, index) => {

            let li =
                document.createElement("li");

            // Nội dung
            let span =
                document.createElement("span");

            span.innerText = cv.ten;

            if(cv.hoanThanh){

                span.classList.add("completed");
            }

            // Nút hoàn thành
            let btnDone =
                document.createElement("button");

            btnDone.innerText = "✔";

            btnDone.classList.add("done");

            btnDone.addEventListener("click", function(){

                congViecs[index].hoanThanh =
                    !congViecs[index].hoanThanh;

                render();
            });

            // Nút xóa
            let btnDelete =
                document.createElement("button");

            btnDelete.innerText = "X";

            btnDelete.classList.add("delete");

            btnDelete.addEventListener("click", function(){

                congViecs.splice(index, 1);

                render();
            });

            // Nhóm nút
            let div =
                document.createElement("div");

            div.appendChild(btnDone);
            div.appendChild(btnDelete);

            li.appendChild(span);
            li.appendChild(div);

            danhSach.appendChild(li);

        });

        // Lưu localStorage
        localStorage.setItem(
            "todoList",
            JSON.stringify(congViecs)
        );
    }

    // Thêm công việc
    document
        .getElementById("btnThem")
        .addEventListener("click", function(){

            let input =
                document.getElementById("congViec");

            let ten = input.value.trim();

            if(ten == ""){

                alert("Vui lòng nhập công việc!");
                return;
            }

            congViecs.push({

                ten: ten,
                hoanThanh: false
            });

            input.value = "";

            render();
        });

    // Đọc dữ liệu localStorage
    let data =
        localStorage.getItem("todoList");

    if(data){

        congViecs = JSON.parse(data);
    }

    render();

</script>

</body>
</html>
