<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 16 - Counter jQuery</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            font-size: 60px;
            margin: 20px 0;
        }

        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .plus{
            background: green;
        }

        .minus{
            background: red;
        }

        .reset{
            background: gray;
        }

        .plus10{
            background: blue;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>BỘ ĐẾM jQuery</h2>

    <h1 id="counter">0</h1>

    <button class="plus">
        +1
    </button>

    <button class="minus">
        -1
    </button>

    <button class="plus10">
        +10
    </button>

    <button class="reset">
        Reset
    </button>

</div>

<script>

    let count = 0;

    // Hàm cập nhật giao diện
    function render(){

        $("#counter").text(count);

        // Đổi màu
        if(count > 0){

            $("#counter").css("color", "green");

        }else if(count < 0){

            $("#counter").css("color", "red");

        }else{

            $("#counter").css("color", "black");
        }
    }

    // Tăng
    $(".plus").click(function(){

        count++;
        render();

    });

    // Giảm
    $(".minus").click(function(){

        count--;
        render();

    });

    // Tăng nhanh +10
    $(".plus10").click(function(){

        count += 10;
        render();

    });

    // Reset
    $(".reset").click(function(){

        count = 0;
        render();

    });

</script>

</body>
</html>
