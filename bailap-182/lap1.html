<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài 1: Tính chỉ số BMI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #result { margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tính Chỉ Số BMI</h2>
        <div class="form-group">
            <label>Chiều cao (m):</label>
            <input type="number" id="height" step="0.01" placeholder="Ví dụ: 1.65">
        </div>
        <div class="form-group">
            <label>Cân nặng (kg):</label>
            <input type="number" id="weight" step="0.1" placeholder="Ví dụ: 55">
        </div>
        <button onclick="calculateBMI()">Tính toán</button>
        <div id="result"></div>
    </div>

    <script>
        function calculateBMI() {
            const h = Number(document.getElementById('height').value);
            const w = Number(document.getElementById('weight').value);
            const resultDiv = document.getElementById('result');

            // Kiểm tra dữ liệu hợp lệ (Yêu cầu mở rộng)
            if (!h || !w || h <= 0 || w <= 0) {
                resultDiv.style.display = 'block';
                resultDiv.style.backgroundColor = '#f8d7da';
                resultDiv.style.color = '#721c24';
                resultDiv.innerText = "Vui lòng nhập chiều cao và cân nặng hợp lệ (lớn hơn 0)!";
                return;
            }

            const bmi = w / (h * h);
            const roundedBMI = bmi.toFixed(2);
            let classification = "";
            let color = "";

            if (bmi < 18.5) {
                classification = "Gầy";
                color = "#ffc107"; // Vàng
            } else if (bmi < 24.9) {
                classification = "Bình thường";
                color = "#28a745"; // Xanh lá
            } else if (bmi < 29.9) {
                classification = "Thừa cân";
                color = "#fd7e14"; // Cam
            } else {
                classification = "Béo phì";
                color = "#dc3545"; // Đỏ
            }

            resultDiv.style.display = 'block';
            resultDiv.style.backgroundColor = color;
            resultDiv.style.color = color === '#ffc107' ? 'black' : 'white';
            resultDiv.innerHTML = `Chỉ số BMI: ${roundedBMI}<br>Phân loại thể trạng: ${classification}`;
        }
    </script>
</body>
</html>
