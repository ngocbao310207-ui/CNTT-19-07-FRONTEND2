<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 22: Đăng Nhập Responsive Bootstrap</title>
    <!-- Nhúng CSS của thư viện Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container">
        <!-- Căn giữa biểu mẫu đăng nhập theo cả chiều dọc và ngang màn hình -->
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow-sm p-4 rounded-3 bg-white">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">ĐĂNG NHẬP</h3>
                        <p class="text-muted small">Vui lòng điền tài khoản để tiếp tục truy cập</p>
                    </div>
                    
                    <form>
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Địa chỉ Email</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu bảo mật</label>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <!-- Yêu cầu mở rộng thêm checkbox ghi nhớ tài khoản mật khẩu -->
                        <div class="mb-3 form-check d-flex justify-content-between align-items-center">
                            <div>
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small text-muted" for="rememberMe">Ghi nhớ tài khoản</label>
                            </div>
                            <a href="#" class="small text-decoration-none">Quên mật khẩu?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Đăng Nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Nhúng thư viện JS phụ trợ đi kèm của Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
