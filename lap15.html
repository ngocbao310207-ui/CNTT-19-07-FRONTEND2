<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 15 - Validate Form</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; }
        input { padding: 8px; font-size: 1rem; border: 1px solid #ccc; border-radius: 4px; outline: none; }
        .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 3px; display: none; }
        /* Yêu cầu mở rộng: Đổi màu viền tùy biến theo trạng thái */
        .is-invalid { border-color: #e74c3c !important; background-color: #fdedec; }
        .is-valid { border-color: #2ecc71 !important; background-color: #eafaf1; }
        button { padding: 10px; background: #34495e; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <h2>Đăng Ký Tài Khoản</h2>
    <form id="register-form" novalidate>
        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" id="fullname">
            <small class="error-msg"></small>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
            <small class="error-msg"></small>
        </div>
        <div class="form-group">
            <label>Số điện thoại</label>
            <input type="text" id="phone">
            <small class="error-msg"></small>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password">
            <small class="error-msg"></small>
        </div>
        <div class="form-group">
            <label>Xác nhận mật khẩu</label>
            <input type="password" id="confirm-password">
            <small class="error-msg"></small>
        </div>
        <button type="submit">Đăng ký ngay</button>
    </form>

    <script>
        $(document).ready(function() {
            
            $('#register-form').submit(function(e) {
                e.preventDefault(); // Chặn hành vi submit reload mặc định
                
                let isValidForm = true;

                // Hàm tiện ích hỗ trợ hiển thị/ẩn lỗi nhanh
                function checkValidate(selector, condition, errorMsg) {
                    const input = $(selector);
                    const msgContainer = input.next('.error-msg');
                    
                    if (condition) {
                        input.removeClass('is-invalid').addClass('is-valid');
                        msgContainer.hide();
                    } else {
                        input.removeClass('is-valid').addClass('is-invalid');
                        msgContainer.text(errorMsg).show();
                        isValidForm = false;
                    }
                }

                // 1. Kiểm tra Họ và Tên rỗng
                const nameVal = $('#fullname').val().trim();
                checkValidate('#fullname', nameVal !== '', 'Họ tên không được để trống.');

                // 2. Kiểm tra định dạng Email qua mã Regex chuẩn
                const emailVal = $('#email').val().trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                checkValidate('#email', emailRegex.test(emailVal), 'Định dạng Email không hợp lệ.');

                // 3. Yêu cầu mở rộng: Kiểm tra số điện thoại (Phải là số, dài từ 10-11 ký tự)
                const phoneVal = $('#phone').val().trim();
                const phoneRegex = /^[0-9]{10,11}$/;
                checkValidate('#phone', phoneRegex.test(phoneVal), 'Số điện thoại phải từ 10 đến 11 ký tự số.');

                // 4. Kiểm tra độ dài mật khẩu (Tối thiểu 6 ký tự)
                const passVal = $('#password').val();
                checkValidate('#password', passVal.length >= 6, 'Mật khẩu phải chứa ít nhất 6 ký tự.');

                // 5. Kiểm tra trùng khớp mật khẩu nhập lại
                const confirmPassVal = $('#confirm-password').val();
                checkValidate('#confirm-password', confirmPassVal === passVal && confirmPassVal !== '', 'Mật khẩu xác nhận không trùng khớp.');

                // Nếu tất cả dữ liệu qua bộ lọc, gửi thông báo thành công
                if (isValidForm) {
                    alert('Đăng ký tài khoản thành công hệ thống!');
                    // Tùy chọn: $('#register-form')[0].reset();
                }
            });
        });
    </script>
</body>
</html>
