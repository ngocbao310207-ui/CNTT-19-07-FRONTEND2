<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống Kê Bộ Đếm - Lab 16</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; color: #1e293b; }
        .counter-card { background: #ffffff; border: 2px solid #0f172a; border-radius: 16px; max-width: 400px; margin: auto; }
        .number-display { font-size: 4rem; font-weight: 900; color: #0f172a; line-height: 1; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="counter-card p-4 text-center shadow-sm">
            <i class="bi bi-server text-secondary fs-3 mb-2"></i>
            <div class="text-uppercase small fw-bold text-secondary tracking-wider mb-2">Tổng số dữ liệu lưu trữ</div>
            <div class="number-display font-monospace my-3" id="totalNum">--</div>
            <div class="badge bg-dark px-3 py-2 border w-100" id="status">Đang quét mạng dữ liệu...</div>
        </div>
    </div>
    <script>
        const API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        window.addEventListener("DOMContentLoaded", () => {
            fetch(API)
                .then(res => res.json())
                .then(data => {
                    const count = Array.isArray(data) ? data.length : 0;
                    document.getElementById("totalNum").textContent = String(count).padStart(2, '0');
                    document.getElementById("status").textContent = "Đồng bộ thành công";
                    document.getElementById("status").className = "badge bg-success px-3 py-2 border w-100";
                });
        });
    </script>
</body>
</html>
