<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Advanced jQuery Effects - Lab 14</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>✨ Bảng Điều Khiển Hiệu Ứng</h1>
        </header>
        <div class="dashboard">
            <div class="controls-panel">
                <div class="status-bar">
                    Trạng thái hệ thống: <span id="statusText" class="badge">Đang chờ...</span>
                </div>
                <h3>Nhóm Fade (Mờ dần)</h3>
                <div class="btn-group">
                    <button id="btnFadeOut" class="btn">Fade Out</button>
                    <button id="btnFadeIn" class="btn">Fade In</button>
                </div>
                <h3>Nhóm Slide (Trượt)</h3>
                <div class="btn-group">
                    <button id="btnSlideUp" class="btn">Slide Up</button>
                    <button id="btnSlideDown" class="btn">Slide Down</button>
                    <button id="btnSlideToggle" class="btn btn-primary">Slide Toggle</button>
                </div>
                <h3>Hiệu ứng nâng cao</h3>
                <div class="btn-group">
                    <button id="btnCustom" class="btn btn-warning">Custom Animate</button>
                    <button id="btnChain" class="btn btn-magic">Chaining + Highlight</button>
                    <button id="btnReset" class="btn btn-danger">Reset Giao Diện</button>
                </div>
            </div>
            <div class="view-panel">
                <div id="contentBox" class="product-card">
                    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="MacBook Pro M4" class="product-image">
                    <div class="product-info">
                        <h2>Apple MacBook Pro M4</h2>
                        <p class="desc">Trải nghiệm sức mạnh xử lý vượt trội với chip M4, màn hình Liquid Retina XDR và thời lượng pin đáng kinh ngạc cho công việc lập trình.</p>
                        <div class="price-tag">35.000.000 VNĐ</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
