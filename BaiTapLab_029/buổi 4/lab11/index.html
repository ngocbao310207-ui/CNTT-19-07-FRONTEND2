<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tra Cứu Thông Tin Theo Mã</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>
  <main class="container">
    <header class="hero">
      <span class="badge">🔍 API Lookup</span>
      <h1>Tra Cứu <em>Sinh Viên</em></h1>
      <p>Nhập mã định danh để lấy thông tin chi tiết từ API</p>
    </header>
    <div class="search-card">
      <div class="search-row">
        <div class="id-input-wrap">
          <span class="id-prefix">ID</span>
          <input type="number" id="inp-id" placeholder="Nhập mã (1–10)..." min="1" max="10" />
        </div>
        <button class="btn-search" id="btn-search" onclick="lookupById()">
          <span class="btn-label">Tra cứu</span>
          <span class="btn-spinner" style="display:none"><span class="spin"></span></span>
        </button>
        <button class="btn-clear" id="btn-clear" onclick="clearResult()" style="display:none">✕ Xóa</button>
      </div>
      <div class="quick-ids">
        <span>Thử nhanh:</span>
        <button onclick="quickSearch(1)">ID 1</button>
        <button onclick="quickSearch(3)">ID 3</button>
        <button onclick="quickSearch(5)">ID 5</button>
        <button onclick="quickSearch(7)">ID 7</button>
        <button onclick="quickSearch(99)">ID 99 ⚡</button>
      </div>
      <div class="api-row">
        <span class="api-label">Base URL:</span>
        <input type="url" id="inp-base-url"
          value="https://jsonplaceholder.typicode.com/users"
          class="api-input" />
      </div>
    </div>
    <div id="state-loading" class="state-box" style="display:none">
      <div class="loading-ring"></div>
      <p>Đang tìm kiếm...</p>
    </div>
    <div id="state-not-found" class="state-box not-found" style="display:none">
      <div class="state-emoji">🔍</div>
      <h3>Không tìm thấy</h3>
      <p id="not-found-msg">Không có dữ liệu với mã này.</p>
      <button onclick="clearResult()">← Thử lại</button>
    </div>
    <div id="state-error" class="state-box error-box" style="display:none">
      <div class="state-emoji">⚠️</div>
      <h3>Lỗi kết nối</h3>
      <p id="error-detail">Không thể kết nối đến server.</p>
      <button onclick="lookupById()">Thử lại</button>
    </div>
    <div id="result-card" class="result-card" style="display:none">
      <div class="result-header">
        <div class="avatar-circle" id="res-avatar"></div>
        <div class="result-title-wrap">
          <span class="result-id-tag" id="res-id-tag"></span>
          <h2 id="res-name"></h2>
          <p id="res-username"></p>
        </div>
        <button class="btn-close-result" onclick="clearResult()">✕</button>
      </div>
      <div class="result-grid">
        <div class="info-block">
          <span class="info-label">✉️ Email</span>
          <span class="info-val" id="res-email"></span>
        </div>
        <div class="info-block">
          <span class="info-label">📞 Điện thoại</span>
          <span class="info-val" id="res-phone"></span>
        </div>
        <div class="info-block">
          <span class="info-label">🌐 Website</span>
          <a class="info-val info-link" id="res-website" href="#" target="_blank"></a>
        </div>
        <div class="info-block">
          <span class="info-label">🏢 Công ty</span>
          <span class="info-val" id="res-company"></span>
        </div>
        <div class="info-block full-width">
          <span class="info-label">📍 Địa chỉ</span>
          <span class="info-val" id="res-address"></span>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-prev" id="btn-prev" onclick="navigateId(-1)">← Trước</button>
        <span class="nav-hint" id="nav-hint"></span>
        <button class="btn-next" id="btn-next" onclick="navigateId(1)">Tiếp →</button>
      </div>
    </div>
    <div class="history-section" id="history-section" style="display:none">
      <div class="history-header">
        <h3>🕐 Lịch sử tra cứu</h3>
        <button onclick="clearHistory()">Xóa lịch sử</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
