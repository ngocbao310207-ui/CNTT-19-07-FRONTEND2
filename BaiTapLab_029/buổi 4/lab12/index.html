<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab12 - Quản Lý Sinh Viên</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Quản Lý Sinh Viên</h2>
            <div class="header-actions">
                <button class="btn btn-success" onclick="xuatExcel()">
                    <i class="fa-solid fa-file-excel"></i> Xuất Excel
                </button>
                <button class="btn btn-primary" onclick="moFormThem()">
                    <i class="fa-solid fa-plus"></i> Thêm Sinh Viên
                </button>
            </div>
        </div>
        <div class="toolbar">
            <div class="stats">
                <i class="fa-solid fa-users"></i> Đang hiển thị: <span id="soLuongHienThi">0</span>
            </div>
            <div class="filters">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" class="filter-input" placeholder="Tìm tên hoặc mã SV..." oninput="locDuLieu()">
                </div>
                <select id="filterGioiTinh" class="filter-input" onchange="locDuLieu()">
                    <option value="all">Tất cả giới tính</option>
                    <option value="false">Nam</option>
                    <option value="true">Nữ</option>
                </select>
                <select id="filterDiem" class="filter-input" onchange="locDuLieu()">
                    <option value="all">Tất cả điểm</option>
                    <option value="gioi">Giỏi (8 - 10)</option>
                    <option value="kha">Khá (6.5 - 7.9)</option>
                    <option value="tb">Trung bình (5 - 6.4)</option>
                    <option value="yeu">Yếu (Dưới 5)</option>
                </select>
            </div>
        </div>
        <div class="grade-stats" id="gradeStats">
            <div class="stat-card card-gioi">Giỏi: <span id="countGioi">0</span></div>
            <div class="stat-card card-kha">Khá: <span id="countKha">0</span></div>
            <div class="stat-card card-tb">TB: <span id="countTb">0</span></div>
            <div class="stat-card card-yeu">Yếu: <span id="countYeu">0</span></div>
        </div>

        <div class="table-container" id="danhSach">
            <p style="color: var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Đang tải dữ liệu...</p>
        </div>
    </div>
    <div id="sinhVienModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="dongModal()"><i class="fa-solid fa-xmark"></i></span>
            <h3 id="modalTitle" style="margin-top: 0; margin-bottom: 20px;">Thêm Sinh Viên</h3>
            <input type="hidden" id="svId">
            
            <div class="form-group">
                <label>Họ và Tên</label>
                <input type="text" id="hoTen" placeholder="Nhập họ tên sinh viên">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Mã Sinh Viên</label>
                    <input type="text" id="maSV" placeholder="Nhập mã SV">
                </div>
                <div class="form-group">
                    <label>Điểm Số</label>
                    <input type="number" id="diem" placeholder="0.0" step="0.1" min="0" max="10">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Giới tính</label>
                    <select id="gioiTinh">
                        <option value="false">Nam</option>
                        <option value="true">Nữ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Trạng thái</label>
                    <select id="trangThai">
                        <option value="true">Đang học</option>
                        <option value="false">Đã thôi học</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;" onclick="luuSinhVien()">
                <i class="fa-solid fa-floppy-disk"></i> Lưu Thông Tin
            </button>
        </div>
    </div>
    <div id="toast-container"></div>
</body>
</html>
