<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 22 - Modern Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex align-items-center vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card glass-card shadow-lg p-4">
            <div class="card-body">
              <h3 class="text-center fw-bold mb-4" style="color: #4a4a4a">
                Đăng nhập
              </h3>
              <form>
                <div class="form-floating mb-3">
                  <input
                    type="email"
                    class="form-control rounded-4"
                    id="email"
                    placeholder="name@example.com"
                    required
                  />
                  <label for="email">Email</label>
                </div>
                <div class="form-floating mb-3">
                  <input
                    type="password"
                    class="form-control rounded-4"
                    id="password"
                    placeholder="Mật khẩu"
                    required
                  />
                  <label for="password">Mật khẩu</label>
                </div>

                <div
                  class="d-flex justify-content-between mb-4 mt-2 px-1 text-muted"
                  style="font-size: 0.9rem"
                >
                  <div class="form-check">
                    <input
                      type="checkbox"
                      class="form-check-input"
                      id="remember"
                    />
                    <label class="form-check-label" for="remember"
                      >Ghi nhớ</label
                    >
                  </div>
                  <a
                    href="#"
                    class="text-decoration-none"
                    style="color: #764ba2"
                    >Quên mật khẩu?</a
                  >
                </div>
                <button
                  type="submit"
                  class="btn btn-dark w-100 rounded-pill py-2 fw-bold shadow-sm"
                >
                  Đăng nhập
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
