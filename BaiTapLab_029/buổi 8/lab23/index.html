<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 23 - Modern Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="py-5">
    <div class="container py-4">
      <h2 class="text-center fw-bold mb-5">Danh Sách Sản Phẩm</h2>
      <div class="row g-4">
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100 position-relative">
            <span
              class="badge bg-danger rounded-pill position-absolute top-0 end-0 m-3 px-3 py-2 shadow-sm"
              >Bán chạy</span
            >
            <img
              src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=600&q=80"
              class="card-img-top"
              alt="MacBook Pro"
            />
            <div class="card-body d-flex flex-column text-center p-4">
              <h5 class="card-title fw-bold">MacBook Pro 14-inch</h5>
              <p class="card-text text-danger fw-bold fs-5">39.990.000 VNĐ</p>
              <button
                class="btn btn-outline-dark btn-modern w-100 mt-auto py-2"
              >
                Thêm vào giỏ
              </button>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100 position-relative">
            <span
              class="badge bg-success rounded-pill position-absolute top-0 end-0 m-3 px-3 py-2 shadow-sm"
              >Mới</span
            >
            <img
              src="https://images.unsplash.com/photo-1606220588913-b3aacb4d2f46?auto=format&fit=crop&w=600&q=80"
              class="card-img-top"
              alt="AirPods"
            />
            <div class="card-body d-flex flex-column text-center p-4">
              <h5 class="card-title fw-bold">Tai nghe AirPods 4</h5>
              <p class="card-text text-danger fw-bold fs-5">4.290.000 VNĐ</p>
              <button
                class="btn btn-outline-dark btn-modern w-100 mt-auto py-2"
              >
                Thêm vào giỏ
              </button>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100 position-relative">
            <img
              src="https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?auto=format&fit=crop&w=600&q=80"
              class="card-img-top"
              alt="Màn hình 4K"
            />
            <div class="card-body d-flex flex-column text-center p-4">
              <h5 class="card-title fw-bold">Màn hình Đồ họa 4K</h5>
              <p class="card-text text-danger fw-bold fs-5">12.500.000 VNĐ</p>
              <button
                class="btn btn-outline-dark btn-modern w-100 mt-auto py-2"
              >
                Thêm vào giỏ
              </button>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100 position-relative">
            <span
              class="badge bg-warning text-dark rounded-pill position-absolute top-0 end-0 m-3 px-3 py-2 shadow-sm"
              >-15%</span
            >
            <img
              src="https://images.unsplash.com/photo-1595225476474-87563907a212?auto=format&fit=crop&w=600&q=80"
              class="card-img-top"
              alt="Bàn phím cơ"
            />
            <div class="card-body d-flex flex-column text-center p-4">
              <h5 class="card-title fw-bold">Bàn phím Cơ Custom</h5>
              <p class="card-text text-danger fw-bold fs-5">3.200.000 VNĐ</p>
              <button
                class="btn btn-outline-dark btn-modern w-100 mt-auto py-2"
              >
                Thêm vào giỏ
              </button>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100 position-relative">
            <img
              src="https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?auto=format&fit=crop&w=600&q=80"
              class="card-img-top"
              alt="Chuột không dây"
            />
            <div class="card-body d-flex flex-column text-center p-4">
              <h5 class="card-title fw-bold">Chuột Công thái học</h5>
              <p class="card-text text-danger fw-bold fs-5">1.800.000 VNĐ</p>
              <button
                class="btn btn-outline-dark btn-modern w-100 mt-auto py-2"
              >
                Thêm vào giỏ
              </button>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-6 col-md-4">
          <div class="card product-card shadow-sm h-100 position-relative">
            <img
              src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?auto=format&fit=crop&w=600&q=80"
              class="card-img-top"
              alt="Balo công nghệ"
            />
            <div class="card-body d-flex flex-column text-center p-4">
              <h5 class="card-title fw-bold">Balo Chống nước</h5>
              <p class="card-text text-danger fw-bold fs-5">950.000 VNĐ</p>
              <button
                class="btn btn-outline-dark btn-modern w-100 mt-auto py-2"
              >
                Thêm vào giỏ
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
