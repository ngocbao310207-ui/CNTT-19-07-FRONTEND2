<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 23 - Sản phẩm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="store-header">
            <h2>🛍️ Cửa Hàng Công Nghệ</h2>
            <div class="filters">
                <button class="filter-btn active" data-category="all">Tất cả</button>
                <button class="filter-btn" data-category="laptop">Laptop</button>
                <button class="filter-btn" data-category="phone">Điện thoại</button>
                <button class="filter-btn" data-category="accessory">Phụ kiện</button>
            </div>
        </header>

        <div id="productGrid" class="product-grid"></div>

        <div id="quickViewModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div class="modal-body">
                    <img id="modalImg" src="" alt="Product">
                    <div class="modal-details">
                        <h3 id="modalTitle">Tên sản phẩm</h3>
                        <div id="modalPrice" class="modal-price">Giá</div>
                        <p id="modalDesc">Mô tả chi tiết sản phẩm sẽ hiển thị tại đây.</p>
                        <button class="btn-add-cart">Thêm vào giỏ hàng</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
