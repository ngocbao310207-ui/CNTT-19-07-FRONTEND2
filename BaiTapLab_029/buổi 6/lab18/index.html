<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab18 — Quản Lý Thành Viên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-dot"></span>
        <h1>Members</h1>
      </div>
      <p class="sidebar-sub">Quản lý danh sách thành viên</p>

      <div class="form-card" id="formCard">
        <h2 id="formTitle">Thêm Thành Viên</h2>

        <div class="field">
          <label for="inputName">Họ và tên <span class="req">*</span></label>
          <input type="text" id="inputName" placeholder="Nguyễn Văn A" />
          <span class="err" id="errName"></span>
        </div>

        <div class="field">
          <label for="inputEmail">Email <span class="req">*</span></label>
          <input type="email" id="inputEmail" placeholder="name@email.com" />
          <span class="err" id="errEmail"></span>
        </div>

        <div class="field">
          <label for="inputRole">Vai trò</label>
          <select id="inputRole">
            <option value="Thành viên">Thành viên</option>
            <option value="Trưởng nhóm">Trưởng nhóm</option>
            <option value="Quản trị viên">Quản trị viên</option>
          </select>
        </div>

        <div class="btn-group">
          <button id="btnSave" class="btn-primary">
            <span id="saveBtnText">＋ Thêm mới</span>
          </button>
          <button id="btnCancel" class="btn-ghost" style="display:none;">Huỷ</button>
        </div>
      </div>

      <div class="stats-wrap">
        <div class="stat-box">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-label">Tổng</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="statAdmin">0</span>
          <span class="stat-label">Admin</span>
        </div>
        <div class="stat-box">
          <span class="stat-num" id="statLeader">0</span>
          <span class="stat-label">Leader</span>
        </div>
      </div>
    </aside>

    
    <main class="main-content">

      
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên hoặc email..." />
        </div>
        <div class="filter-wrap">
          <select id="filterRole">
            <option value="">Tất cả vai trò</option>
            <option value="Thành viên">Thành viên</option>
            <option value="Trưởng nhóm">Trưởng nhóm</option>
            <option value="Quản trị viên">Quản trị viên</option>
          </select>
        </div>
      </div>

      
      <div id="memberList" class="member-list"></div>

      <div id="emptyState" class="empty-state">
        <div class="empty-emoji">👥</div>
        <h3>Chưa có thành viên nào</h3>
        <p>Sử dụng form bên trái để thêm thành viên mới.</p>
      </div>

    </main>
  </div>

  
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
