<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab19 — Tải Dữ Liệu Bằng Ajax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div class="header-inner">
        <div>
          <h1>📋 Danh Sách Người Dùng</h1>
        </div>
        <button id="btnReload" class="btn-reload">
          <span class="reload-ico">↻</span> Tải lại
        </button>
      </div>
    </header>

    <div class="filters-bar">
      <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Tìm tên hoặc email..." />
      </div>
      <div class="count-info">
        Hiển thị <strong id="countShow">0</strong> / <strong id="countTotal">0</strong> người dùng
      </div>
    </div>

    <div id="loadingState" class="loading-state">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <p>Đang tải dữ liệu...</p>
      </div>
    </div>

    <div id="errorState" class="error-state" style="display:none;">
      <div class="error-icon">⚠️</div>
      <h3>Không thể tải dữ liệu</h3>
      <p id="errorMsg">Vui lòng kiểm tra kết nối và thử lại.</p>
      <button id="btnRetry" class="btn-retry">Thử lại</button>
    </div>

    <div id="tableWrap" class="table-wrap" style="display:none;">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Tên</th>
            <th>Username</th>
            <th>Email</th>
            <th>Điện thoại</th>
            <th>Website</th>
            <th>Công ty</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <p>Không tìm thấy kết quả phù hợp.</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
