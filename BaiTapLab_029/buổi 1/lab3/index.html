<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 03 - Game Dự Đoán Số</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="game-container">
        <section class="game-card">
            <header>
                <h1>🎲 Đoán Số Bí Mật</h1>
                <p>Tớ đang nghĩ đến một số từ <strong>1 đến 100</strong>. Cậu đoán xem là số mấy?</p>
            </header>

            <div class="game-play">
                <input type="number" id="guessInput" placeholder="Nhập số cậu đoán..." min="1" max="100" autofocus>
                <button id="guessBtn" class="btn-primary">Đoán Ngay!</button>
            </div>

            <div id="feedbackArea" class="feedback-box hidden">
                <p id="feedbackText" class="feedback-text"></p>
            </div>

            <div class="stats">
                <p>Số lần đã đoán: <span id="attemptCount" class="badge-count">0</span></p>
            </div>

            <button id="restartBtn" class="btn-secondary hidden">🔄 Chơi lại ván mới</button>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
