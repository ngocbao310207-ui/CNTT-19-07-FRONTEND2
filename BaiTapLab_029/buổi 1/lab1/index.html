<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab 01 - BMI Calculator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-container">
      <section class="calculator-card">
        <header>
          <h1>Chỉ số BMI</h1>
          <p>Kiểm tra thể trạng cơ thể của bạn</p>
        </header>

        <form id="bmiForm" class="form-group">
          <div class="input-wrapper">
            <label for="height">Chiều cao (m)</label>
            <input
              type="number"
              id="height"
              step="0.01"
              placeholder="Ví dụ: 1.75"
              required
            />
          </div>

          <div class="input-wrapper">
            <label for="weight">Cân nặng (kg)</label>
            <input
              type="number"
              id="weight"
              step="0.1"
              placeholder="Ví dụ: 68.5"
              required
            />
          </div>

          <button type="submit" class="btn-primary">Tính toán BMI</button>
        </form>

        <div id="resultArea" class="result-box hidden">
          <h2 id="bmiValue">0.00</h2>
          <span id="bmiCategory" class="badge">Trạng thái</span>
          <p id="bmiMessage" class="message"></p>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
