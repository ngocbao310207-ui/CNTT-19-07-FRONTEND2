<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 05 - Danh Sách Sản Phẩm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cửa hàng của Hoàng Anh</h1>
        
        <div class="filter-section">
            <input type="text" id="searchBar" placeholder="🔍 Tìm kiếm sản phẩm...">
            <select id="priceFilter">
                <option value="all">Tất cả mức giá</option>
                <option value="low">Dưới 500.000 VNĐ</option>
                <option value="high">Trên 500.000 VNĐ</option>
            </select>
        </div>

        <div class="product-grid" id="productGrid"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
