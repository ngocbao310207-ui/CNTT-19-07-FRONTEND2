<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 04 - Quản Lý Điểm Số</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>📊 Bảng Điểm Môn Lập Trình Lộ Trình Front-End</h1>
        </header>

        <main class="dashboard-grid">
            <section class="panel list-panel">
                <h2>Danh sách điểm số</h2>
                <div class="table-responsive">
                    <table class="grades-table">
                        <thead>
                            <tr>
                                <th>STT</th>
                                <th>Điểm Số (Hệ 10)</th>
                                <th>Trạng Thái</th>
                            </tr>
                        </thead>
                        <tbody id="gradesList">
                            </tbody>
                    </table>
                </div>
            </section>

            <section class="panel summary-panel">
                <h2>Kết quả học tập</h2>
                
                <div class="summary-cards">
                    <div class="card card-total">
                        <span class="card-title">Tổng điểm</span>
                        <strong class="card-value" id="totalScore">0.0</strong>
                    </div>
                    
                    <div class="card card-avg">
                        <span class="card-title">Điểm Trung Bình</span>
                        <strong class="card-value" id="avgScore">0.0</strong>
                    </div>
                </div>

                <div class="classification-box" id="classificationBox">
                    <h3>Phân loại học lực</h3>
                    <h2 id="finalRank" class="rank-badge">Đang xử lý...</h2>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
