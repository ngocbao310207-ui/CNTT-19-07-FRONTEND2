<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 09 - Quản lý công việc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="todo-card">
            <h2>📝 Quản Lý Công Việc</h2>
            
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Nhập công việc mới...">
                <button id="addBtn">Thêm</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">Tất cả</button>
                <button class="filter-btn" data-filter="active">Chưa xong</button>
                <button class="filter-btn" data-filter="completed">Đã xong</button>
            </div>

            <ul id="taskList" class="task-list"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
