<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 08 - Interactive Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="counter-card">
            <h2>Bộ Đếm Tương Tác</h2>
            
            <div class="display-screen">
                <h1 id="counterValue" class="zero">0</h1>
            </div>

            <div class="controls">
                <div class="btn-group">
                    <button id="btnMinus5" class="btn btn-secondary">-5</button>
                    <button id="btnMinus1" class="btn btn-primary">-1</button>
                </div>
                
                <button id="btnReset" class="btn btn-reset">Đặt lại (0)</button>
                
                <div class="btn-group">
                    <button id="btnPlus1" class="btn btn-primary">+1</button>
                    <button id="btnPlus5" class="btn btn-secondary">+5</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
