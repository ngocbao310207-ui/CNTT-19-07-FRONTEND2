<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 07 - Advanced DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🍏 Apple Store - Lựa chọn phiên bản</h1>
        </header>

        <div class="product-card" id="mainCard">
            <div class="image-box">
                <img id="productImage" src="https://cdn1.viettelstore.vn/Images/Product/ProductImage/1349547788.jpeg" alt="iPhone Mặc định">
            </div>
            <div class="product-info">
                <div class="header-info">
                    <h2 id="productTitle">iPhone 15 Pro</h2>
                    <span id="statusBadge" class="badge default-badge">Mặc định</span>
                </div>
                <p id="productDesc">Thiết kế Titan siêu nhẹ, siêu bền cùng chip A17 Pro đột phá. Trải nghiệm đẳng cấp với phiên bản nguyên bản hoàn hảo.</p>
            </div>
        </div>

        <div class="controls">
            <button id="btnVariant1" class="btn btn-blue">Phiên bản Xanh</button>
            <button id="btnVariant2" class="btn btn-dark">Phiên bản Đen</button>
            <button id="btnReset" class="btn btn-danger">Khôi phục ban đầu</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
