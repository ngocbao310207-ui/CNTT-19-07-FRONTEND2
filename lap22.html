<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 22 - Login Responsive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-md-6 col-lg-4">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4 p-sm-5">
                        <h3 class="card-title text-center mb-4 fw-bold text-secondary">ĐĂNG NHẬP</h3>
                        
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Địa chỉ Email</label>
                                <input type="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>

                            <div class="mb-4 d-flex justify-content-between align-items-center">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label text-muted" for="rememberMe" style="font-size: 0.9rem;">Ghi nhớ đăng nhập</label>
                                </div>
                                <a href="#" class="text-decoration-none" style="font-size: 0.9rem;">Quên mật khẩu?</a>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase">Đăng nhập</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
