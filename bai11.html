<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Đối Tượng - Lab 11</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #0b0f19; font-family: 'Segoe UI', sans-serif; color: #ffffff; }
        .search-card { background-color: #111827; border: 1px solid #1f2937; border-radius: 16px; box-shadow: 0 0 25px rgba(0, 212, 255, 0.1); }
        .form-control { background-color: #1f2937; border: 1px solid #374151; color: #ffffff; }
        .form-control:focus { background-color: #1f2937; border-color: #06b6d4; color: #ffffff; box-shadow: none; }
        .info-panel { background-color: #1f2937; border: 1px solid #374151; border-radius: 12px; }
        .glow-text { color: #06b6d4; text-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
    </style>
</head>
<body class="py-5">

    <div class="container" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-uppercase glow-text">Truy Vấn Tham Số Động</h4>
            <p class="text-muted small m-0">Bài thực hành kết nối và render chi tiết cấu trúc đối tượng API</p>
        </div>

        <div class="search-card p-4 shadow-lg mb-4">
            <form id="queryForm" class="row g-2">
                <div class="col-8">
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted">ID</span>
                        <input type="text" class="form-control" id="targetId" placeholder="Nhập mã cần tra cứu..." required autocomplete="off">
                    </div>
                </div>
                <div class="col-4 d-flex gap-2">
                    <button type="submit" class="btn btn-info text-dark fw-bold w-100">Tìm</button>
                    <button type="button" class="btn btn-outline-secondary" id="btnResetForm"><i class="bi bi-trash3"></i></button>
                </div>
            </form>
        </div>

        <div id="displayWrapper">
            <div class="text-center text-muted py-5 search-card border-dashed">
                <i class="bi bi-hdd-network fs-1 text-secondary mb-2 d-block"></i>
                <span>Hệ thống sẵn sàng. Vui lòng nhập ID đối tượng.</span>
            </div>
        </div>
    </div>

    <script>
        const ENDPOINT_API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        
        const queryForm = document.getElementById("queryForm");
        const targetId = document.getElementById("targetId");
        const btnResetForm = document.getElementById("btnResetForm");
        const displayWrapper = document.getElementById("displayWrapper");

        function showLoading() {
            displayWrapper.innerHTML = `
                <div class="text-center py-5 search-card">
                    <div class="spinner-border text-info mb-2"></div>
                    <p class="text-muted small m-0">Đang đồng bộ gói tin dữ liệu...</p>
                </div>
            `;
        }

        function showNotification(msg, isCritical = false) {
            const statusClass = isCritical ? "danger" : "warning";
            const textClass = isCritical ? "text-danger" : "text-warning";
            displayWrapper.innerHTML = `
                <div class="alert alert-${statusClass} search-card p-4 border-${statusClass}">
                    <h6 class="fw-bold ${textClass} mb-1">Trạng thái phản hồi</h6>
                    <span class="small text-white-50">${msg}</span>
                </div>
            `;
        }

        function showDataDetail(obj) {
            displayWrapper.innerHTML = `
                <div class="search-card p-4 shadow">
                    <div class="d-flex align-items-center border-bottom border-secondary pb-3 mb-3">
                        <div class="bg-info text-dark rounded-3 p-3 me-3"><i class="bi bi-database-check fs-4"></i></div>
                        <div>
                            <h5 class="fw-bold text-info m-0">${obj.fullName || "Trống"}</h5>
                            <small class="text-muted">Mã định danh định vị: #${obj.id}</small>
                        </div>
                    </div>
                    <div class="info-panel p-3">
                        <div class="row g-2 small">
                            <div class="col-4 text-muted text-uppercase font-monospace">Hộp thư:</div>
                            <div class="col-8 fw-semibold text-break">${obj.email || "Không có dữ liệu"}</div>
                            <div class="col-4 text-muted text-uppercase font-monospace mt-2">Lớp biên chế:</div>
                            <div class="col-8 mt-2"><span class="badge bg-dark border border-secondary">${obj.classroom || "N/A"}</span></div>
                        </div>
                    </div>
                </div>
            `;
        }

        queryForm.addEventListener("submit", function(e) {
            e.preventDefault();
            const id = targetId.value.trim();
            if (!id) return;

            showLoading();

            fetch(`${ENDPOINT_API}/${id}`)
                .then(res => {
                    if (res.status === 404) throw new Error("Mã định danh không tồn tại trên MockAPI.");
                    if (!res.ok) throw new Error("Lỗi kết nối hoặc sự cố từ phía máy chủ.");
                    return res.json();
                })
                .then(data => {
                    if (!data || Object.keys(data).length === 0) {
                        showNotification("Cấu trúc dữ liệu trả về rỗng.");
                    } else {
                        showDataDetail(data);
                    }
                })
                .catch(err => {
                    showNotification(err.message, !err.message.includes("không tồn tại"));
                });
        });

        btnResetForm.addEventListener("click", function() {
            targetId.value = "";
            displayWrapper.innerHTML = `
                <div class="text-center text-muted py-5 search-card">
                    <i class="bi bi-hdd-network fs-1 text-secondary mb-2 d-block"></i>
                    <span>Hệ thống sẵn sàng. Vui lòng nhập ID đối tượng.</span>
                </div>
            `;
            targetId.focus();
        });
    </script>
</body>
</html>
