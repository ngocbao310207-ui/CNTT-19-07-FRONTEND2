<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 07 - Thao tác DOM</title>
    <style>
        .dark-mode { background-color: #333; color: #fff; }
        .card { padding: 15px; border: 1px solid #ccc; width: 300px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="contentBox" class="card">
        <h2 id="title">Tiêu đề ban đầu</h2> <p id="desc">Đoạn văn mô tả chi tiết nội dung ban đầu.</p> <img id="image" src="https://picsum.photos/id/1/200/150" alt="Sample Image"><br><br> </div>
    
    <br>
    <button onclick="changeContent()">Thay đổi nội dung</button> <button onclick="resetContent()">Khôi phục (Mở rộng)</button> <script>
function changeContent() {
    // Lấy tham chiếu các phần tử
    document.getElementById("title").innerText = "Tiêu đề đã được cập nhật!"; //
    document.getElementById("desc").innerText = "Đoạn văn đã đổi sang một nội dung hoàn toàn mới."; //
    document.getElementById("image").src = "https://picsum.photos/id/10/200/150"; //
    document.getElementById("contentBox").classList.add("dark-mode"); //
}

function resetContent() {
    // Yêu cầu mở rộng: Khôi phục trạng thái cũ
    document.getElementById("title").innerText = "Tiêu đề ban đầu";
    document.getElementById("desc").innerText = "Đoạn văn mô tả chi tiết nội dung ban đầu.";
    document.getElementById("image").src = "https://picsum.photos/id/1/200/150";
    document.getElementById("contentBox").classList.remove("dark-mode");
}
</script>
</body>
</html>
