<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 13 - Thao tác jQuery cơ bản</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
    <style>
        #textBox { background-color: #d4edda; padding: 20px; border: 1px solid #c3e6cb; width: 300px; margin-top:15px;}
    </style>
</head>
<body>
    <h2>Ẩn / Hiện nội dung với jQuery</h2>
    <button id="btnHide">Ẩn nội dung</button> <button id="btnShow">Hiện nội dung</button> <button id="btnToggle">Chuyển trạng thái (Toggle)</button> <div id="textBox">
        <p>Đây là khối văn bản mẫu cần được ẩn hiện theo các nút điều khiển phía trên.</p>
    </div>

<script>
$(document).ready(function(){
    // Dùng selector lấy phần tử và áp dụng hàm có sẵn của thư viện
    $("#btnHide").click(function(){
        $("#textBox").hide(); // Ẩn
    });

    $("#btnShow").click(function(){
        $("#textBox").show(); // Hiện
    });

    $("#btnToggle").click(function(){
        $("#textBox").toggle(); // Chuyển đổi qua lại
    });
});
</script>
</body>
</html>
