<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 15 - Validate Form jQuery</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .error-msg { color: red; font-size: 13px; display: block; margin-top: 3px; }
        .input-err { border: 1px solid red !important; }
        .form-group { margin-bottom: 12px; }
        label { display:block; font-weight:bold; }
        input { width: 250px; padding: 5px; border:1px solid #ccc;}
    </style>
</head>
<body>
    <h2>Form đăng ký thành viên</h2>
    <form id="regForm" novalidate>
        <div class="form-group">
            <label>Họ và tên:</label>
            <input type="text" id="fullName">
            <span class="error-msg" id="errName"></span> </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email">
            <span class="error-msg" id="errEmail"></span>
        </div>
        <div class="form-group">
            <label>Mật khẩu:</label>
            <input type="password" id="password">
            <span class="error-msg" id="errPass"></span>
        </div>
        <div class="form-group">
            <label>Xác nhận mật khẩu:</label>
            <input type="password" id="confirmPassword">
            <span class="error-msg" id="errConfirm"></span>
        </div>
        <button type="submit">Gửi thông tin</button>
    </form>

<script>
$(document).ready(function(){
    $("#regForm").submit(function(e){
        e.preventDefault(); // Chặn hành vi tải trang mặc định
        
        // Reset lỗi cũ
        $(".error-msg").text("");
        $("input").removeClass("input-err"); //

        let isValid = true;

        // 1. Kiểm tra họ tên
        const name = $("#fullName").val().trim(); //
        if(name === "") {
            $("#errName").text("Họ tên không được để trống!"); //
            $("#fullName").addClass("input-err"); //
            isValid = false;
        }

        // 2. Kiểm tra Email bằng biểu thức chính quy (Regex)
        const email = $("#email").val().trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; //
        if(!emailRegex.test(email)) {
            $("#errEmail").text("Định dạng Email không chính xác!"); //
            $("#email").addClass("input-err");
            isValid = false;
        }

        // 3. Kiểm tra độ dài mật khẩu >= 6 ký tự
        const pass = $("#password").val();
        if(pass.length < 6) {
            $("#errPass").text("Mật khẩu phải chứa ít nhất 6 ký tự!"); //
            $("#password").addClass("input-err");
            isValid = false;
        }

        // 4. Kiểm tra xác nhận trùng khớp mật khẩu
        const confirmPass = $("#confirmPassword").val();
        if(confirmPass !== pass) {
            $("#errConfirm").text("Mật khẩu xác nhận không khớp!"); //
            $("#confirmPassword").addClass("input-err");
            isValid = false;
        }

        if(isValid) {
            alert("Đăng ký biểu mẫu thành công và hợp lệ! 🎉"); //
        }
    });
});
</script>
</body>
</html>
