<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sự kiện Công nghệ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="#">
Tech Event
</a>

<button class="navbar-toggler"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse"
id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="#">
Trang chủ
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">
Lịch trình
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">
Đăng ký
</a>
</li>

</ul>

</div>

</div>

</nav>


<!-- Hero -->

<section class="bg-primary text-white text-center p-5">

<h1>
TECH EVENT 2026
</h1>

<p>
Sự kiện công nghệ dành cho sinh viên
</p>

<button class="btn btn-light">
Tham gia ngay
</button>

</section>


<!-- Nội dung -->

<div class="container mt-5">

<div class="row">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h3>
Điểm nổi bật
</h3>

<ul>
<li>Workshop AI</li>
<li>Thi lập trình</li>
<li>Giao lưu doanh nghiệp</li>
</ul>

</div>

</div>

</div>


<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h3>
Lịch trình
</h3>

<ul>
<li>08:00 Khai mạc</li>
<li>09:00 Hội thảo</li>
<li>13:30 Cuộc thi</li>
</ul>

</div>

</div>

</div>

</div>

</div>


<!-- Form -->

<div class="container mt-5 mb-5">

<h2 class="text-center mb-4">
Đăng ký tham gia
</h2>

<form>

<div class="mb-3">

<input
class="form-control"
placeholder="Họ tên">

</div>

<div class="mb-3">

<input
type="email"
class="form-control"
placeholder="Email">

</div>

<div class="mb-3">

<textarea
class="form-control"
placeholder="Nội dung">
</textarea>

</div>

<button class="btn btn-success w-100">
Gửi đăng ký
</button>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
