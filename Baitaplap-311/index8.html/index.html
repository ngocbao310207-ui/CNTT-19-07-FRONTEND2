<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài lab 08 - Bộ đếm tương tác</title>
    <style>
        #counterValue { font-size: 3em; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <h2>Bộ đếm tương tác tự động</h2>
    <div id="counterValue">0</div>
    <button id="decreaseBtn">Giảm (-1)</button>
    <button id="resetBtn">Đặt lại (Reset)</button>
    <button id="increaseBtn">Tăng (+1)</button>

    <script>
        // Khai báo biến lưu trạng thái số đếm [cite: 129, 137]
        let count = 0;

        const displayBox = document.getElementById('counterValue');

        // Hàm render giao diện tách biệt với xử lý logic [cite: 140, 141]
        function updateUI() {
            displayBox.innerText = count;
            
            // Yêu cầu mở rộng: Đổi màu số đếm theo giá trị âm/dương [cite: 142]
            if (count > 0) {
                displayBox.style.color = "green";
            } else if (count < 0) {
                displayBox.style.color = "red";
            } else {
                displayBox.style.color = "black";
            }
        }

        // Gắn sự kiện click cập nhật trạng thái [cite: 129, 133, 134, 139]
        document.getElementById('increaseBtn').addEventListener('click', () => { count++; updateUI(); });
        document.getElementById('decreaseBtn').addEventListener('click', () => { count--; updateUI(); });
        document.getElementById('resetBtn').addEventListener('click', () => { count = 0; updateUI(); });

        // Chạy kết xuất giao diện ban đầu
        updateUI();
    </script>
</body>
</html>
