<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài lab 19 - Ajax Get Table</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <h2>Danh sách thành viên từ máy chủ giả lập</h2>
    
    <table border="1" cellpadding="8" style="border-collapse:collapse; width:500px;">
        <thead>
            <tr style="background:#f2f2f2;"><th>ID</th><th>Họ và Tên</th><th>Email</th></tr>
        </thead>
        <tbody id="ajaxTableBody"></tbody>
    </table>

    <script>
        $(document).ready(function(){
            const mockUrl = "https://656461f3ceac410ab831a987.mockapi.io/users";

            function loadDataWithAjax() {
                $("#ajaxTableBody").html("<tr><td colspan='3'>Hệ thống đang gọi Ajax lấy dữ liệu...</td></tr>");

                // Gọi lệnh Ajax GET bất đồng bộ lấy dữ liệu [cite: 286, 287, 291, 295]
                $.ajax({
                    url: mockUrl,
                    method: "GET",
                    dataType: "json",
                    success: function(response) { // success callback [cite: 287]
                        let tbody = $("#ajaxTableBody");
                        tbody.empty(); // Xóa trạng thái đang tải
                        
                        // Vòng lặp render bảng kết quả dữ liệu [cite: 287, 296]
                        response.forEach(item => {
                            let tr = `<tr>
                                <td>${item.id}</td>
                                <td>${item.name}</td>
                                <td>${item.email}</td>
                            </tr>`;
                            tbody.append(tr);
                        });
                    },
                    error: function() {
                        $("#ajaxTableBody").html("<tr><td colspan='3' style='color:red;'>Lỗi liên kết máy chủ API mockapi.io.</td></tr>");
                    }
                });
            }

            // Gọi tải dữ liệu khi vừa mở trang xong [cite: 297]
            loadDataWithAjax();
        });
    </script>
</body>
</html>
