<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hủy Kết Nối Dữ Liệu - Lab 13</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #fff1f2;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #0f172a;
            min-height: 100vh;
        }
        .neo-box {
            background: #ffffff;
            border: 2px solid #0f172a;
            border-radius: 16px;
            box-shadow: 6px 6px 0px #0f172a;
        }
        .neo-title {
            font-weight: 900;
            color: #0f172a;
            text-transform: uppercase;
        }
        .neo-input {
            background: #ffffff;
            border: 2px solid #0f172a;
            color: #0f172a;
            font-weight: bold;
            border-radius: 10px;
            padding: 12px;
        }
        .neo-input:focus {
            background: #ffffff;
            border-color: #ef4444;
            box-shadow: 4px 4px 0px #0f172a;
            color: #0f172a;
        }
        .btn-danger-neo {
            background: #ef4444;
            border: 2px solid #0f172a;
            color: #ffffff;
            font-weight: 700;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 3px 3px 0px #0f172a;
            transition: all 0.15s ease;
        }
        .btn-danger-neo:hover {
            background: #dc2626;
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px #0f172a;
            color: #ffffff;
        }
        .status-box {
            border-radius: 12px;
            background: #fff5f5;
            border: 2px dashed #fca5a5;
            color: #991b1b;
            font-weight: 500;
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">

    <div class="container">
        <div class="row justify-content-center w-100 m-0">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 p-0">
                
                <div class="text-center mb-4">
                    <h2 class="neo-title m-0">Hủy Khối Dữ Liệu</h2>
                    <p class="text-muted small fw-bold mt-1">Thao tác xóa trực tiếp cấu trúc bản ghi MockAPI</p>
                </div>

                <div class="neo-box p-4 p-sm-5">
                    <form id="deleteForm">
                        <div class="mb-4">
                            <label class="form-label text-danger fw-bold small text-uppercase">ID Đối tượng cần xóa</label>
                            <input type="text" class="form-control neo-input text-center font-monospace fs-4" id="deleteId" placeholder="Mã định danh..." required autocomplete="off">
                        </div>

                        <button type="submit" class="btn btn-danger-neo w-100 text-uppercase"><i class="bi bi-trash3 me-2"></i>Thực Thi Lệnh Xóa</button>
                    </form>

                    <div id="statusWrapper" class="status-box p-3 text-center mt-4 small">
                        <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Cảnh báo: Hành động này không thể hoàn tác sau khi khớp lệnh.
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const ENDPOINT_API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        const deleteForm = document.getElementById("deleteForm");
        const deleteId = document.getElementById("deleteId");
        const statusWrapper = document.getElementById("statusWrapper");

        deleteForm.addEventListener("submit", function(e) {
            e.preventDefault();
            const id = deleteId.value.trim();
            if(!id) return;

            statusWrapper.innerHTML = `
                <div class="spinner-border spinner-border-sm text-danger me-2"></div>
                <span class="fw-bold">Đang thực thi lệnh xóa bản ghi trên API...</span>
            `;

            fetch(`${ENDPOINT_API}/${id}`, {
                method: "DELETE"
            })
            .then(res => {
                if (res.status === 404) throw new Error("Mã ID không tồn tại để phản hồi lệnh xóa.");
                if (!res.ok) throw new Error("Máy chủ API từ chối phản hồi gói tin.");
                return res.json();
            })
            .then(data => {
                statusWrapper.innerHTML = `
                    <div class="text-danger fw-bold mb-1"><i class="bi bi-x-circle-fill me-2"></i>Đã xóa hoàn toàn!</div>
                    <span class="text-secondary small fw-bold">Bản ghi mang ID #${id} đã được gỡ bỏ khỏi hệ thống đám mây.</span>
                `;
                deleteForm.reset();
            })
            .catch(err => {
                statusWrapper.innerHTML = `<span class="text-dark fw-bold"><i class="bi bi-patch-exclamation-fill text-warning me-2"></i>Thất bại: ${err.message}</span>`;
            });
        });
    </script>
</body>
</html>
