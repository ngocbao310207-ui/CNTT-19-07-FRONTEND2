<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 10 - Fetch API</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .loading { color: #f39c12; font-style: italic; font-weight: bold; }
        .error { color: #e74c3c; font-weight: bold; }
        .user-card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 10px; background-color: #f9f9f9; }
        .user-card h3 { margin: 0 0 10px 0; color: #2c3e50; }
        .user-card p { margin: 5px 0; color: #555; }
    </style>
</head>
<body>

    <h2>Danh Sách Người Dùng (API)</h2>
    <div id="status-message"></div>
    <div id="user-list"></div>

    <script>
        const statusEl = document.getElementById('status-message');
        const userListEl = document.getElementById('user-list');

        // URL API mẫu (Thay bằng link mockapi.io của bạn nếu có)
        const API_URL = 'https://jsonplaceholder.typicode.com/users';

        // 2. Viết hàm fetch lấy dữ liệu bằng async/await
        async function fetchUsers() {
            // Yêu cầu mở rộng: Hiển thị thông báo tải dữ liệu
            statusEl.innerHTML = '<p class="loading">Đang tải dữ liệu từ API...</p>';
            userListEl.innerHTML = '';

            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error('Kết nối API thất bại! Mã lỗi: ' + response.status);
                }

                const data = await response.json();
                statusEl.innerHTML = ''; // Xóa thông báo loading
                
                // 3. Gọi hàm render
                renderUsers(data);

            } catch (error) {
                // Yêu cầu mở rộng: Xử lý lỗi khi không lấy được dữ liệu
                statusEl.innerHTML = `<p class="error">Đã xảy ra lỗi: ${error.message}</p>`;
            }
        }

        // 3. Hàm render danh sách ra HTML hiển thị ít nhất 3 trường thông tin
        function renderUsers(users) {
            users.forEach(user => {
                const card = document.createElement('div');
                card.classList.add('user-card');

                // Thể hiện ít nhất 3 trường: Tên (Name), Email, và Công ty (Company) hoặc Thành phố (City)
                card.innerHTML = `
                    <h3>📌 ${user.name}</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Thành phố:</strong> ${user.address.city}</p>
                    <p><strong>Công ty:</strong> ${user.company.name}</p>
                `;
                userListEl.appendChild(card);
            });
        }

        // 4. Kiểm tra việc hiển thị dữ liệu khi tải trang
        window.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
