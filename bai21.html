<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Scanner Terminal - Lab 21</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050b05; font-family: 'Share Tech Mono', monospace; color: #00ff66; }
        .cyber-panel { background: #081409; border: 2px solid #00ff66; box-shadow: 0 0 15px rgba(0, 255, 102, 0.2); border-radius: 4px; max-width: 600px; margin: auto; }
        .cyber-title { font-family: 'Orbitron', sans-serif; font-weight: 800; text-shadow: 0 0 10px #00ff66; color: #ffffff; text-transform: uppercase; }
        .cyber-input { background: #020502; border: 1px solid #00ff66; color: #ffffff; padding: 12px; font-weight: bold; border-radius: 2px; }
        .cyber-input:focus { background: #0c1f0e; border-color: #ffffff; box-shadow: 0 0 15px rgba(0, 255, 102, 0.5); color: #ffffff; }
        .cyber-item { background: #030a04; border: 1px solid #00ff66; color: #ffffff; padding: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body class="py-5">
    <div class="container">
        <div class="cyber-panel p-4">
            <h5 class="cyber-title mb-3">// IDENTITY_SCANNER_v2.1 //</h5>
            <input type="text" class="form-control cyber-input mb-4" id="searchName" placeholder="Gõ chuỗi kí tự quét định danh tên...">
            <div id="renderArea">
                <div class="text-center opacity-50 small">INITIALIZING CACHE STORAGE...</div>
            </div>
        </div>
    </div>
    <script>
        const API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        let cache = [];
        window.addEventListener("DOMContentLoaded", () => {
            fetch(API).then(res => res.json()).then(data => {
                cache = Array.isArray(data) ? data : [];
                render(cache);
            });
        });
        function render(arr) {
            const area = document.getElementById("renderArea");
            if(arr.length === 0) {
                area.innerHTML = `<div class="text-center text-danger small fw-bold py-2">[ NO_MATCHES_FOUND_IN_DATABASE ]</div>`;
                return;
            }
            area.innerHTML = arr.map(item => `
                <div class="cyber-item">
                    <span class="fw-bold" style="color: #00ff66;">${item.fullName || "UNKNOWN"}</span>
                    <span class="opacity-75 small">HASH_ID: #${item.id}</span>
                </div>
            `).join('');
        }
        document.getElementById("searchName").addEventListener("input", (e) => {
            const val = e.target.value.trim().toLowerCase();
            const filtered = cache.filter(item => item.fullName && item.fullName.toLowerCase().includes(val));
            render(filtered);
        });
    </script>
</body>
</html>
