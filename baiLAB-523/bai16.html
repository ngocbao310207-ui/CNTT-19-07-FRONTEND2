<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ đếm lượt tương tác</title>

    <!-- jQuery CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 60px;
            body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 60px;

   


}
        }

        .counter-box{
            width: 350px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            margin-bottom: 20px;
        }

        #count{
            font-size: 60px;
            font-weight: bold;
            margin: 20px 0;
            transition: 0.3s;
        }

        .positive{
            color: green;
        }

        .negative{
            color: red;
        }

        .zero{
            color: black;
        }

        button{
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .increase{
            background-color: #4CAF50;
            color: white;
        }

        .decrease{
            background-color: #f44336;
            color: white;
        }

        .reset{
            background-color: #555;
            color: white;
        }

        .plus10{
            background-color: orange;
            color: white;
        }

        button:hover{
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="counter-box">
        <h1>Bộ Đếm Tương Tác</h1>

        <div id="count" class="zero">0</div>

        <button class="increase">+1</button>
        <button class="decrease">-1</button>
        <button class="plus10">+10</button>
        <button class="reset">Reset</button>
    </div>

    <script>
        //jQuery
        $(document).ready(function(){

            // Biến trạng thái
            let count = 0;

            // Hàm cập nhật giao diện
            function updateCounter(){
                $("#count").text(count);

                // Đổi màu theo giá trị
                $("#count").removeClass("positive negative zero");

                if(count > 0){
                    $("#count").addClass("positive");
                }
                else if(count < 0){
                    $("#count").addClass("negative");
                }
                else{
                    $("#count").addClass("zero");
                }
            }

            // Nút tăng +1
            $(".increase").click(function(){
                count++;
                updateCounter();
            });

            // Nút giảm -1
            $(".decrease").click(function(){
                count--;
                updateCounter();
            });

            // Nút tăng nhanh +10
            $(".plus10").click(function(){
                count += 10;
                updateCounter();
            });

            // Nút reset
            $(".reset").click(function(){
                count = 0;
                updateCounter();
            });

        });
    </script>

</body>
</html>
