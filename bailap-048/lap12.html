<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 12 - Quản lý sinh viên</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 30px;
        }
        
        .container {
            max-width: 1000px;
            margin: auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #2563eb;
        }
        
        .form-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }
        
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        button:hover {
            background: #1d4ed8;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        table th,
        table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        
        table th {
            background: #2563eb;
            color: white;
        }
        
        .delete-btn {
            background: #ef4444;
        }
        
        .delete-btn:hover {
            background: #dc2626;
        }
        
        .loading,
        .message {
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
        }
        
        .loading {
            color: #2563eb;
        }
        
        .message {
            color: red;
        }
        
        .student-avatar {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🎓 Quản lý sinh viên</h1>

        <!-- FORM -->
        <div class="form-box">

            <div class="form-group">
                <label>Họ tên</label>
                <input type="text" id="name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="form-group">
                <label>Lớp</label>
                <input type="text" id="className">
            </div>

            <div class="form-group">
                <label>Ảnh đại diện</label>
                <input type="text" id="avatar" placeholder="Link ảnh">
            </div>

            <button id="addBtn">Thêm sinh viên</button>

        </div>

        <!-- MESSAGE -->
        <div id="loading" class="loading">
            Đang tải dữ liệu...
        </div>

        <div id="message" class="message"></div>

        <!-- TABLE -->
        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Lớp</th>
                    <th>Hành động</th>
                </tr>
            </thead>

            <tbody id="studentList"></tbody>

        </table>

    </div>

    <script>
        // ================= API =================
        const API_URL = "https://6666b2caa2f8516ff7a62b67.mockapi.io/students";


        // ================= ELEMENTS =================
        const studentList = document.getElementById("studentList");
        const loading = document.getElementById("loading");
        const message = document.getElementById("message");

        const nameInput = document.getElementById("name");
        const emailInput = document.getElementById("email");
        const classInput = document.getElementById("className");
        const avatarInput = document.getElementById("avatar");

        const addBtn = document.getElementById("addBtn");


        // ================= GET STUDENTS =================
        async function fetchStudents() {

            try {

                loading.style.display = "block";

                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error("Không thể tải dữ liệu");
                }

                const students = await response.json();

                renderStudents(students);

            } catch (error) {

                message.textContent = error.message;

            } finally {

                loading.style.display = "none";

            }

        }


        // ================= RENDER =================
        function renderStudents(students) {

            studentList.innerHTML = "";

            students.forEach(student => {

                const tr = document.createElement("tr");

                tr.innerHTML = `
        
            <td>${student.id}</td>

            <td>
                <img 
                    src="${student.avatar}" 
                    class="student-avatar"
                >
            </td>

            <td>${student.name}</td>

            <td>${student.email}</td>

            <td>${student.className}</td>

            <td>
                <button 
                    class="delete-btn"
                    onclick="deleteStudent('${student.id}')"
                >
                    Xóa
                </button>
            </td>
        
        `;

                studentList.appendChild(tr);

            });

        }


        // ================= ADD STUDENT =================
        async function addStudent() {

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const className = classInput.value.trim();
            const avatar = avatarInput.value.trim();

            if (name === "" || email === "" || className === "") {

                alert("Vui lòng nhập đầy đủ thông tin");

                return;
            }

            const newStudent = {

                name,
                email,
                className,

                avatar: avatar ||
                    "https://i.pravatar.cc/150?img=3"

            };

            try {

                const response = await fetch(API_URL, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify(newStudent)

                });

                if (!response.ok) {
                    throw new Error("Không thể thêm sinh viên");
                }

                // reset form
                nameInput.value = "";
                emailInput.value = "";
                classInput.value = "";
                avatarInput.value = "";

                // load lại
                fetchStudents();

            } catch (error) {

                alert(error.message);

            }

        }


        // ================= DELETE STUDENT =================
        async function deleteStudent(id) {

            const confirmDelete = confirm(
                "Bạn có chắc muốn xóa sinh viên này?"
            );

            if (!confirmDelete) return;

            try {

                const response = await fetch(`${API_URL}/${id}`, {

                    method: "DELETE"

                });

                if (!response.ok) {
                    throw new Error("Xóa thất bại");
                }

                fetchStudents();

            } catch (error) {

                alert(error.message);

            }

        }


        // ================= EVENTS =================
        addBtn.addEventListener("click", addStudent);


        // ================= START =================
        fetchStudents();
    </script>

</body>

</html>
