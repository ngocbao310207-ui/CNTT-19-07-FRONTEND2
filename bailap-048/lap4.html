<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Điểm Sinh Viên</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            padding: 45px;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1em;
        }
        
        .input-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .input-section h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.3em;
            text-align: center;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        input[type="number"] {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border: 2px solid white;
            border-radius: 12px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }
        
        input[type="number"]:focus {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }
        
        .btn-add {
            padding: 12px 25px;
            background: white;
            color: #f5576c;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        
        .btn-add:active {
            transform: translateY(0);
        }
        
        .scores-display {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        
        .scores-display h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .scores-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .score-item {
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            color: #667eea;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .score-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-remove {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s ease;
        }
        
        .btn-remove:hover {
            background: #ee5a6f;
            transform: rotate(90deg);
        }
        
        .empty-message {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 20px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-clear {
            background: #ff4757;
            color: white;
        }
        
        .btn-remove-lowest {
            background: #ffa502;
            color: white;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .result-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 20px;
            color: white;
            margin-top: 25px;
            display: none;
            animation: popIn 0.5s ease-out;
        }
        
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .result-section.show {
            display: block;
        }
        
        .result-header {
            text-align: center;
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .result-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .result-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .result-value {
            font-size: 2em;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .classification {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        
        .classification-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .classification-title {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .classification-desc {
            font-size: 1em;
            opacity: 0.8;
        }
        
        .excellent {
            color: #2ecc71;
        }
        
        .good {
            color: #3498db;
        }
        
        .average {
            color: #f39c12;
        }
        
        .weak {
            color: #e74c3c;
        }
        
        .error {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            animation: shake 0.5s ease-in-out;
        }
        
        .error.show {
            display: block;
        }
        
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }
        
        .statistics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #ffd700;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 1.8em;
            }
            .input-group {
                flex-direction: column;
            }
            input[type="number"] {
                width: 100%;
            }
            .btn-add {
                width: 100%;
            }
            .result-grid {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 Quản Lý Điểm Sinh Viên</h1>
            <p class="subtitle">Hệ thống tính toán và phân loại kết quả học tập</p>
        </div>

        <div class="input-section">
            <h2>➕ Thêm Điểm Mới</h2>
            <div class="input-group">
                <input type="number" id="scoreInput" placeholder="Nhập điểm (0-10)" step="0.1" min="0" max="10">
                <button class="btn-add" onclick="addScore()">Thêm Điểm</button>
            </div>
        </div>

        <div class="scores-display">
            <h3>📝 Danh Sách Điểm (<span id="scoreCount">0</span> môn)</h3>
            <div class="scores-list" id="scoresList">
                <div class="empty-message">Chưa có điểm nào. Vui lòng thêm điểm!</div>
            </div>

            <div class="action-buttons">
                <button class="btn-action btn-calculate" onclick="calculateAverage()">
                    🧮 Tính Điểm Trung Bình
                </button>
                <button class="btn-action btn-remove-lowest" onclick="removeLowestScore()">
                    🗑️ Xóa Điểm Thấp Nhất
                </button>
                <button class="btn-action btn-clear" onclick="clearAllScores()">
                    ❌ Xóa Tất Cả
                </button>
            </div>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="result-section" id="result">
            <div class="result-header">
                🎓 KẾT QUẢ HỌC TẬP
            </div>

            <div class="result-grid">
                <div class="result-item">
                    <div class="result-label">Tổng Điểm</div>
                    <div class="result-value" id="totalScore">0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Điểm Trung Bình</div>
                    <div class="result-value" id="averageScore">0.00</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Số Môn Học</div>
                    <div class="result-value" id="subjectCount">0</div>
                </div>
            </div>

            <div class="statistics">
                <div class="stat-card">
                    <div class="stat-label">Điểm Cao Nhất</div>
                    <div class="stat-value" id="maxScore">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Điểm Thấp Nhất</div>
                    <div class="stat-value" id="minScore">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Số Môn ≥ 5</div>
                    <div class="stat-value" id="passCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Số Môn
                        < 5</div>
                            <div class="stat-value" id="failCount">0</div>
                    </div>
                </div>

                <div class="classification" id="classification">
                    <div class="classification-icon" id="classIcon"></div>
                    <div class="classification-title" id="classTitle"></div>
                    <div class="classification-desc" id="classDesc"></div>
                </div>
            </div>
        </div>

        <script>
            // Mảng lưu trữ điểm
            let scores = [];

            // Khởi tạo với dữ liệu mẫu
            window.onload = function() {
                scores = [8.5, 7.0, 9.0, 6.5, 8.0];
                displayScores();
            };

            // Hàm thêm điểm mới
            function addScore() {
                const scoreInput = document.getElementById('scoreInput');
                const score = Number(scoreInput.value);
                const errorMsg = document.getElementById('errorMsg');

                // Reset error
                errorMsg.classList.remove('show');

                // Kiểm tra dữ liệu
                if (!scoreInput.value || scoreInput.value === '') {
                    showError('⚠️ Vui lòng nhập điểm!');
                    return;
                }

                if (score < 0 || score > 10) {
                    showError('⚠️ Điểm phải nằm trong khoảng từ 0 đến 10!');
                    return;
                }

                // Thêm điểm vào mảng
                scores.push(score);

                // Hiển thị lại danh sách
                displayScores();

                // Xóa input
                scoreInput.value = '';
                scoreInput.focus();

                // Ẩn kết quả nếu đang hiển thị
                document.getElementById('result').classList.remove('show');
            }

            // Hàm hiển thị danh sách điểm
            function displayScores() {
                const scoresList = document.getElementById('scoresList');
                const scoreCount = document.getElementById('scoreCount');

                scoreCount.textContent = scores.length;

                if (scores.length === 0) {
                    scoresList.innerHTML = '<div class="empty-message">Chưa có điểm nào. Vui lòng thêm điểm!</div>';
                    return;
                }

                scoresList.innerHTML = '';

                scores.forEach((score, index) => {
                    const scoreItem = document.createElement('div');
                    scoreItem.className = 'score-item';
                    scoreItem.innerHTML = `
                    <span>Môn ${index + 1}: <strong>${score.toFixed(1)}</strong></span>
                    <button class="btn-remove" onclick="removeScore(${index})">✕</button>
                `;
                    scoresList.appendChild(scoreItem);
                });
            }

            // Hàm xóa một điểm
            function removeScore(index) {
                if (confirm(`Bạn có chắc muốn xóa điểm môn ${index + 1}?`)) {
                    scores.splice(index, 1);
                    displayScores();
                    document.getElementById('result').classList.remove('show');
                }
            }

            // Hàm xóa điểm thấp nhất
            function removeLowestScore() {
                if (scores.length === 0) {
                    showError('⚠️ Chưa có điểm nào để xóa!');
                    return;
                }

                const minScore = Math.min(...scores);
                const minIndex = scores.indexOf(minScore);

                if (confirm(`Xóa điểm thấp nhất (${minScore.toFixed(1)}) khỏi danh sách?`)) {
                    scores.splice(minIndex, 1);
                    displayScores();
                    document.getElementById('result').classList.remove('show');
                }
            }

            // Hàm xóa tất cả điểm
            function clearAllScores() {
                if (scores.length === 0) {
                    showError('⚠️ Danh sách điểm đã trống!');
                    return;
                }

                if (confirm('Bạn có chắc muốn xóa tất cả điểm?')) {
                    scores = [];
                    displayScores();
                    document.getElementById('result').classList.remove('show');
                }
            }

            // Hàm tính điểm trung bình
            function calculateAverage() {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.classList.remove('show');

                if (scores.length === 0) {
                    showError('⚠️ Vui lòng thêm ít nhất 1 điểm để tính toán!');
                    return;
                }

                // Tính tổng điểm
                const total = scores.reduce((sum, score) => sum + score, 0);

                // Tính điểm trung bình
                const average = total / scores.length;

                // Tìm điểm cao nhất và thấp nhất
                const maxScore = Math.max(...scores);
                const minScore = Math.min(...scores);

                // Đếm số môn đạt và không đạt
                const passCount = scores.filter(score => score >= 5).length;
                const failCount = scores.filter(score => score < 5).length;

                // Phân loại học lực
                let classification = '';
                let icon = '';
                let desc = '';
                let className = '';

                if (average >= 8.5) {
                    classification = 'XUẤT SẮC';
                    icon = '🏆';
                    desc = 'Kết quả học tập vượt trội! Hãy tiếp tục phát huy!';
                    className = 'excellent';
                } else if (average >= 7.0) {
                    classification = 'GIỎI';
                    icon = '🌟';
                    desc = 'Kết quả học tập tốt! Cần duy trì và nâng cao hơn nữa!';
                    className = 'good';
                } else if (average >= 5.5) {
                    classification = 'KHÁ';
                    icon = '👍';
                    desc = 'Kết quả học tập khá! Cần cố gắng thêm để đạt mức cao hơn!';
                    className = 'good';
                } else if (average >= 4.0) {
                    classification = 'TRUNG BÌNH';
                    icon = '📚';
                    desc = 'Cần nỗ lực học tập nhiều hơn để cải thiện kết quả!';
                    className = 'average';
                } else {
                    classification = 'YẾU';
                    icon = '😟';
                    desc = 'Cần cải thiện kết quả học tập! Hãy tham khảo ý kiến giáo viên!';
                    className = 'weak';
                }

                // Hiển thị kết quả
                document.getElementById('totalScore').textContent = total.toFixed(1);
                document.getElementById('averageScore').textContent = average.toFixed(2);
                document.getElementById('subjectCount').textContent = scores.length;
                document.getElementById('maxScore').textContent = maxScore.toFixed(1);
                document.getElementById('minScore').textContent = minScore.toFixed(1);
                document.getElementById('passCount').textContent = passCount;
                document.getElementById('failCount').textContent = failCount;

                // Hiển thị phân loại
                const classificationDiv = document.getElementById('classification');
                document.getElementById('classIcon').textContent = icon;
                document.getElementById('classTitle').textContent = classification;
                document.getElementById('classTitle').className = 'classification-title ' + className;
                document.getElementById('classDesc').textContent = desc;

                // Hiển thị section kết quả
                document.getElementById('result').classList.add('show');

                // Cuộn xuống kết quả
                setTimeout(() => {
                    document.getElementById('result').scrollIntoView({
                        behavior: 'smooth',
                        block: 'nearest'
                    });
                }, 100);
            }

            // Hàm hiển thị lỗi
            function showError(message) {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = message;
                errorMsg.classList.add('show');

                setTimeout(() => {
                    errorMsg.classList.remove('show');
                }, 3000);
            }

            // Cho phép nhấn Enter để thêm điểm
            document.getElementById('scoreInput').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    addScore();
                }
            });
        </script>
</body>

</html>
