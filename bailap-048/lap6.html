<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Danh Sách Sản Phẩm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            padding: 45px;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* ===== HEADER ===== */
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            color: #11998e;
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1em;
        }
        /* ===== TOOLBAR ===== */
        
        .toolbar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            background: #f8f9fa;
            padding: 25px;
            border-radius: 20px;
        }
        
        .toolbar-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .toolbar-group label {
            font-weight: 700;
            color: #333;
            font-size: 0.9em;
        }
        
        .search-input,
        .filter-select,
        .sort-select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95em;
            outline: none;
            transition: all 0.3s ease;
            background: white;
            width: 100%;
        }
        
        .search-input:focus,
        .filter-select:focus,
        .sort-select:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.15);
        }
        /* ===== STATS BAR ===== */
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            font-size: 2em;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.85em;
            opacity: 0.9;
        }
        /* ===== PRODUCT GRID ===== */
        
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .products-title {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
        }
        
        .products-count {
            background: #11998e;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .product-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            animation: cardIn 0.4s ease-out;
        }
        
        @keyframes cardIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            border-color: #11998e;
        }
        
        .product-image {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5em;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .product-body {
            padding: 20px;
        }
        
        .product-category {
            display: inline-block;
            background: #e8f5e9;
            color: #11998e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .product-name {
            font-size: 1.1em;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .product-price {
            font-size: 1.4em;
            font-weight: 700;
            color: #11998e;
            margin-bottom: 12px;
        }
        
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }
        
        .product-stock {
            font-size: 0.85em;
            color: #666;
        }
        
        .stock-badge {
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 0.78em;
            font-weight: 600;
        }
        
        .stock-high {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .stock-medium {
            background: #fff8e1;
            color: #f57f17;
        }
        
        .stock-low {
            background: #fce4ec;
            color: #c62828;
        }
        /* ===== NO RESULTS ===== */
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            grid-column: 1 / -1;
        }
        
        .no-results-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }
        
        .no-results-text {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #666;
        }
        
        .no-results-sub {
            font-size: 0.95em;
        }
        /* ===== TOTAL INVENTORY ===== */
        
        .inventory-total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px 30px;
            border-radius: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        
        .inventory-label {
            font-size: 1.2em;
            font-weight: 600;
            opacity: 0.9;
        }
        
        .inventory-value {
            font-size: 2em;
            font-weight: 700;
            color: #ffd700;
        }
        /* ===== DETAIL MODAL ===== */
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOverlay 0.3s ease;
        }
        
        @keyframes fadeOverlay {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            animation: modalIn 0.4s ease-out;
        }
        
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .modal-icon {
            text-align: center;
            font-size: 5em;
            margin-bottom: 20px;
        }
        
        .modal-name {
            text-align: center;
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
        }
        
        .modal-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.95em;
        }
        
        .modal-row:last-child {
            border-bottom: none;
        }
        
        .modal-key {
            color: #666;
            font-weight: 500;
        }
        
        .modal-val {
            font-weight: 700;
            color: #333;
        }
        
        .btn-close-modal {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-close-modal:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }
        /* ===== RESPONSIVE ===== */
        
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 1.8em;
            }
            .toolbar {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            .inventory-total {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
        
        @media (max-width: 480px) {
            .stats-bar {
                grid-template-columns: 1fr;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🛍️ Quản Lý Sản Phẩm</h1>
            <p class="subtitle">Danh sách sản phẩm với tìm kiếm, lọc và sắp xếp</p>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="toolbar-group">
                <label>🔍 Tìm kiếm theo tên:</label>
                <input type="text" class="search-input" id="searchInput" placeholder="Nhập tên sản phẩm..." oninput="renderProducts()">
            </div>
            <div class="toolbar-group">
                <label>🏷️ Lọc theo danh mục:</label>
                <select class="filter-select" id="categoryFilter" onchange="renderProducts()">
                    <option value="all">Tất cả danh mục</option>
                    <option value="Điện tử">Điện tử</option>
                    <option value="Thời trang">Thời trang</option>
                    <option value="Thực phẩm">Thực phẩm</option>
                    <option value="Sách">Sách</option>
                    <option value="Đồ gia dụng">Đồ gia dụng</option>
                </select>
            </div>
            <div class="toolbar-group">
                <label>📊 Sắp xếp theo:</label>
                <select class="sort-select" id="sortSelect" onchange="renderProducts()">
                    <option value="default">Mặc định</option>
                    <option value="price-asc">Giá tăng dần ↑</option>
                    <option value="price-desc">Giá giảm dần ↓</option>
                    <option value="name-asc">Tên A → Z</option>
                    <option value="name-desc">Tên Z → A</option>
                    <option value="stock-asc">Tồn kho tăng dần</option>
                    <option value="stock-desc">Tồn kho giảm dần</option>
                </select>
            </div>
        </div>

        <!-- STATS BAR -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalProducts">0</div>
                <div class="stat-label">Tổng Sản Phẩm</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="avgPrice">0</div>
                <div class="stat-label">Giá Trung Bình</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="maxPrice">0</div>
                <div class="stat-label">Giá Cao Nhất</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📉</div>
                <div class="stat-value" id="minPrice">0</div>
                <div class="stat-label">Giá Thấp Nhất</div>
            </div>
        </div>

        <!-- PRODUCTS LIST -->
        <div class="products-header">
            <span class="products-title">📋 Danh Sách Sản Phẩm</span>
            <span class="products-count" id="productsCount">0 sản phẩm</span>
        </div>

        <div class="products-grid" id="productsGrid"></div>

        <!-- INVENTORY TOTAL -->
        <div class="inventory-total">
            <span class="inventory-label">💼 Tổng Giá Trị Tồn Kho:</span>
            <span class="inventory-value" id="inventoryTotal">0 VNĐ</span>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal">
            <div class="modal-icon" id="modalIcon"></div>
            <div class="modal-name" id="modalName"></div>
            <div class="modal-info" id="modalInfo"></div>
            <button class="btn-close-modal" onclick="closeModalBtn()">✕ Đóng</button>
        </div>
    </div>

    <script>
        // ===== DỮ LIỆU SẢN PHẨM =====
        const products = [{
            id: 1,
            name: 'iPhone 15 Pro Max',
            price: 34990000,
            stock: 25,
            category: 'Điện tử',
            icon: '📱',
            description: 'Điện thoại cao cấp nhất của Apple'
        }, {
            id: 2,
            name: 'Laptop Dell XPS 15',
            price: 45000000,
            stock: 10,
            category: 'Điện tử',
            icon: '💻',
            description: 'Laptop hiệu năng cao cho dân văn phòng'
        }, {
            id: 3,
            name: 'Áo Thun Polo',
            price: 350000,
            stock: 150,
            category: 'Thời trang',
            icon: '👕',
            description: 'Áo thun polo chất liệu cotton cao cấp'
        }, {
            id: 4,
            name: 'Giày Nike Air Max',
            price: 3500000,
            stock: 45,
            category: 'Thời trang',
            icon: '👟',
            description: 'Giày thể thao thời trang năng động'
        }, {
            id: 5,
            name: 'Cà Phê Arabica 500g',
            price: 180000,
            stock: 200,
            category: 'Thực phẩm',
            icon: '☕',
            description: 'Cà phê rang xay nguyên chất'
        }, {
            id: 6,
            name: 'Sách Lập Trình JavaScript',
            price: 250000,
            stock: 80,
            category: 'Sách',
            icon: '📚',
            description: 'Sách học lập trình JavaScript từ cơ bản đến nâng cao'
        }, {
            id: 7,
            name: 'Máy Lọc Không Khí',
            price: 5500000,
            stock: 15,
            category: 'Đồ gia dụng',
            icon: '🌬️',
            description: 'Máy lọc không khí thông minh cho gia đình'
        }, {
            id: 8,
            name: 'Tai Nghe Sony WH-1000XM5',
            price: 8990000,
            stock: 30,
            category: 'Điện tử',
            icon: '🎧',
            description: 'Tai nghe chống ồn hàng đầu thế giới'
        }, {
            id: 9,
            name: 'Nồi Cơm Điện Panasonic',
            price: 1200000,
            stock: 5,
            category: 'Đồ gia dụng',
            icon: '🍚',
            description: 'Nồi cơm điện tử thông minh'
        }, {
            id: 10,
            name: 'Sách Đắc Nhân Tâm',
            price: 89000,
            stock: 300,
            category: 'Sách',
            icon: '📖',
            description: 'Cuốn sách kinh điển về nghệ thuật giao tiếp'
        }];

        // ===== HÀM FORMAT TIỀN =====
        function formatCurrency(amount) {
            if (amount >= 1000000) {
                return (amount / 1000000).toFixed(1) + 'M';
            } else if (amount >= 1000) {
                return (amount / 1000).toFixed(0) + 'K';
            }
            return amount.toLocaleString('vi-VN');
        }

        function formatFullCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(amount);
        }

        // ===== HÀM LẤY BADGE TỒN KHO =====
        function getStockBadge(stock) {
            if (stock >= 50) {
                return `<span class="stock-badge stock-high">Còn nhiều (${stock})</span>`;
            } else if (stock >= 10) {
                return `<span class="stock-badge stock-medium">Còn vừa (${stock})</span>`;
            } else {
                return `<span class="stock-badge stock-low">Sắp hết (${stock})</span>`;
            }
        }

        // ===== HÀM LỌC VÀ SẮP XẾP =====
        function getFilteredProducts() {
            const searchVal = document.getElementById('searchInput').value.toLowerCase().trim();
            const categoryVal = document.getElementById('categoryFilter').value;
            const sortVal = document.getElementById('sortSelect').value;

            // Tìm kiếm theo tên
            let filtered = products.filter(p => {
                const matchName = p.name.toLowerCase().includes(searchVal);
                const matchCategory = categoryVal === 'all' || p.category === categoryVal;
                return matchName && matchCategory;
            });

            // Sắp xếp
            switch (sortVal) {
                case 'price-asc':
                    filtered.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    filtered.sort((a, b) => b.price - a.price);
                    break;
                case 'name-asc':
                    filtered.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'name-desc':
                    filtered.sort((a, b) => b.name.localeCompare(a.name));
                    break;
                case 'stock-asc':
                    filtered.sort((a, b) => a.stock - b.stock);
                    break;
                case 'stock-desc':
                    filtered.sort((a, b) => b.stock - a.stock);
                    break;
            }

            return filtered;
        }

        // ===== HÀM RENDER SẢN PHẨM =====
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filtered = getFilteredProducts();

            // Cập nhật số lượng
            document.getElementById('productsCount').textContent = filtered.length + ' sản phẩm';

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <div class="no-results-text">Không tìm thấy sản phẩm!</div>
                        <div class="no-results-sub">Thử thay đổi từ khóa hoặc bộ lọc</div>
                    </div>
                `;
                updateStats(filtered);
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card" onclick="showDetail(${p.id})">
                    <div class="product-image">${p.icon}</div>
                    <div class="product-body">
                        <span class="product-category">${p.category}</span>
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${formatFullCurrency(p.price)}</div>
                        <div class="product-footer">
                            <span class="product-stock">Tồn kho:</span>
                            ${getStockBadge(p.stock)}
                        </div>
                    </div>
                </div>
            `).join('');

            updateStats(filtered);
            updateInventoryTotal(filtered);
        }

        // ===== HÀM CẬP NHẬT THỐNG KÊ =====
        function updateStats(filtered) {
            const all = filtered.length > 0 ? filtered : products;

            const prices = all.map(p => p.price);
            const avgPrice = prices.reduce((a, b) => a + b, 0) / prices.length;
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);

            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('avgPrice').textContent = formatCurrency(avgPrice);
            document.getElementById('maxPrice').textContent = formatCurrency(maxPrice);
            document.getElementById('minPrice').textContent = formatCurrency(minPrice);
        }

        // ===== HÀM TÍNH TỔNG TỒN KHO =====
        function updateInventoryTotal(filtered) {
            const total = filtered.reduce((sum, p) => sum + p.price * p.stock, 0);
            document.getElementById('inventoryTotal').textContent = formatFullCurrency(total);
        }

        // ===== HÀM HIỂN THỊ MODAL CHI TIẾT =====
        function showDetail(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('modalIcon').textContent = product.icon;
            document.getElementById('modalName').textContent = product.name;

            document.getElementById('modalInfo').innerHTML = `
                <div class="modal-row">
                    <span class="modal-key">📦 Danh mục:</span>
                    <span class="modal-val">${product.category}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-key">💰 Giá bán:</span>
                    <span class="modal-val" style="color:#11998e">${formatFullCurrency(product.price)}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-key">📊 Tồn kho:</span>
                    <span class="modal-val">${product.stock} sản phẩm</span>
                </div>
                <div class="modal-row">
                    <span class="modal-key">💼 Giá trị tồn:</span>
                    <span class="modal-val">${formatFullCurrency(product.price * product.stock)}</span>
                </div>
                <div class="modal-row">
                    <span class="modal-key">📝 Mô tả:</span>
                    <span class="modal-val">${product.description}</span>
                </div>
            `;

            document.getElementById('modalOverlay').classList.add('show');
        }

        // ===== HÀM ĐÓNG MODAL =====
        function closeModal(event) {
            if (event.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('show');
            }
        }

        function closeModalBtn() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ===== KHỞI TẠO =====
        window.onload = function() {
            renderProducts();
        };
    </script>
</body>

</html>
