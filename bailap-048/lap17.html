<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 17 - Giỏ hàng đơn giản</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 30px;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #fafafa;
        }
        
        .product-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .product-info img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .product-details h2 {
            margin-bottom: 8px;
            color: #111827;
        }
        
        .product-details p {
            color: #6b7280;
        }
        
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        button {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }
        
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        .plus {
            background: #10b981;
        }
        
        .minus {
            background: #ef4444;
        }
        
        .quantity {
            width: 50px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        .price-box {
            text-align: right;
        }
        
        .price-box h3 {
            color: #2563eb;
            margin-bottom: 8px;
        }
        
        .price-box p {
            color: #111827;
            font-size: 18px;
            font-weight: bold;
        }
        
        .total-box {
            margin-top: 30px;
            text-align: right;
            padding: 20px;
            background: #eef2ff;
            border-radius: 12px;
        }
        
        .total-box h2 {
            color: #111827;
        }
        
        .total-price {
            color: #2563eb;
            font-size: 28px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🛒 Giỏ hàng đơn giản</h1>

        <!-- SẢN PHẨM 1 -->
        <div class="cart-item" data-price="15000000">

            <div class="product-info">

                <img src="https://picsum.photos/200?1" alt="Laptop">

                <div class="product-details">

                    <h2>Laptop Gaming</h2>

                    <p>Đơn giá: 15.000.000 VNĐ</p>

                </div>

            </div>

            <div class="controls">

                <button class="minus">-</button>

                <div class="quantity">1</div>

                <button class="plus">+</button>

            </div>

            <div class="price-box">

                <h3>Thành tiền</h3>

                <p class="item-total">
                    15.000.000 VNĐ
                </p>

            </div>

        </div>


        <!-- SẢN PHẨM 2 -->
        <div class="cart-item" data-price="8000000">

            <div class="product-info">

                <img src="https://picsum.photos/200?2" alt="Điện thoại">

                <div class="product-details">

                    <h2>Điện thoại</h2>

                    <p>Đơn giá: 8.000.000 VNĐ</p>

                </div>

            </div>

            <div class="controls">

                <button class="minus">-</button>

                <div class="quantity">1</div>

                <button class="plus">+</button>

            </div>

            <div class="price-box">

                <h3>Thành tiền</h3>

                <p class="item-total">
                    8.000.000 VNĐ
                </p>

            </div>

        </div>


        <!-- TỔNG HÓA ĐƠN -->
        <div class="total-box">

            <h2>Tổng hóa đơn</h2>

            <div class="total-price" id="grandTotal">
                23.000.000 VNĐ
            </div>

        </div>

    </div>


    <!-- NHÚNG JQUERY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function() {


            // ================= FORMAT TIỀN =================
            function formatMoney(number) {

                return number.toLocaleString("vi-VN") + " VNĐ";

            }


            // ================= UPDATE TỔNG =================
            function updateCart() {

                let grandTotal = 0;

                $(".cart-item").each(function() {

                    const price = Number($(this).data("price"));

                    const quantity = Number(
                        $(this).find(".quantity").text()
                    );

                    const total = price * quantity;

                    // cập nhật thành tiền
                    $(this)
                        .find(".item-total")
                        .text(formatMoney(total));

                    grandTotal += total;

                });

                // cập nhật tổng hóa đơn
                $("#grandTotal").text(
                    formatMoney(grandTotal)
                );

            }


            // ================= TĂNG =================
            $(".plus").click(function() {

                const quantityEl = $(this)
                    .siblings(".quantity");

                let quantity = Number(quantityEl.text());

                quantity++;

                quantityEl.text(quantity);

                updateCart();

            });


            // ================= GIẢM =================
            $(".minus").click(function() {

                const quantityEl = $(this)
                    .siblings(".quantity");

                let quantity = Number(quantityEl.text());

                // không nhỏ hơn 1
                if (quantity > 1) {

                    quantity--;

                    quantityEl.text(quantity);

                    updateCart();

                }

            });


            // ================= KHỞI TẠO =================
            updateCart();


        });
    </script>

</body>

</html>
