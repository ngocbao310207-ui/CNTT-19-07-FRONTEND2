```html
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 700px;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2b6ef6;
        }
        
        .input-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .input-box input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }
        
        .input-box button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2b6ef6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .input-box button:hover {
            background: #1f57c8;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: #eef2ff;
            color: #2b6ef6;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .filter-btn.active {
            background: #2b6ef6;
            color: white;
        }
        
        .todo-list {
            list-style: none;
        }
        
        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            border-radius: 10px;
            background: #fafafa;
            transition: 0.3s;
        }
        
        .todo-item:hover {
            transform: translateY(-2px);
        }
        
        .todo-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }
        
        .task-text {
            flex: 1;
        }
        
        .actions {
            display: flex;
            gap: 5px;
        }
        
        .actions button {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 18px;
        }
        
        .complete-btn {
            color: #10b981;
        }
        
        .delete-btn {
            color: #ef4444;
        }
        
        .info {
            margin-top: 15px;
            text-align: right;
            color: #666;
            font-size: 14px;
        }
        
        .empty {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📝 To-Do List</h1>

        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Nhập công việc...">
            <button id="addBtn">Thêm</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Tất cả</button>
            <button class="filter-btn" data-filter="active">Chưa hoàn thành</button>
            <button class="filter-btn" data-filter="completed">Hoàn thành</button>
            <button class="filter-btn" id="clearCompleted">Xóa hoàn thành</button>
        </div>

        <ul class="todo-list" id="todoList"></ul>

        <div class="info" id="taskInfo">
            0 công việc
        </div>

    </div>

    <script>
        const STORAGE_KEY = "todo_app_data";

        let todos = [];
        let currentFilter = "all";

        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addBtn");
        const todoList = document.getElementById("todoList");
        const taskInfo = document.getElementById("taskInfo");


        // ================= LOAD =================
        function loadTodos() {
            const data = localStorage.getItem(STORAGE_KEY);

            if (data) {
                todos = JSON.parse(data);
            }
        }


        // ================= SAVE =================
        function saveTodos() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        }


        // ================= ADD TASK =================
        function addTask() {

            const text = taskInput.value.trim();

            if (text === "") return;

            const task = {
                id: Date.now(),
                text: text,
                completed: false
            };

            todos.unshift(task);

            saveTodos();
            renderTasks();

            taskInput.value = "";
            taskInput.focus();
        }


        // ================= TOGGLE =================
        function toggleTask(id) {

            todos = todos.map(task => {

                if (task.id === id) {
                    task.completed = !task.completed;
                }

                return task;
            });

            saveTodos();
            renderTasks();
        }


        // ================= DELETE =================
        function deleteTask(id) {

            todos = todos.filter(task => task.id !== id);

            saveTodos();
            renderTasks();
        }


        // ================= CLEAR COMPLETED =================
        function clearCompleted() {

            todos = todos.filter(task => !task.completed);

            saveTodos();
            renderTasks();
        }


        // ================= RENDER =================
        function renderTasks() {

            todoList.innerHTML = "";

            let filteredTodos = todos;

            if (currentFilter === "active") {
                filteredTodos = todos.filter(task => !task.completed);
            }

            if (currentFilter === "completed") {
                filteredTodos = todos.filter(task => task.completed);
            }


            // Nếu không có task
            if (filteredTodos.length === 0) {

                todoList.innerHTML = `
            <div class="empty">
                Không có công việc nào
            </div>
        `;
            }


            filteredTodos.forEach(task => {

                const li = document.createElement("li");

                li.className = `todo-item ${task.completed ? "completed" : ""}`;

                li.innerHTML = `
            <input type="checkbox" ${task.completed ? "checked" : ""}>

            <span class="task-text">${task.text}</span>

            <div class="actions">
                <button class="complete-btn">✔</button>
                <button class="delete-btn">✖</button>
            </div>
        `;

                // checkbox
                li.querySelector("input").addEventListener("change", () => {
                    toggleTask(task.id);
                });

                // complete button
                li.querySelector(".complete-btn").addEventListener("click", () => {
                    toggleTask(task.id);
                });

                // delete button
                li.querySelector(".delete-btn").addEventListener("click", () => {
                    deleteTask(task.id);
                });

                todoList.appendChild(li);
            });


            // cập nhật info
            const remaining = todos.filter(task => !task.completed).length;

            taskInfo.textContent =
                `${remaining} chưa hoàn thành • ${todos.length} tổng cộng`;
        }


        // ================= FILTER =================
        document.querySelectorAll(".filter-btn").forEach(btn => {

            btn.addEventListener("click", () => {

                // riêng nút clear
                if (btn.id === "clearCompleted") {
                    clearCompleted();
                    return;
                }

                document.querySelectorAll(".filter-btn")
                    .forEach(b => b.classList.remove("active"));

                btn.classList.add("active");

                currentFilter = btn.dataset.filter;

                renderTasks();
            });

        });


        // ================= EVENTS =================
        addBtn.addEventListener("click", addTask);

        taskInput.addEventListener("keydown", (e) => {

            if (e.key === "Enter") {
                addTask();
            }

        });


        // ================= START =================
        loadTodos();
        renderTasks();
    </script>

</body>

</html>
