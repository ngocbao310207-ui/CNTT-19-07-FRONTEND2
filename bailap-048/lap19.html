<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 19 - Ajax với jQuery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 30px;
        }
        
        .container {
            max-width: 1100px;
            margin: auto;
        }
        
        h1 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 25px;
        }
        
        .loading,
        .error {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .loading {
            color: #2563eb;
        }
        
        .error {
            color: #ef4444;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        table th,
        table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        
        table th {
            background: #2563eb;
            color: white;
        }
        
        table tr:hover {
            background: #f9fafb;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .reload-btn {
            margin-bottom: 20px;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #10b981;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .reload-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📡 Lab 19 - Tải dữ liệu bằng Ajax</h1>

        <button class="reload-btn" id="reloadBtn">
        🔄 Tải lại dữ liệu
    </button>

        <div class="loading" id="loading">
            Đang tải dữ liệu...
        </div>

        <div class="error" id="error"></div>

        <!-- BẢNG DỮ LIỆU -->
        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Lớp</th>
                </tr>

            </thead>

            <tbody id="studentTable">

            </tbody>

        </table>

    </div>


    <!-- NHÚNG JQUERY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function() {


            // ================= API =================
            const API_URL =
                "https://6666b2caa2f8516ff7a62b67.mockapi.io/students";


            // ================= LOAD DATA =================
            function loadStudents() {

                $("#loading").show();

                $("#error").text("");

                $("#studentTable").html("");


                // AJAX GET
                $.ajax({

                    url: API_URL,

                    method: "GET",

                    success: function(data) {

                        renderStudents(data);

                        $("#loading").hide();

                    },

                    error: function() {

                        $("#loading").hide();

                        $("#error").text(
                            "❌ Không thể tải dữ liệu từ server"
                        );

                    }

                });

            }


            // ================= RENDER =================
            function renderStudents(students) {

                let html = "";

                students.forEach(student => {

                    html += `
            
                <tr>

                    <td>${student.id}</td>

                    <td>
                        <img 
                            src="${student.avatar}" 
                            class="avatar"
                        >
                    </td>

                    <td>${student.name}</td>

                    <td>${student.email}</td>

                    <td>${student.className}</td>

                </tr>
            
            `;

                });

                $("#studentTable").html(html);

            }


            // ================= RELOAD =================
            $("#reloadBtn").click(function() {

                loadStudents();

            });


            // ================= START =================
            loadStudents();


        });
    </script>

</body>

</html>
