<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 21 - CRUD với jQuery Ajax</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;

        .container {
            max-width: 1200px;

            background: #f59e0b;

        .edit-btn {
            background: #2563eb;

        .delete-btn {
            background: #ef4444;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        
        .message {
            margin-top: 15px;
            font-weight: bold;
        }
        
        .success {
            color: #10b981;
        }

        table {
            width: 100%;

<body>

    <div class="container">

        <h1>🎓 CRUD Sinh viên với jQuery Ajax</h1>

        <!-- FORM -->
        <div class="form-box">

            <div class="form-row">

                <div class="form-group">

                    <label>Họ tên</label>

                    <input type="text" id="name" placeholder="Nhập họ tên">

                </div>

                <div class="form-group">

                    <label>Email</label>

                    <input type="email" id="email" placeholder="Nhập email">

                </div>

                <div class="form-group">

                    <label>Lớp</label>

                    <input type="text" id="className" placeholder="Nhập lớp">

                </div>

                <div class="form-group">

                    <label>Ảnh đại diện</label>

                    <input type="text" id="avatar" placeholder="Link ảnh">

                </div>

            </div>

            <div class="buttons">

                <button class="add-btn" id="addBtn">
                ➕ Thêm sinh viên
            </button>

                <button class="update-btn" id="updateBtn" style="display:none;">
                💾 Cập nhật
            </button>

                <button class="cancel-btn" id="cancelBtn" style="display:none;">
                ❌ Hủy
            </button>

            </div>

            <div class="message" id="message"></div>

        </div>


        <!-- SEARCH -->
        <div class="search-box">

            <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm theo tên...">

        </div>


        <!-- LOADING -->
        <div class="loading" id="loading">
            Đang tải dữ liệu...
        </div>


        <!-- TABLE -->
        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Ảnh</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Lớp</th>
                    <th>Hành động</th>

                </tr>

            </thead>

            <tbody id="studentTable"></tbody>

        </table>

    </div>


    <!-- JQUERY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function() {


            // ================= API =================
            const API_URL =
                "https://6666b2caa2f8516ff7a62b67.mockapi.io/students";


            // ================= BIẾN =================
            let editId = null;


            // ================= LOAD DATA =================
            function loadStudents() {

                $("#loading").show();

                $.ajax({

                    url: API_URL,

                    method: "GET",

                    success: function(data) {

                        renderStudents(data);

                        $("#loading").hide();

                    },

                    error: function() {

                        $("#loading").hide();

                        showMessage(
                            "❌ Không thể tải dữ liệu",
                            "error"
                        );

                    }

                });

            }


            // ================= RENDER =================
            function renderStudents(students) {

                let keyword = $("#searchInput")
                    .val()
                    .toLowerCase();

                let html = "";

                students
                    .filter(student =>
                        student.name
                        .toLowerCase()
                        .includes(keyword)
                    )
                    .forEach(student => {

                        html += `
            
                <tr>

                    <td>${student.id}</td>

                    <td>
                        <img 
                            src="${student.avatar}" 
                            class="avatar"
                        >
                    </td>

                    <td>${student.name}</td>

                    <td>${student.email}</td>

                    <td>${student.className}</td>

                    <td>

                        <button 
                            class="edit-btn"
                            onclick="editStudent(
                                '${student.id}',
                                '${student.name}',
                                '${student.email}',
                                '${student.className}',
                                '${student.avatar}'
                            )"
                        >
                            Sửa
                        </button>

                        <button 
                            class="delete-btn"
                            onclick="deleteStudent(
                                '${student.id}'
                            )"
                        >
                            Xóa
                        </button>

                    </td>

                </tr>
            
            `;

                    });

                $("#studentTable").html(html);

            }


            // ================= THÔNG BÁO =================
            function showMessage(text, type) {

                $("#message")
                    .removeClass("success error")
                    .addClass(type)
                    .text(text);

            }


            // ================= RESET FORM =================
            function resetForm() {

                $("#name").val("");

                $("#email").val("");

                $("#className").val("");

                $("#avatar").val("");

                editId = null;

                $("#addBtn").show();

                $("#updateBtn").hide();

                $("#cancelBtn").hide();

            }


            // ================= THÊM =================
            $("#addBtn").click(function() {

                const name = $("#name").val().trim();

                const email = $("#email").val().trim();

                const className =
                    $("#className").val().trim();

                const avatar =
                    $("#avatar").val().trim();


                if (
                    name === "" ||
                    email === "" ||
                    className === ""
                ) {

                    showMessage(
                        "⚠ Vui lòng nhập đầy đủ thông tin",
                        "error"
                    );

                    return;

                }


                const newStudent = {

                    name,

                    email,

                    className,

                    avatar: avatar ||
                        "https://i.pravatar.cc/150?img=8"

                };


                $.ajax({

                    url: API_URL,

                    method: "POST",

                    data: newStudent,

                    success: function() {

                        showMessage(
                            "✅ Thêm sinh viên thành công",
                            "success"
                        );

                        resetForm();

                        loadStudents();

                    },

                    error: function() {

                        showMessage(
                            "❌ Thêm sinh viên thất bại",
                            "error"
                        );

                    }

                });

            });


            // ================= SỬA =================
            window.editStudent = function(
                id,
                name,
                email,
                className,
                avatar
            ) {

                editId = id;

                $("#name").val(name);

                $("#email").val(email);

                $("#className").val(className);

                $("#avatar").val(avatar);

                $("#addBtn").hide();

                $("#updateBtn").show();

                $("#cancelBtn").show();

            };


            // ================= CẬP NHẬT =================
            $("#updateBtn").click(function() {

                const updatedStudent = {

                    name: $("#name").val().trim(),

                    email: $("#email").val().trim(),

                    className: $("#className").val().trim(),

                    avatar: $("#avatar").val().trim()

                };


                $.ajax({

                    url: `${API_URL}/${editId}`,

                    method: "PUT",

                    data: updatedStudent,

                    success: function() {

                        showMessage(
                            "✅ Cập nhật thành công",
                            "success"
                        );

                        resetForm();

                        loadStudents();

                    },

                    error: function() {

                        showMessage(
                            "❌ Cập nhật thất bại",
                            "error"
                        );

                    }

                });

            });


            // ================= XÓA =================
            window.deleteStudent = function(id) {

                const confirmDelete = confirm(
                    "Bạn có chắc muốn xóa?"
                );

                if (!confirmDelete) return;


                $.ajax({

                    url: `${API_URL}/${id}`,

                    method: "DELETE",

                    success: function() {

                        showMessage(
                            "🗑 Xóa thành công",
                            "success"
                        );

                        loadStudents();

                    },

                    error: function() {

                        showMessage(
                            "❌ Xóa thất bại",
                            "error"
                        );

                    }

                });

            };


            // ================= HỦY =================
            $("#cancelBtn").click(function() {

                resetForm();

            });


            // ================= TÌM KIẾM =================
            $("#searchInput").on("keyup", function() {

                loadStudents();

            });


            // ================= START =================
            loadStudents();


        });
    </script>

</body>

</html>
