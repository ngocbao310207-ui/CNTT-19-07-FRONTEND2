<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Lab 22 - Bootstrap Responsive Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/mixins/_grid.scss" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .pink-card {
            border: 3px solid #ff65a3 !important;
            border-radius: 20px !important;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.15);
        }
        .btn-pink {
            background-color: #ff65a3 !important;
            border-color: #ff65a3 !important;
            color: white !important;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-pink:hover {
            background-color: #d81b60 !important;
            border-color: #d81b60 !important;
        }
        .form-control:focus {
            border-color: #ff65a3;
            box-shadow: 0 0 0 0.25rem rgba(255, 101, 163, 0.25);
        }
        .pink-link {
            color: #d81b60;
            text-decoration: none;
            font-size: 14px;
        }
        .pink-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card pink-card p-4 bg-white">
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="color: #d81b60;">🌸 Pinky Login 🌸</h2>
                    <p class="text-muted small">Chào mừng bạn quay trở lại vương quốc hồng!</p>
                </div>

                <form onsubmit="event.preventDefault(); alert('Đăng nhập thành công (Giả lập Bootstrap)!');">
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold text-secondary">Địa chỉ Email</label>
                        <input type="email" class="form-control py-2" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold text-secondary">Mật khẩu</label>
                        <input type="password" class="form-control py-2" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-input-label text-secondary small" for="rememberMe" style="cursor: pointer; user-select: none; margin-left: 5px;">Ghi nhớ tôi</label>
                        </div>
                        <a href="#" class="pink-link fw-medium">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn btn-pink w-100 py-2">Đăng Nhập Ngay 🚀</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
