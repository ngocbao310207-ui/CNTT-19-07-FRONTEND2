<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Lab 12 - Quản lý sinh viên</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; }
        .container { display: flex; gap: 30px; }
        form { flex: 1; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 5px; height: fit-content;}
        .list-container { flex: 2; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #34495e; color: white; }
        input, button { padding: 8px; font-size: 0.95rem; }
        button { cursor: pointer; border: none; border-radius: 3px; }
        .btn-add { background: #2ecc71; color: white; }
        .btn-edit { background: #f39c12; color: white; margin-right: 5px; }
        .btn-delete { background: #e74c3c; color: white; }
        .search-bar { margin-bottom: 15px; width: 100%; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <h2>Hệ Thống Quản Lý Sinh Viên (CRUD API)</h2>

    <div class="search-bar">
        <input type="text" id="search-name" placeholder="Nhập tên sinh viên cần tìm nhanh..." style="flex: 1;">
    </div>
    
    <div class="container">
        <form id="student-form">
            <h3 id="form-title">Thêm Sinh Viên</h3>
            <input type="hidden" id="student-id">
            <label>Họ tên:</label>
            <input type="text" id="student-name" required>
            <label>Lớp học:</label>
            <input type="text" id="student-class" required>
            <button type="submit" class="btn-add" id="btn-submit">Lưu lại</button>
            <button type="button" id="btn-cancel" style="display:none; background:#95a5a6; color:white;">Hủy sửa</button>
        </form>

        <div class="list-container">
            <h3>Danh sách sinh viên</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Họ tên</th>
                        <th>Lớp</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="student-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Địa chỉ API mẫu (Cần thay thế bằng endpoint mockapi.io thực tế của bạn)
        const API_URL = 'https://66549a1d3c1d3b6029373977.mockapi.io/api/v1/students';
        
        let allStudents = [];

        // Tải danh sách (GET)
        async function fetchStudents() {
            try {
                const res = await fetch(API_URL);
                allStudents = await res.json();
                renderTable(allStudents);
            } catch (err) {
                console.error("Lỗi tải danh sách:", err);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';
            data.forEach(st => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${st.id}</td>
                    <td>${st.name}</td>
                    <td>${st.class}</td>
                    <td>
                        <button class="btn-edit" onclick="editStudent('${st.id}', '${st.name}', '${st.class}')">Sửa</button>
                        <button class="btn-delete" onclick="deleteStudent('${st.id}')">Xóa</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Xử lý sự kiện Submit Form (Thêm mới POST hoặc Cập nhật PUT)
        document.getElementById('student-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('student-id').value;
            const name = document.getElementById('student-name').value;
            const className = document.getElementById('student-class').value;

            const studentData = { name: name, class: className };

            try {
                if (id) {
                    // Yêu cầu mở rộng: Chức năng sửa thông tin (PUT)
                    await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(studentData)
                    });
                } else {
                    // Thêm mới sinh viên (POST)
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(studentData)
                    });
                }
                resetForm();
                fetchStudents();
            } catch (err) {
                console.error("Lỗi lưu dữ liệu:", err);
            }
        });

        // Xóa sinh viên (DELETE)
        async function deleteStudent(id) {
            if (confirm('Bạn có chắc chắn muốn xóa sinh viên này không?')) {
                try {
                    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    fetchStudents();
                } catch (err) {
                    console.error("Lỗi xóa dữ liệu:", err);
                }
            }
        }

        // Đưa dữ liệu lên form để sửa
        function editStudent(id, name, className) {
            document.getElementById('student-id').value = id;
            document.getElementById('student-name').value = name;
            document.getElementById('student-class').value = className;
            document.getElementById('form-title').textContent = 'Cập nhật thông tin';
            document.getElementById('btn-cancel').style.display = 'inline-block';
        }

        function resetForm() {
            document.getElementById('student-id').value = '';
            document.getElementById('student-form').reset();
            document.getElementById('form-title').textContent = 'Thêm Sinh Viên';
            document.getElementById('btn-cancel').style.display = 'none';
        }

        document.getElementById('btn-cancel').addEventListener('click', resetForm);

        // Yêu cầu mở rộng: Tìm kiếm thời gian thực theo tên (Lọc Client-side)
        document.getElementById('search-name').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allStudents.filter(st => st.name.toLowerCase().includes(keyword));
            renderTable(filtered);
        });

        // Khởi chạy
        window.addEventListener('DOMContentLoaded', fetchStudents);
    </script>
</body>
</html>
