<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 04 - METRIC GRADE PROCESSOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-cyber: #010a03;
            --panel-bg: rgba(3, 26, 8, 0.85);
            --neon-green: #39ff14;
            --neon-yellow: #ffee00;
            --neon-red: #ff2a5f;
            --text-main: #d0edd5;
            --border-glow: rgba(57, 255, 20, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-cyber); color: var(--text-main);
            font-family: 'Share Tech Mono', monospace; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 999; background-size: 100% 4px; pointer-events: none;
        }
        .matrix-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(57, 255, 20, 0.04) 1px, transparent 0);
            background-size: 20px 20px; z-index: -1;
        }
        nav {
            background: rgba(1, 10, 3, 0.95); border-bottom: 2px solid var(--border-glow);
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-brand { display: flex; align-items: center; gap: 1rem; }
        .dnu-logo { height: 60px; filter: drop-shadow(0 0 8px var(--neon-green)); }
        .brand-text .title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 900; color: #fff; }
        .brand-text .subtitle { font-size: 0.8rem; color: var(--neon-green); }
        .container { max-width: 700px; width: 100%; margin: 2.5rem auto; padding: 0 1.5rem; }
        .data-panel {
            background: var(--panel-bg); border: 1px solid var(--border-glow); padding: 2.5rem 2rem;
            clip-path: polygon(0 0, calc(100% - 25px) 0, 100% 25px, 100% 100%, 25px 100%, 0 calc(100% - 25px));
            box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.03), 0 0 25px rgba(0,0,0,0.6);
        }
        .panel-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.15rem; color: #fff;
            margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;
            border-bottom: 1px dashed rgba(255,255,255,0.08); padding-bottom: 1rem;
        }
        .panel-title i { color: var(--neon-green); }
        .form-row { margin-bottom: 1.25rem; }
        .form-row label { display: block; font-size: 0.85rem; color: #9bb3a0; margin-bottom: 0.5rem; text-transform: uppercase; }
        .input-box { position: relative; display: flex; gap: 0.5rem; }
        .input-box i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--neon-green); }
        .form-row input {
            width: 100%; background: #010402; border: 1px solid rgba(57, 255, 20, 0.2);
            padding: 0.75rem 1rem 0.75rem 2.5rem; color: #fff; font-family: inherit; font-size: 1rem;
            outline: none; transition: all 0.3s;
        }
        .form-row input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }
        .btn-mini {
            background: var(--neon-green); color: #000; border: none; padding: 0 1.5rem;
            font-family: 'Orbitron', sans-serif; font-weight: 900; text-transform: uppercase;
            cursor: pointer; clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .check-group { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .check-group input { accent-color: var(--neon-green); cursor: pointer; }
        .btn-run {
            width: 100%; background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green);
            padding: 1rem; font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.05rem;
            text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .btn-run:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); }
        .monitor-display { background: #010301; border: 1px solid rgba(255,255,255,0.02); padding: 1.25rem; margin-top: 1.5rem; min-height: 140px; }
        .monitor-display::before { content: "DATA_COMPILATION_OUTPUT //"; font-size: 0.75rem; color: #49634e; display: block; margin-bottom: 1rem; }
        .data-line { display: flex; justify-content: space-between; font-size: 1rem; margin-bottom: 0.6rem; border-bottom: 1px dashed rgba(255,255,255,0.03); padding-bottom: 0.3rem; }
        .data-line span:last-child { font-weight: bold; }
        .err-text { color: var(--neon-red) !important; text-shadow: 0 0 8px var(--neon-red); }
        .cls-y { color: var(--neon-yellow) !important; }
        .cls-g { color: var(--neon-green) !important; text-shadow: 0 0 8px var(--neon-green); }
        .cls-r { color: var(--neon-red) !important; }
        .comms-box {
            background: rgba(3, 26, 8, 0.9); border: 1px solid var(--border-glow); padding: 1.25rem 2rem;
            margin: 2rem auto; max-width: 700px; width: calc(100% - 3rem);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
        }
        .comms-box p { font-size: 0.85rem; color: #7f9984; }
        .comms-box p i { color: var(--neon-green); margin-right: 0.5rem; }
        .hotline-btn {
            color: #fff; background: var(--neon-red); text-decoration: none; padding: 0.5rem 1rem;
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.8rem;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }
        footer { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: #49634e; border-top: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <nav>
        <div class="nav-brand">
            <img class="dnu-logo" src="https://inkythuatso.com/uploads/thumbnails/800/2021/12/logo-dai-hoc-dai-nam-inkythuatso-converted-01-23-09-54-10.jpg" alt="DNU Logo">
            <div class="brand-text">
                <div class="title">GRADE METRICS</div>
                <div class="subtitle">KHOA CNTT - ĐẠI HỌC ĐẠI NAM</div>
            </div>
        </div>
        <div style="font-size: 0.85rem; color: var(--neon-green);">LAB_04 // STATS MATRIX</div>
    </nav>
    <div class="container">
        <div class="data-panel">
            <div class="panel-title">
                <i class="fa-solid fa-chart-line"></i> HỆ THỐNG XỬ LÝ DỮ LIỆU ĐIỂM SỐ HỌC PHẦN
            </div>
            <div class="form-row">
                <label>Nhập điểm thành phần mới (Thang điểm 10)</label>
                <div class="input-box">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <input type="number" id="inp-grade" step="0.1" placeholder="Nhập điểm số (Ví dụ: 8.5)...">
                    <button class="btn-mini" onclick="addGradeToArray()">Nạp</button>
                </div>
            </div>
            <div class="check-group">
                <input type="checkbox" id="chk-filter-lowest">
                <label for="chk-filter-lowest">Kích hoạt thuật toán loại bỏ điểm thấp nhất trước khi tính</label>
            </div>
            <button class="btn-run" onclick="processGradesData()">Khởi chạy biên dịch dữ liệu</button>
            <div class="monitor-display" id="grade-screen"></div>
        </div>
    </div>
    <section class="comms-box">
        <div>
            <p><i class="fa-solid fa-network-wired"></i> Phân khu Khảo thí dữ liệu mạng - Đại học Đại Nam</p>
            <p style="margin-top: 0.2rem;"><i class="fa-solid fa-code"></i> Thao tác nâng cao: forEach(), Math.min(), filter()</p>
        </div>
        <a href="tel:0981295226" class="hotline-btn">HỆ THỐNG LIÊN HỆ</a>
    </section>
    <footer>
        SYS.MGR // ĐẠI HỌC ĐẠI NAM — KHƠI DẬY TIỀM NĂNG VƯƠN TỚI THÀNH CÔNG
    </footer>
    <script>
        let gradesArray = [8.5, 6.0, 9.2, 4.5, 7.8];
        function renderInitialData() {
            const screen = document.getElementById('grade-screen');
            screen.innerHTML = `<div class="data-line"><span>Mảng điểm số hiện tại trong bộ nhớ:</span> <span class="cls-g">[ ${gradesArray.join(' | ')} ]</span></div>`;
        }
        function addGradeToArray() {
            const val = document.getElementById('inp-grade').value;
            if (!val) return;
            const num = Number(val);
            if (num < 0 || num > 10) {
                alert("Điểm số bắt buộc phải nằm trong phạm vi từ 0 đến 10!");
                return;
            }
            gradesArray.push(num);
            document.getElementById('inp-grade').value = '';
            processGradesData();
        }
        function processGradesData() {
            const screen = document.getElementById('grade-screen');
            if (gradesArray.length === 0) {
                screen.innerHTML = `<div class="err-text">[LỖI] Cơ sở dữ liệu mảng trống rỗng!</div>`;
                return;
            }
            let dynamicArray = [...gradesArray];
            let filterLog = "Không";
            const filterActive = document.getElementById('chk-filter-lowest').checked;
            if (filterActive && dynamicArray.length > 1) {
                const lowest = Math.min(...dynamicArray);
                const index = dynamicArray.indexOf(lowest);
                dynamicArray.splice(index, 1);
                filterLog = `Có (Đã loại bỏ điểm thấp nhất là ${lowest})`;
            }
            let sum = 0;
            dynamicArray.forEach(function(g) {
                sum += g;
            });
            const average = sum / dynamicArray.length;
            const fixedAvg = average.toFixed(2);
            let rankText = '';
            let rankClass = '';
            if (average >= 8.0) { rankText = "Giỏi"; rankClass = "cls-g"; }
            else if (average >= 6.5) { rankText = "Khá"; rankClass = "cls-g"; }
            else if (average >= 5.0) { rankText = "Trung bình"; rankClass = "cls-y"; }
            else { rankText = "Yếu"; rankClass = "cls-r"; }
            screen.innerHTML = `
                <div class="data-line"><span>Mảng cơ sở gốc:</span> <span class="cls-g">[ ${gradesArray.join(' , ')} ]</span></div>
                <div class="data-line"><span>Loại bỏ phần tử thấp nhất:</span> <span>${filterLog}</span></div>
                <div class="data-line"><span>Số lượng cột điểm tính toán:</span> <span>${dynamicArray.length}</span></div>
                <div class="data-line"><span>Tổng điểm tích lũy:</span> <span>${sum.toFixed(1)}</span></div>
                <div class="data-line"><span>Điểm trung bình học phần:</span> <span class="${rankClass}">${fixedAvg}</span></div>
                <div class="data-line"><span>Phân loại học lực sinh viên:</span> <span class="${rankClass}">${rankText}</span></div>
            `;
        }
        window.onload = function() {
            renderInitialData();
            processGradesData();
        };
    </script>
</body>
</html>
