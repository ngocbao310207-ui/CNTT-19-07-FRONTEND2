<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB 10 - API DATA COMPILER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-cyber: #020806;
            --panel-bg: rgba(6, 24, 18, 0.85);
            --neon-emerald: #00ffaa;
            --neon-cyan: #00f3ff;
            --neon-red: #ff2a5f;
            --text-main: #cadbd4;
            --border-glow: rgba(0, 255, 170, 0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-cyber); color: var(--text-main);
            font-family: 'Share Tech Mono', monospace; min-height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 999; background-size: 100% 4px; pointer-events: none;
        }
        .network-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 255, 170, 0.03) 1px, transparent 0);
            background-size: 24px 24px; z-index: -1;
        }
        nav {
            background: rgba(2, 8, 6, 0.95); border-bottom: 2px solid var(--border-glow);
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-brand { display: flex; align-items: center; gap: 1rem; }
        .dnu-logo { height: 60px; filter: drop-shadow(0 0 8px var(--neon-emerald)); }
        .brand-text .title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 900; color: #fff; }
        .brand-text .subtitle { font-size: 0.8rem; color: var(--neon-emerald); }
        .container { max-width: 850px; width: 100%; margin: 2rem auto; padding: 0 1.5rem; }
        .api-panel {
            background: var(--panel-bg); border: 1px solid var(--border-glow); padding: 2rem;
            clip-path: polygon(0 0, calc(100% - 25px) 0, 100% 25px, 100% 100%, 25px 100%, 0 calc(100% - 25px));
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
        }
        .panel-header { font-family: 'Orbitron', sans-serif; font-size: 1.15rem; color: #fff; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.8rem; }
        .panel-header span i { color: var(--neon-emerald); margin-right: 0.5rem; }
        .btn-fetch {
            background: transparent; color: var(--neon-emerald); border: 1px solid var(--neon-emerald);
            padding: 0.4rem 1rem; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .btn-fetch:hover { background: var(--neon-emerald); color: #000; box-shadow: 0 0 10px rgba(0,255,170,0.4); }
        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; min-height: 200px; }
        .user-card {
            background: #010403; border: 1px solid rgba(255,255,255,0.03); padding: 1.25rem;
            display: flex; flex-direction: column; gap: 0.5rem; position: relative;
        }
        .user-card::before { content: "DATA_RECORD //"; font-size: 0.7rem; color: #40594f; }
        .user-name { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; color: #fff; font-weight: 700; margin-top: 0.25rem; }
        .user-field { font-size: 0.9rem; color: #8ba69b; display: flex; align-items: center; gap: 0.5rem; }
        .user-field i { color: var(--neon-cyan); width: 16px; }
        .loading-box { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 3rem 0; color: var(--neon-cyan); }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0, 243, 255, 0.1); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { grid-column: 1 / -1; background: rgba(255, 42, 95, 0.05); border: 1px dashed var(--neon-red); color: var(--neon-red); text-align: center; padding: 2rem; font-weight: bold; }
        footer { text-align: center; padding: 1.5rem; font-size: 0.8rem; color: #40594f; border-top: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="network-bg"></div>
    <nav>
        <div class="nav-brand">
            <img class="dnu-logo" src="https://inkythuatso.com/uploads/thumbnails/800/2021/12/logo-dai-hoc-dai-nam-inkythuatso-converted-01-23-09-54-10.jpg" alt="DNU Logo">
            <div class="brand-text">
                <div class="title">API INTEGRATOR</div>
                <div class="subtitle">KHOA CNTT - ĐẠI HỌC ĐẠI NAM</div>
            </div>
        </div>
        <div style="font-size: 0.85rem; color: var(--neon-emerald);">LAB_10 // FETCH PROMISE</div>
    </nav>
    <div class="container">
        <div class="api-panel">
            <div class="panel-header">
                <span><i class="fa-solid fa-cloud-arrow-down"></i> THU THẬP TÀI NGUYÊN NGƯỜI DÙNG NGOẠI VI</span>
                <button class="btn-fetch" onclick="fetchUsersFromAPI()">Gửi yêu cầu Fetch</button>
            </div>
            <div class="user-grid" id="api-grid-target"></div>
        </div>
    </div>
    <footer>
        SYS.MGR // ĐẠI HỌC ĐẠI NAM — KHƠI DẬY TIỀM NĂNG VƯƠN TỚI THÀNH CÔNG
    </footer>
    <script>
        async function fetchUsersFromAPI() {
            const grid = document.getElementById('api-grid-target');
            grid.innerHTML = `
                <div class="loading-box">
                    <div class="spinner"></div>
                    <div>Đang tạo kênh đồng bộ và tải luồng gói dữ liệu từ hệ thống...</div>
                </div>
            `;
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                if (!response.ok) {
                    throw new Error("Mã phản hồi tín hiệu HTTP không thành công: " + response.status);
                }
                const usersList = await response.json();
                renderUsersGrid(usersList);
            } catch (err) {
                grid.innerHTML = `
                    <div class="error-box">
                        <i class="fa-solid fa-triangle-exclamation"></i> KẾT NỐI THẤT BẠI: Không thể truy cập tài nguyên JSON ngoại vi!<br>
                        <span style="font-size:0.85rem; font-weight:normal; color:rgba(255,42,95,0.7);">${err.message}</span>
                    </div>
                `;
            }
        }
        function renderUsersGrid(list) {
            const grid = document.getElementById('api-grid-target');
            if (list.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#40594f;">Hệ thống phản hồi rỗng. Không có bản ghi nào.</div>`;
                return;
            }
            let cardsHtml = '';
            list.slice(0, 6).forEach(u => {
                cardsHtml += `
                    <div class="user-card">
                        <div class="user-name">${u.name}</div>
                        <div class="user-field"><i class="fa-solid fa-id-badge"></i> ID: ${u.id}</div>
                        <div class="user-field"><i class="fa-solid fa-envelope"></i> ${u.email}</div>
                        <div class="user-field"><i class="fa-solid fa-earth-americas"></i> City: ${u.address ? u.address.city : 'Hà Nội'}</div>
                    </div>
                `;
            });
            grid.innerHTML = cardsHtml;
        }
        window.onload = fetchUsersFromAPI;
    </script>
</body>
</html>
