<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fetch API</title>
</head>
<body>

<h1>Danh sách User</h1>

<div id="ds"></div>

<script>
fetch("https://jsonplaceholder.typicode.com/users")
.then(res => res.json())
.then(data => {

    let html = "";

    data.forEach(user => {

        html += `
        <p>
        ${user.name} - ${user.email}
        </p>
        `;
    });

    document.getElementById("ds").innerHTML = html;
});
</script>

</body>
</html>
