<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tính BMI</title>

<style>
    body{
        font-family: Arial;
        background: linear-gradient(135deg,#4facfe,#00f2fe);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .box{
        background:white;
        padding:30px;
        border-radius:15px;
        width:350px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:10px;
        margin-top:10px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:15px;
        border:none;
        background:#007bff;
        color:white;
        font-size:16px;
        border-radius:8px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    #ketQua{
        margin-top:20px;
        text-align:center;
        font-size:18px;
        font-weight:bold;
    }

    .gay{
        color:orange;
    }

    .binhthuong{
        color:green;
    }

    .thuacan{
        color:#d97706;
    }

    .beophi{
        color:red;
    }
</style>
</head>

<body>

<div class="box">
    <h2>Tính Chỉ Số BMI</h2>

    <input type="number" id="chieucao" placeholder="Nhập chiều cao (m)">
    
    <input type="number" id="cannang" placeholder="Nhập cân nặng (kg)">

    <button onclick="tinhBMI()">Tính BMI</button>

    <div id="ketQua"></div>
</div>

<script>

function tinhBMI(){

    let chieuCao = Number(document.getElementById("chieucao").value);
    let canNang = Number(document.getElementById("cannang").value);

    let ketQua = document.getElementById("ketQua");

    // Kiểm tra dữ liệu
    if(chieuCao <= 0 || canNang <= 0){
        ketQua.innerHTML = "Vui lòng nhập dữ liệu hợp lệ!";
        ketQua.className = "";
        return;
    }

    // Tính BMI
    let bmi = canNang / (chieuCao * chieuCao);

    bmi = bmi.toFixed(2);

    let xepLoai = "";
    let mau = "";

    // Phân loại
    if(bmi < 18.5){
        xepLoai = "Gầy";
        mau = "gay";
    }
    else if(bmi < 25){
        xepLoai = "Bình thường";
        mau = "binhthuong";
    }
    else if(bmi < 30){
        xepLoai = "Thừa cân";
        mau = "thuacan";
    }
    else{
        xepLoai = "Béo phì";
        mau = "beophi";
    }

    ketQua.className = mau;

    ketQua.innerHTML = `
        BMI của bạn: ${bmi} <br>
        Phân loại: ${xepLoai}
    `;
}

</script>

</body>
</html>
