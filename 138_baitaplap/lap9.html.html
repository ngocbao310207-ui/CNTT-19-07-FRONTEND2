<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Bài 9: Ứng dụng To-Do List</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #e9ecef;
        padding: 30px;
      }
      .todo-container {
        max-width: 450px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      }
      .input-area {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }
      .input-area input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ced4da;
        border-radius: 4px;
      }
      .input-area button {
        padding: 10px 15px;
        background: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #dee2e6;
        gap: 10px;
      }
      li.completed .task-text {
        text-decoration: line-through;
        color: #6c757d;
      }
      .task-text {
        flex: 1;
        cursor: pointer;
      }
      .btn-delete {
        background: #dc3545;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="todo-container">
      <h2>Danh Sách Công Việc</h2>
      <div class="input-area">
        <input
          type="text"
          id="taskInput"
          placeholder="Nhập công việc cần làm mới..."
        />
        <button onclick="addTask()">Thêm</button>
      </div>
      <ul id="taskList"></ul>
    </div>

    <script>
      // Mở rộng: Nạp dữ liệu ban đầu từ LocalStorage nếu có tồn tại dữ liệu cũ trước đó
      let todos = JSON.parse(localStorage.getItem("my_todo_list")) || [
        { id: 1, text: "Học cú pháp DOM thuần", completed: false },
        { id: 2, text: "Làm bài tập Lab JavaScript", completed: true },
      ];

      function saveAndRender() {
        localStorage.setItem("my_todo_list", JSON.stringify(todos));
        const listElement = document.getElementById("taskList");
        listElement.innerHTML = "";

        todos.forEach((item) => {
          const li = document.createElement("li");
          if (item.completed) li.classList.add("completed");

          li.innerHTML = `
            <span class="task-text" onclick="toggleTask(${item.id})">${item.text}</span>
            <button class="btn-delete" onclick="deleteTask(${item.id})">Xóa</button>
        `;
          listElement.appendChild(li);
        });
      }

      function addTask() {
        const input = document.getElementById("taskInput");
        const text = input.value.trim();
        if (!text) {
          alert("Nội dung công việc không được để trống!");
          return;
        }

        const newTask = {
          id: Date.now(), // Định danh duy nhất bằng mốc thời gian timestamp
          text: text,
          completed: false,
        };
        todos.push(newTask);
        saveAndRender();
        input.value = "";
        input.focus();
      }

      function toggleTask(id) {
        todos = todos.map((t) =>
          t.id === id ? { ...t, completed: !t.completed } : t,
        );
        saveAndRender();
      }

      function deleteTask(id) {
        if (confirm("Bạn chắc chắn muốn xóa bỏ công việc này?")) {
          todos = todos.filter((t) => t.id !== id);
          saveAndRender();
        }
      }

      // Chạy khởi tạo render ứng dụng khi tải trang lần đầu
      saveAndRender();
    </script>
  </body>
</html>
