<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tra cứu</title>
</head>
<body>

<input type="number" id="id">
<button onclick="tim()">Tìm</button>

<div id="ketQua"></div>

<script>
function tim(){

    let id = document.getElementById("id").value;

    fetch(`https://jsonplaceholder.typicode.com/users/${id}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("ketQua").innerHTML = `
        <h3>${data.name}</h3>
        <p>${data.email}</p>
        `;

    });
}
</script>

</body>
</html>
