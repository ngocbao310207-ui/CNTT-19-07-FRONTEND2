<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Form Đăng Nhập Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body{
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box{
            background-color: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .login-title{
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            color: #333;
        }

        .forgot-password{
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password:hover{
            text-decoration: underline;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-11 col-sm-8 col-md-6 col-lg-4">

                <div class="login-box">

                    <h2 class="login-title">
                        🔐 Đăng Nhập
                    </h2>

                    <form>

                        <!-- Email -->
                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                placeholder="Nhập email"
                            >

                        </div>

                        <!-- Password -->
                        <div class="mb-3">

                            <label class="form-label">
                                Mật khẩu
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                placeholder="Nhập mật khẩu"
                            >

                        </div>

                        <!-- Remember -->
                        <div class="d-flex
                                    justify-content-between
                                    align-items-center
                                    mb-3">

                            <div class="form-check">

                                <input
                                    class="form-check-input"
                                    type="checkbox"
                                    id="remember"
                                >

                                <label
                                    class="form-check-label"
                                    for="remember"
                                >
                                    Ghi nhớ đăng nhập
                                </label>

                            </div>

                            <a
                                href="#"
                                class="forgot-password"
                            >
                                Quên mật khẩu?
                            </a>

                        </div>

                        <!-- Button -->
                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Đăng nhập
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
