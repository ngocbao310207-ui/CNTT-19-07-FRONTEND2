<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hiển thị dữ liệu JSON/API</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 30px;
        }

        .container{
            width: 900px;
            margin: auto;
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .loading{
            text-align: center;
            font-size: 20px;
            color: #007bff;
        }

        .error{
            text-align: center;
            color: red;
            font-size: 18px;
        }

        .user-list{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card{
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-5px);
        }

        .card h3{
            margin-top: 0;
            color: #007bff;
        }

        .card p{
            color: #555;
            line-height: 1.6;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>📋 Danh Sách Người Dùng</h1>

        <div id="status" class="loading">
            Đang tải dữ liệu...
        </div>

        <div class="user-list" id="userList"></div>

    </div>

    <script>

        // API mẫu
        const apiURL =
            "https://jsonplaceholder.typicode.com/users";

        // Hàm lấy dữ liệu
        async function fetchUsers(){

            try{

                // Gọi API
                let response = await fetch(apiURL);

                // Chuyển dữ liệu sang JSON
                let users = await response.json();

                // Hiển thị dữ liệu
                renderUsers(users);

                // Xóa thông báo loading
                document.getElementById("status").innerHTML = "";

            }
            catch(error){

                // Hiển thị lỗi
                document.getElementById("status").innerHTML =
                    "❌ Không thể tải dữ liệu!";
                    
                document.getElementById("status")
                    .classList.add("error");

                console.log(error);
            }
        }

        // Hàm render danh sách
        function renderUsers(users){

            let html = "";

            users.forEach(function(user){

                html += `
                    <div class="card">

                        <h3>${user.name}</h3>

                        <p>
                            📧 Email: ${user.email}
                        </p>

                        <p>
                            📱 Phone: ${user.phone}
                        </p>

                        <p>
                            🌐 Website: ${user.website}
                        </p>

                    </div>
                `;
            });

            document.getElementById("userList").innerHTML = html;
        }

        // Gọi hàm khi tải trang
        fetchUsers();

    </script>

</body>
</html>
