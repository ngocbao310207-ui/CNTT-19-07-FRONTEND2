<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Form Đăng Ký jQuery</title>

    <!-- Nhúng jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 420px;
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group{
            margin-bottom: 18px;
        }

        label{
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input{
            width: 100%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .success{
            border-color: green;
        }

        .error-input{
            border-color: red;
        }

        .error{
            color: red;
            font-size: 13px;
            margin-top: 5px;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover{
            opacity: 0.9;
        }

        .message{
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: green;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>📝 Form Đăng Ký</h1>

        <form id="registerForm">

            <div class="form-group">

                <label>Họ tên</label>

                <input
                    type="text"
                    id="fullname"
                    placeholder="Nhập họ tên"
                >

                <div class="error" id="nameError"></div>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="text"
                    id="email"
                    placeholder="Nhập email"
                >

                <div class="error" id="emailError"></div>

            </div>

            <div class="form-group">

                <label>Mật khẩu</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Nhập mật khẩu"
                >

                <div class="error" id="passwordError"></div>

            </div>

            <div class="form-group">

                <label>Xác nhận mật khẩu</label>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Nhập lại mật khẩu"
                >

                <div class="error" id="confirmError"></div>

            </div>

            <button type="submit">
                Đăng ký
            </button>

        </form>

        <div class="message" id="message"></div>

    </div>

    <script>

        $("#registerForm").submit(function(event){

            // Chặn submit mặc định
            event.preventDefault();

            // Xóa thông báo cũ
            $(".error").text("");

            $("input").removeClass(
                "error-input success"
            );

            $("#message").text("");

            // Lấy dữ liệu
            let fullname =
                $("#fullname").val().trim();

            let email =
                $("#email").val().trim();

            let password =
                $("#password").val().trim();

            let confirmPassword =
                $("#confirmPassword").val().trim();

            // Regex email
            let emailRegex =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            let isValid = true;

            // Kiểm tra họ tên
            if(fullname === ""){

                $("#nameError").text(
                    "Vui lòng nhập họ tên"
                );

                $("#fullname").addClass("error-input");

                isValid = false;
            }
            else{

                $("#fullname").addClass("success");
            }

            // Kiểm tra email
            if(email === ""){

                $("#emailError").text(
                    "Vui lòng nhập email"
                );

                $("#email").addClass("error-input");

                isValid = false;
            }
            else if(!emailRegex.test(email)){

                $("#emailError").text(
                    "Email không đúng định dạng"
                );

                $("#email").addClass("error-input");

                isValid = false;
            }
            else{

                $("#email").addClass("success");
            }

            // Kiểm tra mật khẩu
            if(password.length < 6){

                $("#passwordError").text(
                    "Mật khẩu phải từ 6 ký tự"
                );

                $("#password").addClass("error-input");

                isValid = false;
            }
            else{

                $("#password").addClass("success");
            }

            // Kiểm tra xác nhận mật khẩu
            if(confirmPassword !== password){

                $("#confirmError").text(
                    "Mật khẩu xác nhận không khớp"
                );

                $("#confirmPassword")
                    .addClass("error-input");

                isValid = false;
            }
            else if(confirmPassword !== ""){

                $("#confirmPassword")
                    .addClass("success");
            }

            // Thành công
            if(isValid){

                $("#message").text(
                    "🎉 Đăng ký thành công!"
                );

                $("#registerForm")[0].reset();

                $("input").removeClass("success");
            }

        });

    </script>

</body>
</html>
