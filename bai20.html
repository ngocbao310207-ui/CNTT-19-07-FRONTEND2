<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Overwrite Terminal - Lab 20</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #070514; font-family: 'Share Tech Mono', monospace; color: #bd00ff; }
        .cyber-panel { background: #0f0b24; border: 2px solid #bd00ff; box-shadow: 0 0 15px rgba(189, 0, 255, 0.2); border-radius: 4px; max-width: 500px; margin: auto; }
        .cyber-title { font-family: 'Orbitron', sans-serif; font-weight: 800; text-shadow: 0 0 10px #bd00ff; color: #ffffff; text-transform: uppercase; }
        .cyber-badge { background: #23083b; border: 1px dashed #bd00ff; color: #ffffff; font-weight: bold; padding: 6px; text-align: center; }
        .cyber-input { background: #080414; border: 1px solid #bd00ff; color: #ffffff; border-radius: 2px; }
        .cyber-input:focus { background: #130a2e; border-color: #00ffcc; box-shadow: 0 0 10px rgba(0, 255, 204, 0.4); color: #ffffff; }
        .btn-cyber-up { background: #bd00ff; color: #ffffff; font-family: 'Orbitron', sans-serif; font-weight: 800; border: none; border-radius: 2px; padding: 12px; }
        .btn-cyber-up:hover { background: #ffffff; color: #070514; box-shadow: 0 0 20px #bd00ff; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container">
        <div class="cyber-panel p-4">
            <h5 class="cyber-title text-center mb-3 fs-6">// OVERWRITE_CORE_GRID //</h5>
            <div class="cyber-badge mb-4 font-monospace small">TARGET_NODE_MAPPING: <span class="text-warning">#12</span></div>
            <form id="putForm">
                <div class="mb-2">
                    <label class="small text-uppercase opacity-75">New_Identity_String</label>
                    <input type="text" class="form-control cyber-input" id="upName" value="Bui Quang Tue" required>
                </div>
                <div class="mb-2">
                    <label class="small text-uppercase opacity-75">New_Mail_Routing</label>
                    <input type="email" class="form-control cyber-input" id="upEmail" value="tue@example.com" required>
                </div>
                <div class="mb-4">
                    <label class="small text-uppercase opacity-75">New_Sector_Code</label>
                    <input type="text" class="form-control cyber-input" id="upClass" value="19-07" required>
                </div>
                <button type="submit" class="btn btn-cyber-up w-100">EXECUTE OVERWRITE</button>
            </form>
        </div>
    </div>
    <script>
        const API = "https://664dbfb9ede9608387fa541e.mockapi.io/students";
        document.getElementById("putForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const id = "12";
            const payload = {
                fullName: document.getElementById("upName").value.trim(),
                email: document.getElementById("upEmail").value.trim(),
                classroom: document.getElementById("upClass").value.trim()
            };
            fetch(`${API}/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(res => {
                if(!res.ok) throw new Error();
                alert("OVERWRITE SUCCESSFUL: Node structure memory updated.");
            }).catch(() => alert("CRITICAL_ERROR: Target sector locked or missing."));
        });
    </script>
</body>
</html>
