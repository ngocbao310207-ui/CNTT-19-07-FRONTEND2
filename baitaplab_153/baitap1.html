<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính chỉ số BMI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        
        .result.show {
            display: block;
        }
        
        .result h2 {
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        
        .result p {
            margin: 10px 0;
            font-size: 18px;
        }
        
        .result.gau {
            background-color: #a8d8ff;
            color: #0066cc;
        }
        
        .result.binh-thuong {
            background-color: #a8f5a8;
            color: #008000;
        }
        
        .result.thua-can {
            background-color: #ffe6b3;
            color: #ff8c00;
        }
        
        .result.beo-phi {
            background-color: #ffb3b3;
            color: #cc0000;
        }
        
        .error {
            color: #d9534f;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💪 Tính chỉ số BMI</h1>
        
        <div class="form-group">
            <label for="height">Chiều cao (mét):</label>
            <input type="number" id="height" placeholder="Ví dụ: 1.75" step="0.01" min="0">
            <div class="error" id="heightError"></div>
        </div>
        
        <div class="form-group">
            <label for="weight">Cân nặng (kg):</label>
            <input type="number" id="weight" placeholder="Ví dụ: 70" step="0.1" min="0">
            <div class="error" id="weightError"></div>
        </div>
        
        <button onclick="calculateBMI()">Tính BMI</button>
        
        <div class="result" id="result">
            <h2 id="bmiValue"></h2>
            <p id="bmiClass"></p>
        </div>
    </div>
    
    <script>
        function calculateBMI() {
            // Lấy giá trị từ input
            const heightInput = document.getElementById('height').value.trim();
            const weightInput = document.getElementById('weight').value.trim();
            
            // Ẩn lỗi trước đó
            document.getElementById('heightError').classList.remove('show');
            document.getElementById('weightError').classList.remove('show');
            document.getElementById('result').classList.remove('show');
            
            // Kiểm tra dữ liệu rỗng
            if (!heightInput) {
                document.getElementById('heightError').textContent = 'Vui lòng nhập chiều cao';
                document.getElementById('heightError').classList.add('show');
                return;
            }
            
            if (!weightInput) {
                document.getElementById('weightError').textContent = 'Vui lòng nhập cân nặng';
                document.getElementById('weightError').classList.add('show');
                return;
            }
            
            // Chuyển sang kiểu số
            const height = Number(heightInput);
            const weight = Number(weightInput);
            
            // Kiểm tra dữ liệu âm
            if (height < 0) {
                document.getElementById('heightError').textContent = 'Chiều cao không thể âm';
                document.getElementById('heightError').classList.add('show');
                return;
            }
            
            if (weight < 0) {
                document.getElementById('weightError').textContent = 'Cân nặng không thể âm';
                document.getElementById('weightError').classList.add('show');
                return;
            }
            
            // Kiểm tra chiều cao bằng 0
            if (height === 0) {
                document.getElementById('heightError').textContent = 'Chiều cao phải lớn hơn 0';
                document.getElementById('heightError').classList.add('show');
                return;
            }
            
            // Tính BMI
            const bmi = weight / (height * height);
            const bmiRounded = bmi.toFixed(2);
            
            // Phân loại thể trạng
            let classification = '';
            let className = '';
            
            if (bmi < 18.5) {
                classification = 'Gầy';
                className = 'gau';
            } else if (bmi < 25) {
                classification = 'Bình thường';
                className = 'binh-thuong';
            } else if (bmi < 30) {
                classification = 'Thừa cân';
                className = 'thua-can';
            } else {
                classification = 'Béo phì';
                className = 'beo-phi';
            }
            
            // Hiển thị kết quả
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'result show ' + className;
            document.getElementById('bmiValue').textContent = bmiRounded;
            document.getElementById('bmiClass').textContent = '📊 Phân loại: ' + classification;
        }
        
        // Cho phép tính BMI khi nhấn Enter
        document.getElementById('height').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateBMI();
        });
        
        document.getElementById('weight').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateBMI();
        });
    </script>
</body>
</html>
