<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tính khuyến mãi</title>
</head>
<body>
  <h2>Chương trình khuyến mãi</h2>

  <label>Giá trị đơn hàng (VNĐ): </label>
  <input type="number" id="orderValue"><br><br>

  <label>Hạng thành viên: </label>
  <select id="memberType">
    <option value="normal">Thường</option>
    <option value="silver">Bạc</option>
    <option value="gold">Vàng</option>
  </select><br><br>

  <label>Mã giảm giá: </label>
  <input type="text" id="coupon" placeholder="Nhập mã (vd: abc123)"><br><br>

  <button onclick="calcDiscount()">Tính toán</button>

  <div id="result"></div>

  <script>
    function calcDiscount() {
      let value = Number(document.getElementById("orderValue").value);
      let type = document.getElementById("memberType").value;
      let coupon = document.getElementById("coupon").value.trim();
      let discountRate = 0;

      // Kiểm tra dữ liệu hợp lệ
      if (!value || value <= 0) {
        document.getElementById("result").textContent = "Vui lòng nhập giá trị đơn hàng hợp lệ!";
        return;
      }

      // 3 mức khuyến mãi theo khoảng tiền
      if (value >= 1000000) discountRate = 0.15;
      else if (value >= 500000) discountRate = 0.1;
      else if (value >= 200000) discountRate = 0.05;

      // Thêm ưu đãi theo hạng thành viên
      if (type === "silver") discountRate += 0.05;
      else if (type === "gold") discountRate += 0.1;

      // Mã giảm giá cố định
      let couponDiscount = 0;
      if (coupon.toLowerCase() === "abc123") {
        couponDiscount = 500000; // giảm trực tiếp 500k
      }

      // Miễn phí vận chuyển nếu đơn hàng > 1.5 triệu
      let shipping = value > 1500000 ? 0 : 30000;

      // Tính toán
      let discount = value * discountRate + couponDiscount;
      let total = value - discount + shipping;

      // Hiển thị kết quả
      document.getElementById("result").innerHTML = `
        Tiền gốc: ${value.toLocaleString()} VNĐ <br>
        Tỷ lệ giảm: ${(discountRate*100).toFixed(0)}% <br>
        Giảm thêm từ mã: ${couponDiscount.toLocaleString()} VNĐ <br>
        Số tiền giảm: ${discount.toLocaleString()} VNĐ <br>
        Phí vận chuyển: ${shipping.toLocaleString()} VNĐ <br>
        Tổng thanh toán: ${total.toLocaleString()} VNĐ
      `;
    }
  </script>
</body>
</html>
